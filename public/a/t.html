<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HB | Hala Beauty | قائمة شراء المنتجات</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --purple:#6B0FA6;
      --purpleDark:#3C0A63;
      --peach:#F1C6B1;
      --ink:#101828;
      --muted:#667085;

      --card:rgba(255,255,255,.92);
      --line:rgba(16,24,40,.10);
      --shadow:0 12px 30px rgba(16,24,40,.12);
      --shadow2:0 8px 18px rgba(16,24,40,.10);

      --r16:16px;
      --r18:18px;

      --ok:#16a34a;
      --warn:#f59e0b;
      --err:#ef4444;
      --info:#2563eb;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:"Cairo",system-ui,sans-serif;
      color:var(--ink);
      background:
        linear-gradient(180deg, rgba(60,10,99,.55), rgba(241,198,177,.35)),
        url("d.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 14px 26px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 14px;
      border-radius:var(--r18);
      background:var(--card);
      box-shadow:var(--shadow2);
      border:1px solid var(--line);
      backdrop-filter: blur(6px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .brandMark{
      width:44px;
      height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: linear-gradient(135deg, rgba(107,15,166,.16), rgba(241,198,177,.22));
      border:1px solid rgba(107,15,166,.18);
      flex:0 0 auto;
    }

    .brandText{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .brandName{
      font-size:18px;
      font-weight:900;
      margin:0;
      line-height:1.2;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brandName .b1{ color:var(--purple); }
    .brandName .b2{ color:var(--peach); }

    .brandSub{
      font-size:12.5px;
      color:var(--muted);
      font-weight:800;
      line-height:1.2;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background: rgba(107,15,166,.10);
      color: var(--purpleDark);
      border:1px solid rgba(107,15,166,.18);
      white-space:nowrap;
    }

    .card{
      margin-top:14px;
      padding:14px;
      border-radius:var(--r18);
      background:var(--card);
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      backdrop-filter: blur(6px);
    }

    .label{
      font-size:13px;
      color:var(--muted);
      font-weight:900;
      margin:0 0 10px 0;
    }

    .controls{
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap:12px;
    }

    .box{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      background:#fff;
      border:1px solid rgba(16,24,40,.12);
      box-shadow:0 6px 14px rgba(16,24,40,.08);
      min-width:0;
    }
    .box input{
      border:none;
      outline:none;
      background:transparent;
      width:100%;
      font-size:15px;
      font-weight:900;
      color:var(--ink);
      min-width:0;
      font-family:"Cairo",system-ui,sans-serif;
    }
    .box input::placeholder{ color: rgba(102,112,133,.9); font-weight:800; }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 12px;
      cursor:pointer;
      font-weight:900;
      font-size:15px;
      font-family:"Cairo",system-ui,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:.15s;
      user-select:none;
      width:100%;
    }
    .btn:active{ transform:scale(.985); }
    .btnPrimary{
      background: linear-gradient(135deg, var(--purple), var(--purpleDark));
      color:#fff;
      box-shadow:0 10px 22px rgba(107,15,166,.22);
    }
    .btnGhost{
      background:#f2f4f7;
      color:var(--purpleDark);
      border:1px dashed rgba(60,10,99,.30);
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .hint{
      margin-top:10px;
      font-size:12.5px;
      font-weight:900;
      color:rgba(16,24,40,.62);
      line-height:1.55;
    }

    .stats{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    .stat{
      background:#fff;
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 6px 14px rgba(16,24,40,.06);
      border-radius:14px;
      padding:10px 12px;
    }
    .statLbl{ font-size:12px; font-weight:950; color:rgba(16,24,40,.55); }
    .statVal{ margin-top:3px; font-weight:980; color:var(--purpleDark); font-size:16px; }

    .grid{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:12px;
    }
    @media (min-width: 720px){
      .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .controls{ grid-template-columns: 1.5fr 1fr; }
    }
    @media (max-width:420px){
      .controls{ grid-template-columns:1fr; }
      .row2{ grid-template-columns:1fr; }
      .grid{ grid-template-columns:1fr; }
      .stats{ grid-template-columns:1fr; }
    }

    .item{
      background:#fff;
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 10px 22px rgba(16,24,40,.10);
      border-radius:18px;
      overflow:hidden;
      position:relative;
      transition:.15s;
    }
    .item:active{ transform:scale(.99); }

    .imgWrap{
      position:relative;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, rgba(107,15,166,.08), rgba(241,198,177,.18));
      overflow:hidden;
    }
    .imgWrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition: .18s;
    }

    .meta{
      padding:10px 12px 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .name{
      font-weight:980;
      font-size:13.5px;
      line-height:1.45;
      color:var(--ink);
      min-height: 42px;
    }

    .bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .qty{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      background: rgba(241,198,177,.35);
      color: var(--purpleDark);
      border:1px solid rgba(241,198,177,.65);
      white-space:nowrap;
    }

    .chk{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      background: rgba(107,15,166,.10);
      color: var(--purpleDark);
      border:1px solid rgba(107,15,166,.18);
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
    }

    /* ✅ حالة خلص (المتبقي = 0) */
    .item.done{
      opacity:.78;
      border-color: rgba(16,24,40,.12);
    }
    .item.done .imgWrap img{
      filter: grayscale(1) contrast(1) brightness(.95);
      opacity:.9;
    }
    .item.done .name{
      text-decoration: line-through;
      color: rgba(16,24,40,.55);
    }

    /* Toasts */
    .toasts{
      position:fixed;
      bottom:14px;
      left:14px;
      right:14px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:12px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 14px 32px rgba(16,24,40,.18);
      backdrop-filter: blur(8px);
      transform: translateY(12px);
      opacity:0;
      animation: toastIn .22s ease-out forwards;
    }
    @keyframes toastIn{ to { transform: translateY(0); opacity:1; } }
    .toast.out{ animation: toastOut .18s ease-in forwards; }
    @keyframes toastOut{ to { transform: translateY(12px); opacity:0; } }
    .toast .icon{
      width:34px;
      height:34px;
      border-radius:12px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      color:#fff;
    }
    .toast .body{ min-width:0; flex:1 1 auto; }
    .toast .title{ margin:0; font-size:13px; font-weight:950; line-height:1.2; }
    .toast .msg{ margin:3px 0 0 0; font-size:12.5px; font-weight:900; color:rgba(16,24,40,.72); line-height:1.45; }
    .toast .x{
      border:none; background:transparent; cursor:pointer; padding:4px; margin-top:-2px;
      border-radius:10px; color:rgba(16,24,40,.55);
    }
    .toast.ok   .icon{ background:linear-gradient(135deg,#22c55e,#16a34a); }
    .toast.err  .icon{ background:linear-gradient(135deg,#f87171,#ef4444); }
    .toast.warn .icon{ background:linear-gradient(135deg,#fbbf24,#f59e0b); }
    .toast.info .icon{ background:linear-gradient(135deg,#60a5fa,#2563eb); }

    .bar{ margin-top:10px; height:3px; border-radius:999px; background:rgba(16,24,40,.10); overflow:hidden; direction:rtl; }
    .bar > i{ display:block; height:100%; width:100%; background:rgba(16,24,40,.25); transform-origin:right center; animation: shrink linear forwards; }
    @keyframes shrink{ to{ transform:scaleX(0); } }

    /* ===== Orders overlay on image ===== */
    .imgWrap{
      position:relative;
      overflow:hidden;
    }

    .ordersOverlay{
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      z-index:2;
      pointer-events:none;
    }

    .orderPill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 9px;
      border-radius:999px;
      font-weight:950;
      font-size:12px;
      color:#111827;
      background: rgba(255,255,255,.92);
      border:1px solid rgba(16,24,40,.12);
      box-shadow:0 8px 18px rgba(16,24,40,.12);
      backdrop-filter: blur(6px);
      max-width:100%;
    }

    .orderPill b{
      color: var(--purpleDark, #3C0A63);
      font-weight:980;
    }

    .orderPill .dot{
      width:7px;height:7px;border-radius:99px;
      background: rgba(107,15,166,.65);
      flex:0 0 auto;
    }
/* ===== Copy Image button (top-right) ===== */
.btnStack{
  position:absolute;
  left:8px;
  bottom:8px;
  z-index:5;

  display:flex;
  flex-direction:column;
  gap:7px;
}

.btnStack button{
  width:34px;
  height:34px;
  border:none;
  border-radius:12px;
  cursor:pointer;

  display:grid;
  place-items:center;

  background: rgba(255,255,255,.92);
  border:1px solid rgba(16,24,40,.12);
  box-shadow:0 6px 14px rgba(16,24,40,.12);
  backdrop-filter: blur(6px);

  padding:0;
}

.btnStack button:active{ transform:scale(.97); }

.btnStack svg{
  width:17px;
  height:17px;
  stroke:#111827;
  fill:none;
  stroke-width:2.2;
}
    /* ===== Zoom button ===== */
    .zoomBtn{
      position:absolute;
      bottom:10px;
      left:10px;
      z-index:3;
      width:40px;
      height:40px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      display:grid;
      place-items:center;

      background: rgba(255,255,255,.92);
      border:1px solid rgba(16,24,40,.12);
      box-shadow:0 10px 22px rgba(16,24,40,.14);
      backdrop-filter: blur(6px);
    }
    .zoomBtn:active{ transform:scale(.98); }
    .zoomBtn svg{ width:18px;height:18px; stroke:#111827; fill:none; stroke-width:2.2; }

    /* ===== Image modal ===== */
    .imgModal{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.62);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:99999;
    }
    .imgModal.open{ display:flex; }

    .imgModalCard{
      width:min(720px, 100%);
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 26px 60px rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.18);
    }

    .imgModalTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:12px 12px;
      border-bottom:1px solid rgba(16,24,40,.10);
    }
    .imgModalTitle{
      font-weight:980;
      font-size:14px;
      color:#111827;
      line-height:1.4;
    }
    .imgModalClose{
      border:none;
      background:rgba(16,24,40,.06);
      border:1px solid rgba(16,24,40,.10);
      width:40px;height:40px;
      border-radius:14px;
      cursor:pointer;
      display:grid;place-items:center;
    }
    .imgModalClose svg{ width:18px;height:18px; stroke:#111827; fill:none; stroke-width:2.2; }

    .imgModalBody{
      padding:12px;
      background: #0b0b0b;
    }
    .imgModalBody img{
      width:100%;
      height:auto;
      display:block;
      border-radius:14px;
      background:#111;
    }
    /* ===== Tags Buttons Bar (مثل تجهيز الطلبات) ===== */
/* ===== Tags Buttons Bar ===== */
.tagsBar{
  margin-top:12px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

/* إعدادات مشتركة */
:root{
  --btnH: 40px;
  --btnPadX: 12px;
  --btnGap: 8px;
  --btnR: 14px;
  --ico: 18px;
}

/* قاعدة مشتركة للأزرار والروابط */
.segBtn,
.linkBtn{
  height: var(--btnH);
  min-height: var(--btnH);
  padding: 0 var(--btnPadX);
  border-radius: var(--btnR);

  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap: var(--btnGap);

  font-family:"Cairo",system-ui,sans-serif;
  font-weight:950;
  font-size:13.5px;
  line-height:1;

  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  text-decoration:none;

  border:1px solid rgba(16,24,40,.12);
  box-shadow:0 10px 22px rgba(16,24,40,.10);
  transition: transform .15s, box-shadow .15s, background .15s, color .15s, border-color .15s;
}

.segBtn:active,
.linkBtn:active{ transform:scale(.985); }

/* الأيقونات (موحدة) */
.segBtn svg,
.linkBtn svg{
  width: var(--ico);
  height: var(--ico);
  flex: 0 0 var(--ico);
  stroke: currentColor;
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ===== segBtn ===== */
.segBtn{
  background:#fff;
  color:var(--purpleDark);
}

/* small: نفس الارتفاع (ما يتغير)، فقط حشو أقل وخط أخف شوي */
.segBtn.small{
  padding: 0 10px;
  font-size:13px;
}

.segBtn.active{
  background: linear-gradient(135deg, var(--purple), var(--purpleDark));
  color:#fff;
  border-color: rgba(107,15,166,.22);
  box-shadow:0 12px 24px rgba(107,15,166,.18);
}

/* ===== linkBtn ===== */
.linkBtn{
  background: linear-gradient(135deg, rgba(241,198,177,.55), rgba(107,15,166,.10));
  color: var(--purpleDark);
}

.linkBtn:hover{ transform: translateY(-1px); }

/* ألوان الروابط (ثابتة) */
.linkBtn.stock{
  background: linear-gradient(135deg, rgba(107,15,166,.14), rgba(255,255,255,.92));
  border-color: rgba(107,15,166,.18);
}

.linkBtn.done{
  background: linear-gradient(135deg, rgba(34,197,94,.14), rgba(255,255,255,.92));
  border-color: rgba(34,197,94,.22);
}
    .chk[disabled]{
  opacity:.5;
  pointer-events:none;
}
.barcodeBox{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:14px; background:#fff;
  border:1px solid rgba(16,24,40,.12);
  box-shadow:0 6px 14px rgba(16,24,40,.08);
}
.barcodeBox input{
  border:none; outline:none; width:100%;
  font-size:15px; font-weight:900;
  font-family:"Cairo",system-ui,sans-serif;
  background:transparent;
}
.btnIcon{
  width:18px;
  height:18px;
  stroke:currentColor;
  stroke-width:2.2;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.btnPrimary .btnIcon{
  stroke:#fff;
}

  </style>
</head>

<body>
  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="true"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="brandMark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" style="fill:none;stroke:var(--purple);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M12 7v6l4 2"></path>
            <circle cx="12" cy="12" r="9" style="stroke:var(--peach)"></circle>
          </svg>
        </div>
        <div class="brandText">
          <p class="brandName"><span class="b1">Beauty</span><span class="b2">time</span></p>
          <div class="brandSub">قائمة شراء المنتجات • 'طلبات هلا بيوتي</div>
        </div>
      </div>

      <div class="badge" title="التاقات الحالية">
        <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M20 13V7a2 2 0 0 0-2-2h-6l-8 8 6 6 8-8Z"></path>
          <circle cx="15" cy="9" r="1.5"></circle>
        </svg>
        <span id="tagsBadge">مسقط, تاكيد, مكتب</span>
      </div>
    </div>

    <div class="card">
      <p class="label">التاقات + البحث + عرض المتبقي</p>

      <div class="controls">

        <div class="box">
          <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:rgba(60,10,99,.65);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M20 13V7a2 2 0 0 0-2-2h-6l-8 8 6 6 8-8Z"></path>
            <circle cx="15" cy="9" r="1.5"></circle>
          </svg>
          <input id="tagsInput" placeholder="اكتب التاقات مفصولة بفاصلة مثال: مسقط,تاكيد,مكتب" value="مسقط,تاكيد,مكتب">
        </div>

        <button class="btn btnPrimary" onclick="loadProducts()">
          <svg width="20" height="20" viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M21 21H3"></path>
            <path d="M12 3v10"></path>
            <path d="M8 11l4 4 4-4"></path>
          </svg>
          جلب القائمة
        </button>
      </div>

      <div class="row2">
        <div class="box">
          <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:rgba(60,10,99,.65);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3-3"></path>
          </svg>
          <input id="searchInput" placeholder="ابحث باسم المنتج..." oninput="render()">
        </div>

        <button class="btn btnGhost" onclick="toggleOnlyRemaining()">
          <span id="onlyRemainingTxt">عرض المتبقي فقط</span>
        </button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="statLbl">إجمالي المنتجات</div>
          <div class="statVal" id="statTotal">0</div>
        </div>
        <div class="stat">
          <div class="statLbl">خلصت</div>
          <div class="statVal" id="statDone">0</div>
        </div>
        <div class="stat">
          <div class="statLbl">المتبقي (فيها كمية)</div>
          <div class="statVal" id="statLeft">0</div>
        </div>
      </div>

<div class="tagsBar" id="tagsBar"></div>
    </div>

    <div class="card">
      <p class="label">المنتجات</p>
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <!-- ✅ Image Modal -->
  <div id="imgModal" class="imgModal" onclick="closeImgModal(event)">
    <div class="imgModalCard">

function mergeBoughtEntries(dst, src){
  if(!src) return dst;

  const sh = Array.isArray(src.hist) ? src.hist : [];

  }

  // sig خله الأحدث (بيتحدث لاحقًا أصلاً)
  if(typeof src.sig === "string" && src.sig) dst.sig = src.sig;

function upgradeKeysToInvKey(){

  let changed = false;

  for(const p of (products || [])){

    const nameK = String(p?.name || "").trim().toLowerCase();
    const stableOld = String(p?.buyKeyStable || "").trim();

    const candidates = new Set([nameK, stableOld].filter(Boolean));

    // اجمع أي بيانات موجودة تحت المفاتيح القديمة
    let merged = boughtMap[invK] || null;

    for(const oldK of candidates){
      if(oldK === invK) continue;
      if(boughtMap[oldK]){
        merged = mergeBoughtEntries(merged, boughtMap[oldK]);
        // لا نحذف القديم (اختياري) عشان ما “نخرب” أي بيانات قديمة
        changed = true;
      }
    }

    if(merged){
      boughtMap[invK] = merged;
    }

    // ✅ أهم خطوة: ثبت المفتاح على invKey بعد ما صار متوفر
    if(p.buyKeyStable !== invK){
      p.buyKeyStable = invK;
      changed = true;
    }
  }

  return changed;
}

function migrateBoughtKeys(){
  if(!boughtMap || typeof boughtMap !== "object") return false;

  let changed = false;

  function merge(dst, src){
    if(!src) return dst;
    if(!dst) dst = { byOrder:{}, hist:[], sig:"" };

    dst.byOrder = dst.byOrder || {};
    src.byOrder = src.byOrder || {};

    for(const [oid, q] of Object.entries(src.byOrder)){
      const a = Number(dst.byOrder[oid] || 0) || 0;
      const b = Number(q || 0) || 0;
      dst.byOrder[oid] = Math.max(a, b);
    }

    dst.hist = Array.isArray(dst.hist) ? dst.hist : [];
    const sh = Array.isArray(src.hist) ? src.hist : [];
    for(const oid of sh) dst.hist.push(oid);

    if(typeof src.sig === "string" && src.sig) dst.sig = src.sig;

    return dst;
  }

  for(const p of (products || [])){
    const invK = String(p?.invKey || "").trim();
    if(!invK) continue;

    // مفاتيح قديمة محتملة: الاسم + buyKeyStable القديم (لو كان اسم/شي ثاني)
    const nameK = String(p?.name || "").trim().toLowerCase();
    const oldStable = String(p?.buyKeyStable || "").trim();

    const candidates = new Set([nameK, oldStable].filter(Boolean));

    // دمج أي شيء موجود تحت المفاتيح القديمة إلى invKey
    let merged = boughtMap[invK] || null;

    for(const oldK of candidates){
      if(oldK === invK) continue;
      if(boughtMap[oldK]){
        merged = merge(merged, boughtMap[oldK]);
        // ملاحظة: ما نحذف القديم حفاظًا على “عدم التخريب”
        changed = true;
      }
    }

    if(merged){
      boughtMap[invK] = merged;
    }

    // ثبت المفتاح للمنتج نفسه
    if(p.buyKeyStable !== invK){
      p.buyKeyStable = invK;
      changed = true;
    }
  }

  return changed;
}
function dedupeProductsByInvKey(){
  const map = new Map();
  const keep = [];

  for(const p of (products || [])){
    const k = String(p?.invKey || "").trim();

    // إذا ما عنده invKey نخليه مثل ما هو (ما نغامر)
    if(!k){
      keep.push(p);
      continue;

    if(!map.has(k)){
      map.set(k, {
        ...p,
        quantity: Number(p.quantity || 0) || 0,
        sources: Array.isArray(p.sources) ? [...p.sources] : []
      });
    }else{
      const a = map.get(k);

      // اجمع الكميات
      a.quantity = (Number(a.quantity || 0) || 0) + (Number(p.quantity || 0) || 0);

      // اجمع sources
      const ss = Array.isArray(p.sources) ? p.sources : [];
      a.sources.push(...ss);

      // خذ صورة إذا ما كانت موجودة
      if(!a.image && p.image) a.image = p.image;

      // (اختياري) لو الاسم العربي أفضل عندك، تقدر تختار اسم أطول/غير لاتيني… لكن نخليها بسيطة:
      // if((p.name || "").length > (a.name || "").length) a.name = p.name;
    }
  }

  products = [...keep, ...map.values()];
}

  // =========================
  // Bought-by-order helpers

  function ensureEntry(k){
    let e = boughtMap?.[k];

    // ترحيل الشكل القديم (رقم أو {b:..})
    if(typeof e === "number" || (e && typeof e === "object" && "b" in e)){
      e = { byOrder: {}, hist: [], sig: "" };
      boughtMap[k] = e;
    }

    if(!e || typeof e !== "object"){
      e = { byOrder: {}, hist: [], sig: "" };
      boughtMap[k] = e;
    }

    if(!e.byOrder || typeof e.byOrder !== "object") e.byOrder = {};
    if(!Array.isArray(e.hist)) e.hist = [];
    if(typeof e.sig !== "string") e.sig = "";

    return e;
  }

  function srcOrderId(s){
    return String(s?.order || "").trim(); // مثل "#1234"
  }

  function srcQty(s){
    return Math.max(0, Number(s?.qty || 0) || 0);
  }

  function boughtInOrder(k, orderId){
    const e = ensureEntry(k);
    return Math.max(0, Number(e.byOrder?.[orderId] || 0) || 0);
  }

  // =========================
  // Qty calc from sources
  // =========================
  function totalQty(p){
    const sources = Array.isArray(p.sources) ? p.sources : [];
    let total = 0;
    for(const s of sources) total += srcQty(s);
    return Math.max(0, total);
  }

  function remainingQty(p){
    const k = keyOf(p);
    const sources = Array.isArray(p.sources) ? p.sources : [];

    let total = 0;
    let used = 0;

    for(const s of sources){
      const oid = srcOrderId(s);
      const q = srcQty(s);
      if(!oid || q <= 0) continue;

      total += q;

      const b = boughtInOrder(k, oid);
      used += Math.min(b, q);
    }

    return Math.max(0, total - used);
  }

}

async function undoOne(p){

  if(!lastRaw){

    return;

  let lastOrder = "";
  let lastSource = "buy";
  let lastProductKey = invKeyOf(p) || k;

  if(typeof lastRaw === "object" && lastRaw){
    lastOrder = String(lastRaw.order || lastRaw.order_id || "").trim();
    lastSource = String(lastRaw.source || "buy").trim();
    lastProductKey = String(lastRaw.product_key || lastProductKey).trim();
  }else{
    lastOrder = String(lastRaw || "").trim();
    lastSource = "buy";
  }

  if(!lastOrder){
    e.hist.pop();
    await saveDoneState();
    toast("warn","تنبيه","تم حذف حركة قديمة غير مفهومة من السجل.", 1600);
    return;
  }

  const cur = boughtInOrder(k, lastOrder);

  if(cur <= 0){

    toast("info","معلومه","ما فيه كمية مسجلة لهذا الطلب.", 1600);

async function fetchProductsByTags(tags, FROM_DATE){
  const url =
    "/api/reports/unshipped-products?tags=" +
    encodeURIComponent(tags || "") +
    "&from=" + encodeURIComponent(FROM_DATE) +
    "&limit=250";

  const r = await authFetch(url, { cache: "no-store" });
  const d = await r.json().catch(() => ({}));

  if (!r.ok) {
    throw new Error(d?.error || "تعذر جلب البيانات");
  }

  const arr = Array.isArray(d.products) ? d.products : [];

  return arr.map(p => {
    const sources = Array.isArray(p.sources) ? p.sources : [];

    // 🔥 نحاول نلقط ID ثابت من أي source
    let invFromSources = "";
    for (const s of sources) {
      const candidate = String(
        s?.invKey || s?.variantId || s?.product_key || ""
      ).trim();
      if (candidate) {
        invFromSources = candidate;
        break;
      }
    }

    const invKey = String(
      p?.invKey ||
      p?.variantId ||
      p?.product_key ||
      invFromSources ||
      ""
    ).trim();

    return {
      name: String(p?.name || "").trim(),
      invKey: invKey,   // ✅ هذا المفتاح الثابت
      quantity: Number(p?.quantity || 0) || 0,
      image: String(p?.image || "").trim(),
      sources: sources
    };
  });
}

/** stockMap معرف عندك فوق، لا تعيد تعريفه هنا **/
function invKeyOf(p){
  return String(p?.invKey || "").trim();
}
// Cache: nameLower -> variantId
const __variantCache = new Map();

// localStorage cache (يحفظ بين الزيارات)
const LS_VCACHE_KEY = "bt_variant_cache_v1";
try{
  const raw = localStorage.getItem(LS_VCACHE_KEY);
  if(raw){
    const obj = JSON.parse(raw);
    for(const [k,v] of Object.entries(obj || {})){
      __variantCache.set(k, String(v || ""));
    }
  }
}catch{}

function saveVariantCacheToLS(){
  try{
    const obj = {};
    for(const [k,v] of __variantCache.entries()){
      // لا نخزن قيم ضخمة
      if(typeof k === "string" && k.length <= 160) obj[k] = String(v || "");
    }
    localStorage.setItem(LS_VCACHE_KEY, JSON.stringify(obj));
  }catch{}
}

async function resolveVariantIdByName(productName){
  const nameLower = String(productName || "").trim().toLowerCase();
  if(!nameLower) return "";
  if(__variantCache.has(nameLower)) return __variantCache.get(nameLower);

  try{
    const r = await authFetch(
      "/api/pack-shopify/active?limit=5&after=&q=" + encodeURIComponent(productName),
      { cache:"no-store" }
    );
    const d = await r.json().catch(()=> ({}));
    const items = Array.isArray(d.items) ? d.items : [];
    const vid = String(items?.[0]?.variantId || "").trim();

    __variantCache.set(nameLower, vid || "");
    return vid || "";
  }catch{
    __variantCache.set(nameLower, "");
    return "";
  }finally{
    // خزّن بعد كل مجموعة
    // (ما نسويه كل مرة بشكل ثقيل داخل finally؟ نسويه بعد hydrate)
  }
}

// تشغيل موازي مع حد أقصى (حتى ما يصير ضغط)
async function mapWithConcurrency(items, limit, worker){
  const out = new Array(items.length);
  let i = 0;

  const runners = Array.from({ length: Math.max(1, limit) }, async () => {
    while(true){
      const idx = i++;
      if(idx >= items.length) break;
      out[idx] = await worker(items[idx], idx);
    }
  });

  await Promise.all(runners);
  return out;
}

// تجهيز invKey لكل منتج (سريع)
async function hydrateInvKeysFast(){
  const list = (products || []).filter(p => !invKeyOf(p));
  if(!list.length) return;

  // نجمع أسماء فريدة لتقليل الطلبات
  const uniq = [];
  const seen = new Set();
  for(const p of list){
    const n = String(p.name || "").trim();
    const k = n.toLowerCase();
    if(!n || seen.has(k)) continue;
    seen.add(k);
    uniq.push(n);
  }
  if(!uniq.length) return;

  // عدد التوازي (عدّلها حسب قوة السيرفر: 6 إلى 10 ممتاز)
  const CONCURRENCY = 8;

  await mapWithConcurrency(uniq, CONCURRENCY, async (name) => {
    const vid = await resolveVariantIdByName(name);
    __variantCache.set(name.toLowerCase(), vid || "");
    return vid;
  });

  // طبق النتائج على المنتجات
  for(const p of list){
    const k = String(p.name || "").trim().toLowerCase();
    p.invKey = __variantCache.get(k) || "";
  }

  // خزّن الكاش
  saveVariantCacheToLS();
}

window.onBuyOne = async function(k){
  k = String(k || "").trim();
  if(!k) {
    toast("err","خطأ","مفتاح المنتج غير صحيح.", 2000);
    return;
  }

  if(__busyBuy.has(k)){
    toast("info","انتظر","جاري تنفيذ عملية سابقة…", 1200);
    return;
  }
  __busyBuy.add(k);

  try{
    const p = products.find(x => keyOf(x) === k);
    if(!p){
      toast("err","خطأ","لم يتم العثور على المنتج.", 2200);
      return;
    }

    const beforeRem = remainingQty(p);
    const total = totalQty(p);

    // لو ما فيه كمية أصلاً
    if(total <= 0){
      toast("warn","تنبيه","هذا المنتج بدون كمية مرتبطة بطلبات.", 2000);
      return;
    }

    // لو المتبقي 0 قبل الشراء
    if(beforeRem <= 0){
      toast("warn","تنبيه","المنتج خلص (المتبقي 0).", 1700);
      return;
    }

    // نفّذ الشراء
    await buyOne(p);

    const afterRem = remainingQty(p);

    // ✅ إشعار نجاح لو فعلاً نقص المتبقي
    if(afterRem < beforeRem){
      toast("ok","تم الشراء ✅", `تم شراء 1 • المتبقي الآن: ${afterRem} / ${total}`, 2000);
    }else{
      // (احتياط) لو buyOne ما نفّذ بسبب سبب داخلي
      toast("warn","تنبيه","لم يتم تسجيل الشراء. جرّب مرة أخرى.", 2000);
    }

    window.render();
  }catch(e){
    toast("err","فشل الشراء", e?.message || "حدث خطأ غير متوقع.", 2600);
  } finally {
    __busyBuy.delete(k);
  }
};

window.onUndoOne = async function(k){
  k = String(k || "").trim();
  if(!k) {
    toast("err","خطأ","مفتاح المنتج غير صحيح.", 2000);
    return;
  }

  if(__busyBuy.has(k)){
    toast("info","انتظر","جاري تنفيذ عملية سابقة…", 1200);
    return;
  }
  __busyBuy.add(k);

  try{
    const p = products.find(x => keyOf(x) === k);
    if(!p){
      toast("err","خطأ","لم يتم العثور على المنتج.", 2200);
      return;
    }

    const beforeRem = remainingQty(p);
    const total = totalQty(p);

    // نفّذ التراجع
    await undoOne(p);

    const afterRem = remainingQty(p);

    // ✅ إشعار نجاح إذا زاد المتبقي (يعني فعلاً تراجع)
    if(afterRem > beforeRem){
      toast("info","تم التراجع ↩️", `تم التراجع عن 1 • المتبقي الآن: ${afterRem} / ${total}`, 2000);
    }else{
      // undoOne عندك أصلاً يسوي toast "ما فيه شيء للتراجع عنه"
      // لكن نخلي احتياط لو ما ظهر لأي سبب
      // (ما نكرر كثير عشان ما يطلع إشعارين)
      if(beforeRem === afterRem){
        toast("info","معلومة","لا يوجد شيء للتراجع عنه.", 1700);
      }
    }

    window.render();
  }catch(e){
    toast("err","فشل التراجع", e?.message || "حدث خطأ غير متوقع.", 2600);
  } finally {
    __busyBuy.delete(k);
  }
};

window.onAddStockPrompt = function(invKey){
  invKey = String(invKey || "").trim();
  if(!invKey){
    toast("warn","تنبيه","لا يوجد invKey لهذا المنتج.", 2000);
    return;
  }

  const p = products.find(x => String(x.invKey || "") === invKey);
  if(!p){
    toast("err","خطأ","لم يتم العثور على المنتج للمخزون.", 2200);
    return;
  }

  // ✅ إشعار بسيط قبل فتح المودال
  toast("info","مخزون","أدخل كمية الإضافة للمخزون.", 1200);

  openInvAddModal({
    product_key: invKey,
    product_name: p.name || "",
    image: p.image || ""
  });
};

function firstOrderWithRemaining(p){
  const k = keyOf(p);
  const sources = Array.isArray(p.sources) ? p.sources : [];
  for(const s of sources){
    const oid = String(s.order || "").trim();
    const q = Math.max(0, Number(s.qty||0)||0);
    if(!oid || q<=0) continue;
    const cur = boughtInOrder(k, oid);
    if(cur < q) return oid;
  }
  return null;
}

window.onConsumeStock = async function(invKey){
  invKey = String(invKey || "").trim();

  if(!invKey){
    toast("err","خطأ","مفتاح المخزون غير صحيح.", 2000);
    return;
  }

  if(__busyBuy.has(invKey)){
    toast("info","انتظر","جاري تنفيذ عملية سابقة…", 1200);
    return;
  }

  __busyBuy.add(invKey);

  try{
    const p = products.find(x => invKeyOf(x) === invKey);

    if(!p){
      toast("err","خطأ","لم يتم العثور على المنتج.", 2200);
      return;
    }

    const k = keyOf(p);
    const stock = Math.max(0, Number(stockMap?.[invKey] || 0) || 0);

    if(stock <= 0){
      toast("warn","تنبيه","لا يوجد مخزون محلي لهذا المنتج.", 1800);
      return;
    }

    const sources = Array.isArray(p.sources) ? p.sources : [];
    const e = ensureEntry(k);

    let pickedOrder = "";

    for(const s of sources){
      const oid = srcOrderId(s);
      const q = srcQty(s);
      if(!oid || q <= 0) continue;

      const cur = boughtInOrder(k, oid);

      if(cur < q){
        pickedOrder = oid;
        break;
      }
    }

    if(!pickedOrder){
      toast("warn","تنبيه","لا يوجد طلب متبقي لهذا المنتج.", 1800);
      return;
    }

    const r = await authFetch("/api/inv/consume", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        product_key: invKey,
        qty: 1,
        order_id: pickedOrder
      })
    });

    const d = await r.json().catch(()=> ({}));

    if(!r.ok){
      throw new Error(d?.error || "فشل صرف المنتج من المخزون");
    }

    const after = Number(d?.qtyAfter ?? d?.after ?? d?.qty ?? (stock - 1)) || 0;
    stockMap[invKey] = Math.max(0, after);

    const cur = boughtInOrder(k, pickedOrder);
    e.byOrder[pickedOrder] = cur + 1;

    e.hist.push({
      order: pickedOrder,
      source: "stock",
      product_key: invKey
    });

    await saveDoneState();

    toast(
      "ok",
      "تم الصرف من المخزون",
      `تم صرف 1 للطلب ${pickedOrder} • المخزون الآن: ${stockMap[invKey]}`,
      2200
    );

    window.render();
  }catch(e){
    toast("err","فشل الصرف", e?.message || String(e), 2600);
  }finally{
    __busyBuy.delete(invKey);
  }
};

  window.openImgModal = function(ev, src, title){
    if(ev) ev.stopPropagation();
    const modal = document.getElementById("imgModal");
    const img = document.getElementById("imgModalImg");
    const ttl = document.getElementById("imgModalTitle");
    if(!modal || !img || !ttl) return;

    ttl.textContent = title || "";
    img.src = src || "";
    img.alt = title || "";
    modal.classList.add("open");
  };

  window.closeImgModal = function(ev){
    if(ev && ev.target && ev.target.closest(".imgModalCard")) return;
    const modal = document.getElementById("imgModal");
    const img = document.getElementById("imgModalImg");
    if(modal) modal.classList.remove("open");
    if(img) img.src = "";
  };

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") window.closeImgModal();
  });

  window.copyImage = async function (ev, imageUrl) {
    ev.stopPropagation();
    try {
      const res = await fetch(imageUrl, { mode: "cors", cache: "no-store" });
      if (!res.ok) throw new Error("Fetch failed: " + res.status);

      const blob = await res.blob();
      if (!blob || !blob.type.startsWith("image/")) throw new Error("Not an image blob");

      await navigator.clipboard.write([ new ClipboardItem({ [blob.type]: blob }) ]);
      toast("ok", "تم النسخ", "الصوره جاهزه للصق في واتساب", 2200);
    } catch (e) {
      toast("err", "تعذر النسخ", "المتصفح/المصدر لا يسمح بنسخ الصوره مباشره", 3200);
      console.error(e);
    }
  };

  window.downloadImage = async function(ev, imageUrl, name){
    ev.stopPropagation();
    try{
      const res = await fetch(imageUrl, { mode:"cors", cache:"no-store" });
      if(!res.ok) throw new Error("Fetch failed: " + res.status);

      const blob = await res.blob();
      const ext = (blob.type.split("/")[1] || "png").replace("jpeg","jpg");
      const safeName = (name || "image").toString().slice(0,40).replace(/[^\w\u0600-\u06FF]+/g,"_");
      const fileName = `${safeName}.${ext}`;

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=> URL.revokeObjectURL(a.href), 2000);

      toast("ok","تم","تم تحميل الصوره", 2000);
    }catch(e){
      toast("err","فشل","تعذر تحميل الصوره", 2600);
      console.error(e);
    }
  };

  window.shareImage = async function(ev, imageUrl, name){
    ev.stopPropagation();

    if(!navigator.share){
      toast("warn","غير مدعوم","المشاركه غير مدعومه في هذا المتصفح", 2400);
      return;
    }

    try{
      const res = await fetch(imageUrl, { mode:"cors", cache:"no-store" });
      if(!res.ok) throw new Error("Fetch failed: " + res.status);

      const blob = await res.blob();
      const ext = (blob.type.split("/")[1] || "png").replace("jpeg","jpg");
      const safeName = (name || "image").toString().slice(0,40).replace(/[^\w\u0600-\u06FF]+/g,"_");
      const file = new File([blob], `${safeName}.${ext}`, { type: blob.type });

      await navigator.share({ title: name || "صوره", files: [file] });
    }catch(e){
      toast("err","فشل","تعذر مشاركه الصوره", 2600);
      console.error(e);
    }
  };
