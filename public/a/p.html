<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<style>
body{
  font-family:'Almarai',sans-serif;
  margin:0;
  padding:0;
}
/* مهم: ثبّت مقاس الورقة الحقيقي */
@page{
  size: 100mm 150mm;  margin: 0;
}

html, body{
  margin:0;
  padding:0;
}

/* خلي container بالمقاس الحقيقي */
.container{
  width:100mm;
  height:150mm;
  border:1px solid #000;
  padding:8mm;
  box-sizing:border-box;
  overflow:hidden;
  border-radius:10px;
  background:#f9f9f9;

  /* لا تفرض page-break هنا */
  page-break-before: auto;
}

/* إعدادات الطباعة */
@media print{
  html, body{
    margin:0 !important;
    padding:0 !important;
    width:100mm;
    height:150mm;
  }

  .container{
    width:100mm !important;
    height:150mm !important;
    margin:0 !important;

    page-break-inside: avoid;
    page-break-after: always; /* صفحة لكل طلب */
  }
}
.logo-container{
  border-bottom:2px solid #000;
  padding:0 0 10px 0;
  margin-bottom:10px;
  text-align:center;
}

.logo{
  max-height:2cm;
  filter:grayscale(100%);
}

.contact-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

.contact-item{
  display:flex;
  align-items:center;
  font-weight:bold;
  font-size:15px;
}

.large-icon{font-size:24px}

.info-title{
  font-size:14px;
  font-weight:bold;
  text-align:center;
  margin:10px 0;
  border-top:1px solid #000;
  padding-top:5px;
}

.table-section{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  margin-bottom:5px;
}

.table-section td{
  border:2px solid #000;
  padding:6px;
  vertical-align:middle;
  background:#fff;
}

.section-title{
  background:#f0f0f0;
  font-weight:bold;
  text-align:center;
}

.order-number{
  font-size:12px;
  font-weight:bold;
  text-align:center;
  margin-top:5px;
  display:none;
}
/* يثبت القياسات ويمنع تمدد الخانات بسبب المحتوى */
.table-section{
  table-layout: fixed;
  width: 100%;
}

/* نفس عرض الخانتين بالضبط */
.table-section td{
  width: 50%;
  padding: 4px 6px;     /* كان 6px — خففناه */
  line-height: 1.1;     /* يقلل الانتفاخ */
}

/* صف الاسم + الهاتف (يصير مثل الأصلي) */
.table-section tr:nth-child(2) td{
  height: 28px;         /* ثبّت ارتفاع الصف */
  white-space: nowrap;  /* يمنع نزول سطر */
  overflow: hidden;
  text-overflow: ellipsis;
}

/* الأيقونات لا تضيف مسافة عمودية */
.table-section i,
.contact-row i{
  line-height: 1;
  display: inline-block;
  vertical-align: middle;
}

.qr-code img{height:20mm}
.barcode-img{height:10mm}
.combined-box{
  border:2px dashed #000;
  padding:8px;
  border-radius:8px;
  background:#fff;
  margin-top:8px;
}
.details-section{
  display:flex;
  gap:10px;
  justify-content:flex-start;
  align-items:center;
}
.details-box{
  padding:10px;
  background:#f9f9f9;
  border:1px solid #ddd;
  text-align:center;
  font-size:14px;
  font-weight:bold;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:0;
}
.address-box{
  padding:12px;
  border:2px solid #000;
  margin-top:8px;
  border-radius:8px;
  background:#fff;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:bold;
  flex-direction:column;
  text-align:center;
  overflow:hidden;
}
.address-text{
  max-width:100%;
}
.office-line{
  font-size:14px;
  font-weight:bold;
  margin-top:8px;
}
.note-line{
  font-size:14px;
  font-weight:bold;
  margin-top:8px;
}
.amount-box{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  font-size:18px;
  font-weight:bold;
  background:#fff;
  border:2px solid #000;
  height:46px;
  margin-top:8px;
  border-radius:8px;
}
.barcode-section,.qr-code{
  width:48%;
  text-align:center;
  margin:0 auto;
}
.barcode-section img,.qr-code img{
  width:28mm;
  height:28mm;
  object-fit:contain;
}
</style>
</head>

<body>

<div id="root"></div>

<script>
(async()=>{

  const url = "/api/print/orders?limit=250&t=" + Date.now();
  const res = await fetch(url, { cache: "no-store" });
  const data = await res.json();
  let orders = data.orders || [];
  const root = document.getElementById("root");

  // ======================
  // TAGS
  // ======================
  function normTags(tags){
    if(Array.isArray(tags)) return tags.map(x=>String(x).trim()).filter(Boolean);
    return String(tags||"").split(",").map(x=>x.trim()).filter(Boolean);
  }
  function hasTag(o,t){ return normTags(o.tags).includes(String(t).trim()); }
  function isArabic(o){ return hasTag(o,"ar"); }
  orders = orders.filter(o => !hasTag(o, "\u0645\u063a\u0644\u0641"));

  function isGinacomOffice(o){
    const shippingMethod = String(o.shipping_method||"").toLowerCase();
    return hasTag(o, "مكتب") || hasTag(o, "office") || shippingMethod.includes("جيناكم") || shippingMethod.includes("ginacom");
  }

  // ======================
  // FILTER (مثل الأصل)
  // ======================
  const mode = (new URLSearchParams(location.search).get("mode") || "all").toLowerCase();
  if (mode === "muscat") orders = orders.filter(o => hasTag(o, "مسقط"));
  else if (mode === "office") orders = orders.filter(o => hasTag(o, "مكتب"));
  else orders = orders.filter(o => hasTag(o, "مسقط") || hasTag(o, "مكتب"));

  // ======================
  // UTILS
  // ======================
  function money(n){ return Number(n||0).toFixed(3); }

  function esc(s){
    return String(s||"").replace(/[&<>"']/g,m=>(
      {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]
    ));
  }

  function oneLine(s){ return String(s||"").replace(/\s+/g," ").trim(); }

  function clampChars(s, max){
    const v = oneLine(s);
    if(!v) return "";
    return v.length > max ? (v.slice(0, max - 1) + "…") : v;
  }

  function cleanName(name){
    const v = oneLine(name);
    if(!v) return "";
    const parts = v.split(" ").filter(Boolean);

    if(parts.length === 2 && parts[0].toLowerCase() === parts[1].toLowerCase()){
      return parts[0];
    }

    // إذا طويل جدًا: الاسم الأول فقط
    const tooLong = v.length > 18 || parts.length > 2;
    if(tooLong) return parts[0];

    return v;
  }

  function cleanPhone(p){
    let v = oneLine(p).replace(/\s+/g,"");
    if (v.length > 8) v = v.replace(/^(\+968|968)/, "");
    return v;
  }

  function cleanAddress(shippingText){
    const s = oneLine(shippingText);
    if(!s) return "";

    const parts = s.split(/,|\n|-/).map(x => x.trim()).filter(Boolean);
    if(parts.length < 2) return s;

    const a1 = parts[0].replace(/\s+/g,"").toLowerCase();
    const city = parts[1].replace(/\s+/g,"").toLowerCase();

    let out = parts;
    if(a1 === city) out = [parts[0], ...parts.slice(2)];
    return out.join(" - ");
  }

  function getAddressText(o){
    const direct = cleanAddress(
      o.shipping ||
      o.address ||
      [o.addressLine, o.cityName || o.city].filter(Boolean).join(", ") ||
      o.shipping_address ||
      ""
    );
    if (direct) return direct;

    const src = o.shippingAddress || o.shipping_address || o.shipping_address_obj || {};
    const parts = [
      src.address1,
      src.address2,
      src.city,
      src.province,
      src.zip
    ].map(oneLine).filter(Boolean);

    return cleanAddress(parts.join(", "));
  }

  function clampLines(lines){
    return `display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:${lines};overflow:hidden;`;
  }

  // ======================
  // PAYMENT (مطابق للأصل)
  // ======================
  function getOutstanding(o){
    const v = o.outstanding ?? o.amountDue ?? o.total_outstanding ?? 0;
    return Number(v || 0) || 0;
  }

  function getFinancialStatus(o){
    return String(o.financial_status || "").toLowerCase().trim();
  }

  function statusLabel(o, f, unpaid){
    const ar = isArabic(o);

    if (f === "pending") return ar ? "انتظار الدفع" : "Unpaid";
    if (f === "paid") return ar ? "مدفوع" : "Paid";
    if (f === "partially_paid") return ar ? "مدفوع جزئياً" : "Part-paid";

    // fallback: لو عليه مبلغ -> انتظار الدفع
    return unpaid > 0 ? (ar ? "انتظار الدفع" : "Pending payment") : (ar ? "مدفوع" : "Paid");
  }

  function paidGatewayIcon(o){
    const tx = Array.isArray(o.transactions) ? o.transactions : [];
    for (const t of tx){
      const g = String(t.gateway || "").toLowerCase();
      if (g.includes("bank") || g.includes("deposit")) return "bi-bank";
      if (g.includes("amwal")) return "bi-credit-card";
      if (g.includes("cod") || g.includes("cash")) return "bi-bank2";
    }
    return "bi-check-circle";
  }

  function statusIcon(o, f){
    if (f === "pending") return "bi-clock-history";
    if (f === "paid") return paidGatewayIcon(o);
    if (f === "partially_paid") return "bi-cash-stack";
    return "bi-info-circle";
  }
function getCountryDialCode(o){

  // أولوية الفوترة
  let c =
    o.billingAddress?.countryCodeV2 ||
    o.billing_country_code ||
    o.billingCountryCode ||
    o.shippingAddress?.countryCodeV2 ||
    o.shipping_country_code ||
    o.shippingCountryCode ||
    "";

  c = String(c).toUpperCase();

  const map = {
    OM: "968",
    AE: "971",
    SA: "966",
    QA: "974",
    KW: "965",
    BH: "973"
  };

  return map[c] || "968"; // افتراضي عمان
}

  // ======================
  // RENDER
  // ======================
  orders.forEach(o=>{

    const ar = isArabic(o);
    const dir = ar ? "rtl" : "ltr";
    const align = ar ? "right" : "left";

    const unpaid = getOutstanding(o);
    const f = getFinancialStatus(o);

    const ginacom = isGinacomOffice(o);

    const addressText = getAddressText(o);
    const noteText = String(o.note || "").trim();
    const amountText = f === "paid" ? statusLabel(o, f, unpaid) : money(unpaid);


    root.insertAdjacentHTML("beforeend",`

<div class="container" style="direction:${dir};text-align:${align}">

  <div class="logo-container">
    <img src="/hb-logo.png" class="logo" alt="Hala Beauty">
  </div>

  <div class="combined-box">
    <div class="details-section">
      <div class="details-box" style="flex-grow:1;">
        <i class="bi bi-person-circle" style="font-size:24px;"></i>
        <div>${esc(cleanName(o.customer) || (ar ? "غير معروف" : "Unknown"))}</div>
      </div>

      <div class="details-box" style="flex-grow:1;">
        <i class="bi bi-phone" style="font-size:24px;"></i>
        <div>${esc(cleanPhone(o.phone))}</div>
      </div>
    </div>
  </div>

  <div class="address-box">
    <i class="bi bi-geo-alt-fill" style="font-size:24px;"></i>
    <div class="address-text" style="${clampLines(ginacom ? 2 : 3)}">${esc(addressText)}</div>
    ${ginacom ? `<div class="office-line"><i class="bi bi-geo-alt" style="font-size:20px;"></i> ${ar ? "مكتب جيناكم" : "Ginacom Office"}</div>` : ""}
    ${noteText ? `<div class="note-line" style="${clampLines(1)}"><i class="bi bi-chat-square-text" style="font-size:20px;"></i> ${esc(clampChars(noteText,45))}</div>` : ""}
  </div>

  <div class="amount-box">
    <i class="bi bi-wallet2" style="font-size:24px;"></i>
    <span>${esc(amountText)}</span>
  </div>

  <div class="combined-box" style="display:flex;justify-content:space-between;gap:8px;">
    <div class="barcode-section">
      <img src="https://barcode.tec-it.com/barcode.ashx?data=${encodeURIComponent(o.name)}&code=Code128" alt="Order Barcode" style="display:block;margin:auto;">
    </div>
    <div class="qr-code">
      ${
        ginacom
        ? `<img src="https://api.qrserver.com/v1/create-qr-code/?data=https://halabt.com/app&size=150x150" alt="QR Code">`
        : `<img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wa.me/${getCountryDialCode(o)}${cleanPhone(o.phone)}&size=150x150" alt="QR Code">`
      }
    </div>
  </div>

</div>
    `);
  });

  // ======================
  // Print after images load
  // ======================
  function waitImagesAndPrint(){
    const imgs = Array.from(document.images);
    let loaded = 0;
    if (imgs.length === 0) return window.print();

    imgs.forEach(img => {
      if (img.complete) {
        loaded++;
        if (loaded === imgs.length) window.print();
      } else {
        img.onload = img.onerror = () => {
          loaded++;
          if (loaded === imgs.length) window.print();
        };
      }
    });
  }

  waitImagesAndPrint();

})();
</script>


 

</body>
</html>
