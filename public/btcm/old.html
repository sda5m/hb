ensureGlobalLoader();

let __netPending = 0;
let __netTimer = null;

function setLoaderText(msg){
  const t = document.getElementById("globalLoaderText");
  if(t) t.textContent = msg || "جاري العمل… اصبر شوي";
}

function showLoader(msg){
  ensureGlobalLoader();
  setLoaderText(msg);
  const el = document.getElementById("globalLoader");
  if(!el) return;

  if(__netTimer) clearTimeout(__netTimer);
  __netTimer = setTimeout(() => {
    if(__netPending > 0){
      el.classList.add("show");
      el.setAttribute("aria-hidden","false");
    }
  }, 180);
}

function hideLoader(){
  const el = document.getElementById("globalLoader");
  if(!el) return;
  if(__netTimer) clearTimeout(__netTimer);
  el.classList.remove("show");
  el.setAttribute("aria-hidden","true");
}

function netBegin(msg){
  __netPending++;
  if(msg) showLoader(msg);   // ✅ لو null ما يظهر
}
  function netEnd(){
  __netPending = Math.max(0, __netPending - 1);
  if(__netPending === 0) hideLoader();
}


function safeJsonBody(init){
  try{
    const b = init?.body;
    if(!b) return null;
    if(typeof b === "string") return JSON.parse(b);

    // دعم FormData / URLSearchParams (احتياط)
    if(b instanceof FormData){
      return {
        tag: b.get("tag"),
        orderId: b.get("orderId"),
        city: b.get("city"),
        toCity: b.get("toCity"),
        destination: b.get("destination"),
        to: b.get("to"),
      };
    }
    if(b instanceof URLSearchParams){
      return {
        tag: b.get("tag"),
        orderId: b.get("orderId"),
      };
    }

    return null;
  }catch{
    return null;
  }
}

function tagMsg(tag){

  if(t === "مسقط") return "جاري التحويل إلى مسقط… اصبر شوي";
  if(t === "تاكيد" || t === "تأكيد") return "جاري التحويل إلى دليلي… اصبر شوي";
  if(t === "مكتب") return "جاري التحويل إلى مكتب… اصبر شوي";

  return `جاري تحديث التاق (${t})… اصبر شوي`;
}

function toast(type, title, msg, ms=2200, opts={}){
  // ✅ هذا التوست صار "احترافي" باستخدام Global Loader نفسه (مع الـ GIF)
  // يدعم key لتحديث نفس التنبيه بدل ما يزيد العدّاد أو يعمل تكرار.
  ensureGlobalLoader();

  window.__proToast = window.__proToast || { byKey: {} };

  const key = (opts && typeof opts.key === "string") ? opts.key : "";
  const sticky = !!(opts && opts.sticky) || ms === 0 || ms === null;

  // نص مختصر واحترافي
  const t = String(title || "").trim();
  const m = String(msg || "").trim();
  const full = (t && m) ? `${t} • ${m}` : (t || m || "جاري العمل… اصبر شوي");

  // ✅ لو فيه نفس المفتاح شغال: فقط حدّث النص
  if(key && window.__proToast.byKey[key]){
    setLoaderText(full);
    // لو انتهى (non-sticky) اقفل بعد ms
    if(!sticky){
      const rec = window.__proToast.byKey[key];
      if(rec.tmr) clearTimeout(rec.tmr);
      rec.tmr = setTimeout(()=>{
        // اقفل نفس المهمة
        delete window.__proToast.byKey[key];
        hideLoader();
      }, ms);
    }
    return;
  }

  // ✅ مهمة جديدة (تحجز slot في netPending عشان ما ينقفل اللودر فجأة)
showLoader(full);

  // لو ما فيه key: اعتبرها مهمة مؤقتة عادية
  if(!key){
    if(!sticky){
      setTimeout(()=> netEnd(), ms);
    }
    return;
  }

  // ✅ مع key: نخزنها عشان نقدر نحدثها/نقفلها لاحقاً
  window.__proToast.byKey[key] = { startedAt: Date.now(), tmr: null };

  if(!sticky){
    window.__proToast.byKey[key].tmr = setTimeout(()=>{
      delete window.__proToast.byKey[key];
      netEnd();
    }, ms);
  }
}
  
  async function postManage(url, body){
    const r = await authFetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
      cache: "no-store",
    });

    const text = await r.text();
    let d = null;
    try { d = text ? JSON.parse(text) : null; }
    catch { d = { raw: text }; }

    if(!r.ok){
      const msg =
        (typeof d?.error === "string" && d.error) ||
        (typeof d?.message === "string" && d.message) ||
        (d?.error && typeof d.error === "object" ? JSON.stringify(d.error) : "") ||
        (d && typeof d === "object" ? JSON.stringify(d) : "") ||
        (text || "Request failed");

      throw new Error(msg);
    }
    return d;
  }

async function ensureTotals(orderId){
  const id = String(orderId);

  state.totalsById = state.totalsById || {};
  const cached = state.totalsById[id];

  // ✅ جاهز
  if(cached && cached.ready) return cached;

  // ✅ في طلب شغال
  if(cached && cached.promise) return await cached.promise;

  // ✅ طلب واحد فقط
  const p = (async ()=>{
    const r = await authFetch(
      "/api/manage/order/" + encodeURIComponent(id) + "/totals",
      { cache:"no-store" }
    );

    const d = await r.json().catch(()=> ({}));
    if(!r.ok) throw new Error(d?.error || "فشل جلب الإجمالي");

    // ✅ الصحيح: نفرد بيانات d داخل الكاش
    const out = { ready:true, ...(d || {}) };
    state.totalsById[id] = out;
    return out;
  })().catch(err=>{
    console.warn("ensureTotals failed", err);
    const out = { ready:true, error:true, current_total_price:0, currency:"" };
    state.totalsById[id] = out;
    return out;
  });

  // خزّن promise لمنع التكرار
  state.totalsById[id] = { promise:p, ready:false, current_total_price:0, currency:"" };

  return await p;
}
  
  // =========================
  // ✅ Phone helpers (+968)
  // =========================
  function phoneDigitsOnly(s){
    return String(s||"").replace(/\D+/g, ""); // يشيل + ومسافات وكل شيء غير رقم
  }

  // يرجع 8 أرقام فقط مثل: 772555556
  function toOmLocal8(input){
    let d = phoneDigitsOnly(input);

    if(d.startsWith("00968")) d = d.slice(5);
    if(d.startsWith("968")) d = d.slice(3);

    // احتياط لو أطول من 8 خذ آخر 8
    if(d.length > 8) d = d.slice(-8);

    return d;
  }

  // عند الحفظ يرجع +968XXXXXXXX
  function toOmInternational(input, fallbackOriginal){
    const local = toOmLocal8(input);
    if(local && local.length === 8) return "+968" + local;

    // لو المستخدم ما كتب شيء، رجّع الأصل كما هو
    return String(fallbackOriginal||"").trim();
  }

function toWhatsAppE164(raw){
  // يرجّع رقم بصيغة دولية بدون +
  // مثال: 96891234567

  let d = String(raw||"").replace(/\D+/g, ""); // يشيل كل غير الأرقام

  // شيل تكرارات مفاتيح عمان
  while (d.startsWith("00968")) d = d.slice(5);
  while (d.startsWith("968968")) d = d.slice(3);

  if (d.startsWith("968")) d = d.slice(3);

  // خذ آخر 8 أرقام
  if (d.length > 8) d = d.slice(-8);

  // لو صار 8 أرقام رجّعه مع 968
  if (d.length === 8) return "968" + d;

  return "";
}

  function normalizeTags(o){
    if(Array.isArray(o.tags)) return o.tags.map(t=>String(t||"").trim()).filter(Boolean);
    if(typeof o.tags === "string") return o.tags.split(",").map(t=>t.trim()).filter(Boolean);

  const tags = normalizeTags(o).map(x => x.toLowerCase());
  return tags.includes(String(t).toLowerCase());

function isDalili(o){ return hasTag(o,"تاكيد") || hasTag(o,"تأكيد"); }
function isMuscat(o){ return hasTag(o,"مسقط"); }

function isPaidOrder(o){
  const fs = String(o?.financial_status || "").toLowerCase();
  if(fs === "paid") return true;
  return hasTag(o, "تحويل");
}
function hasAnyPaid(o){
  // مدفوع كامل/تحويل (زي قبل)
  if (isPaidOrder(o)) return true;

  // مدفوع جزئي: نعتمد على totals إذا جاهزة
  const oid = String(o?.id ?? "");
  const t = state.totalsById?.[oid];
  if(!t || !t.ready) return false;

  const total = Number(t.current_total_price || 0) || 0;
  const outstanding = Number(t.total_outstanding || 0) || 0;
  const paidAmount = Math.max(0, total - outstanding);

  return paidAmount > 0.0005; // يعني دفع حتى لو جزئي
}

function renderOrders(){
  const listEl = $("ordersList");
  const q = (($("qInput")?.value) || "").trim().toLowerCase();

  // =========================
  // Filters
  // =========================
  const MIN_DATE_STR = "2026-02-05";
  const MIN_DATE = new Date(MIN_DATE_STR + "T00:00:00");

  function toDateSafe(v){
    if(!v) return null;
    if(v instanceof Date) return isNaN(v) ? null : v;

    const s = String(v).trim();

    // ISO
    let d = new Date(s);
    if(!isNaN(d)) return d;

    // dd.mm.yyyy OR dd/mm/yyyy OR dd-mm-yyyy
    const m = s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
    if(m){
      const day = Number(m[1]);
      const mon = Number(m[2]);
      const yr  = Number(m[3]);
      d = new Date(yr, mon - 1, day, 0, 0, 0);
      if(!isNaN(d)) return d;
    }
    return null;
  }

  // ✅ Shopify shipped/fulfilled detector (قوي)
  function isShipped(o){
    const fs = String(
      o?.fulfillment_status ||
      o?.displayFulfillmentStatus ||
      o?.fulfillmentStatus ||
      ""
    ).toLowerCase();

    // Shopify REST: fulfillment_status
    if(fs === "fulfilled" || fs === "partial") return true;

    // أي قيمة "shipped/delivered" لو جاية من مكان آخر
    if(["shipped","delivered","out_for_delivery","complete","completed"].includes(fs)) return true;

    // REST: fulfillments array (وجودها يعني صار تنفيذ/شحن)
    if(Array.isArray(o?.fulfillments) && o.fulfillments.length > 0) return true;

    // tracking fields (لو موجودة عندك)
    if(o?.trackingNumber || o?.tracking || o?.tracking_code) return true;

    return false;
  }

  // ✅ Shopify cancelled detector
function isCancelled(o){
  // الحالة الأصلية
  if(o?.cancelled_at || o?.canceled_at) return true;

  const s = String(o?.status || o?.state || o?.orderStatus || "").toLowerCase();
  if(s.includes("cancel")) return true;

  // ✅ جديد: اعتبر التاقات إلغاء
  const tags = (Array.isArray(o?.tags) ? o.tags : (typeof o?.tags==="string" ? o.tags.split(",") : []))
    .map(x => String(x||"").trim().toLowerCase());

  if(tags.includes("cancel")) return true;   // التاق اللي تضيفه
  if(tags.includes("غ")) return true;        // إذا هذا عندك يعني ملغي بدون رسالة

  return false;
}
  
  // =========================
  // Start list
  // =========================
  let list = (Array.isArray(state.orders) ? state.orders : []).slice();

  // ✅ فلترة التاريخ (من 2026-02-05 فما فوق)
  list = list.filter(o => {
    const dt =
      toDateSafe(o.createdAt) ||
      toDateSafe(o.created_at) ||
      toDateSafe(o.date) ||
      toDateSafe(o.created) ||
      null;

    return !!dt && dt >= MIN_DATE;
  });

  // ✅ استبعاد المكنسل
  list = list.filter(o => !isCancelled(o));

  // ✅ استبعاد المشحون/المنفّذ
  list = list.filter(o => !isShipped(o));

  // ✅ البحث
  list = list.filter(o => orderMatchesQuery(o, q));

  // ✅ confirmed / waiting
  if(VIEW === "confirmed"){
    list = list.filter(o => hasRequiredTag(normalizeTags(o)));
  } else {
    list = list.filter(o => !hasRequiredTag(normalizeTags(o)));
  }

  // ✅ اختيار أول طلب تلقائيًا بعد الفلترة
  if(list.length){
    const exists = state.selectedId && list.some(o => String(o.id) === String(state.selectedId));
    if(!exists) state.selectedId = String(list[0].id);
  }

  $("ordersCount").textContent = String(list.length);

  // ✅ لا توجد نتائج
  if(!list.length){
    state.selectedId = null;
    listEl.innerHTML = `<div class="empty">لا توجد طلبات مطابقة.</div>`;
    renderDetail();
    return;
  }

  // ✅ رسم القائمة

  const base = modalItems.reduce((sum,it)=>{

  },0);
  $("emTotal").textContent = "الإجمالي: " + money(base);
}

state.waById = state.waById || {}; // cache: { [id]: { lines, totals } }

function waHasTag(o, t){
  const tags = (Array.isArray(o?.tags) ? o.tags : (typeof o?.tags==="string" ? o.tags.split(",") : []))
    .map(x=>String(x||"").trim().toLowerCase()).filter(Boolean);
  return tags.includes(String(t||"").toLowerCase());
}
function waLang(o){
  // حسب شرطك: وجود ar => عربي، غير ذلك إنجليزي
  return waHasTag(o,"ar") ? "ar" : "en";
}

function waCustomerName(o){
  const full = String(o?.customer || "").trim();
  if(full) return (full.split(/\s+/)[0] || full);
  return "Customer";
}
function waFormattedAddress(o){
  // في Liquid عندك formatted_address — هنا نعوّضها من بيانات السكربت
  const a1 = (o?.address1 || o?.shipping || "").trim();
  const city = (o?.city || "").trim();
  if(!a1 && !city) return "";
  if(a1 && city && a1.includes(city)) return a1;
  return [a1, city].filter(Boolean).join(", ");
}

function waMoney(v){
  // سكربتك عنده money() مستخدمة في totals داخل المودال :contentReference[oaicite:5]{index=5}
  try { if(typeof money === "function") return money(v); } catch {}
  // fallback
  const n = Number(v);
  if(Number.isFinite(n)) return n.toFixed(3) + " OMR";
  return String(v ?? "");
}

function waShippingLabel(amount, lang){
  // Liquid: 0 => مجاني/Free, 1 => نص المكتب, غير ذلك => money :contentReference[oaicite:6]{index=6}
  const a = Number(amount);
  if(a === 0) return (lang==="ar") ? "مجاني" : "Free";
  if(a === 1) return (lang==="ar") ? "1 ريال عُماني (مكتب جيناكم)" : "1 Omani Rial (Jinakom Office)";
  return waMoney(amount);
}

      authFetch("/api/manage/order/" + encodeURIComponent(orderId) + "/lines", { cache:"no-store" }),

    ]);

    out.lines  = Array.isArray(ld?.items) ? ld.items : [];

    if(!tr.ok) totals = null;

  const total = Number(totals?.current_total_price || 0) || 0;
  let outstanding = Number(totals?.total_outstanding || 0) || 0;
  const shipping = Number(totals?.shipping || 0) || 0;

            value="${money(itemsOnly || outstanding)}"
            style="

        const cap = Math.max(outstanding, total);
        if(amt > cap + 0.0005) return showErr(`المبلغ أكبر من المتبقي (${money(cap)})`);

        close({ amount: Number(amt.toFixed(3)) });
      }catch(e){
        showErr(e?.message || String(e));
      }
    });
  });

const pdfShareCache = new Map();
  async function handleSendPdfAction(actBtn, oid, tkey){
  const act = String(actBtn?.getAttribute("data-act") || "").trim();
  if (act !== "send-pdf") return false;

  const order = (state.orders || []).find(x => String(x.id) === String(oid));
  if (!order) {
    toastJobErr(tkey, "لم يتم العثور على الطلب.", 2500);
    return true;
  }

  const prevDisabled = !!actBtn.disabled;
  const prevOpacity = actBtn.style.opacity;
  const prevHtml = actBtn.innerHTML;
  const prevText = actBtn.textContent;

  try {
const orderNumber = String(
  order?.order_number || order?.name || order?.number || oid
).replace("#", "").trim();

const orderTags = normalizeTags(order).map(t => String(t || "").toLowerCase());
const isArabic = orderTags.includes("ar");
const invoiceLabel = isArabic ? "فاتورة الطلب" : "Order Invoice";
const fileName = `${invoiceLabel} - ${orderNumber}.pdf`;
    
    // إذا الفاتورة مجهزة مسبقًا: شاركها فورًا
    const cachedFile = pdfShareCache.get(String(oid));
    if (cachedFile) {
      const hasShare = !!navigator.share;
      const canShareFiles =
        hasShare &&
        (!navigator.canShare || navigator.canShare({ files: [cachedFile] }));

      if (!canShareFiles) {
        toastJobWarn(tkey, "هذا الجهاز أو المتصفح لا يدعم مشاركة PDF مباشرة.", 3000);
        return true;
      }

      await navigator.share({ files: [cachedFile] });
      toastJobOk(tkey, "تمت مشاركة الفاتورة ✅", 1800);
      return true;
    }

    // أول ضغطة: تجهيز فقط
    actBtn.disabled = true;
    actBtn.style.opacity = "0.7";
    actBtn.innerHTML = `<span class="waTxt">جاري تجهيز الفاتورة...</span>`;

    toastJobStart(tkey, "جاري تجهيز ملف الفاتورة… اصبر شوي");

    const res = await fetch(`/api/manage/order/${encodeURIComponent(oid)}/invoice-pdf`, {
      cache: "no-store"
    });

    if (!res.ok) throw new Error("فشل تحميل ملف الفاتورة");

    const blob = await res.blob();
    const file = new File([blob], fileName, { type: "application/pdf" });

    pdfShareCache.set(String(oid), file);

    actBtn.disabled = false;
    actBtn.style.opacity = "";
    actBtn.innerHTML = `<span class="waTxt">مشاركة الفاتورة</span>`;

    toastJobOk(tkey, "تم تجهيز الفاتورة ✅ اضغط مرة ثانية للمشاركة", 2500);

  } catch (e) {
    if (e?.name === "AbortError") {
      toastJobWarn(tkey, "تم إلغاء المشاركة.", 1800);
    } else {
      toastJobErr(tkey, e?.message || "فشل إنشاء PDF", 3200);
    }

    actBtn.disabled = prevDisabled;
    actBtn.style.opacity = prevOpacity || "";
    actBtn.innerHTML = prevHtml || prevText || "PDF";
  }

  return true;
}

const MOBILE_MAX_W = 900;

function isMobile(){
  return window.matchMedia(`(max-width:${MOBILE_MAX_W}px)`).matches;
}

function smoothScrollTo(el){
  if(!el) return;
  el.scrollIntoView({ behavior:"smooth", block:"start" });
}

function goToDetailPanel(){
  if(!isMobile()) return;
  const detail = document.getElementById("detailPanel");
  smoothScrollTo(detail);
  document.getElementById("mobileScrollTop")?.classList.add("show");
}

function goToOrdersPanel(){
  if(!isMobile()) return;
  const orders = document.getElementById("ordersPanel");
  smoothScrollTo(orders);
  document.getElementById("mobileScrollTop")?.classList.remove("show");
}

// زر الرجوع للأعلى
document.getElementById("mobileScrollTop")?.addEventListener("click", () => {
  goToOrdersPanel();
});

// لو رجع المستخدم فوق يدويًا، أخفِ الزر عند ظهور الطلبات
window.addEventListener("scroll", () => {
  if(!isMobile()) return;

  const btn = document.getElementById("mobileScrollTop");
  const orders = document.getElementById("ordersPanel");
  if(!btn || !orders) return;

  const r = orders.getBoundingClientRect();
  if(r.top >= -20 && r.top <= 120){
    btn.classList.remove("show");
  }
}, { passive:true });

        shipMethod === "free" ? "شحن مجاني" :
        shipMethod === "dalili" ? "دليلي" :
        "مكتب جيناكم";

      // 0) حدّث منتجات الـ Draft أولاً
      await postManage("/api/manage/draft/items/set", {
        draftId: state.draftId,
        items: modalItems
      });

      // 1) أنشئ الطلب مرة واحدة فقط (بدون تكرار)
      const cr = await postManage("/api/manage/draft/create_order", {
        draftId: state.draftId,
        shippingPrice,
        shippingTitle,
        discountCode,
        discountType,
        discountValue
      });

      const newOrderId = String(cr?.newOrderId || "");
      if (!newOrderId) throw new Error("تم إنشاء الطلب لكن لم يصل newOrderId");

      state.editOrderId = newOrderId; // ✅ أهم سطر

      await loadOrders();

      // افتح الطلب الجديد للتعديل فورًا (أفضل)
      const newOrder = state.orders.find(o => String(o.id) === newOrderId);
      if (newOrder) {
        openModal();
        await fillEditModal(newOrder);
        toast("ok", "جاهز", "أنت الآن تعدّل على الطلب الجديد.", 1600);
      } else {
        toast("warn", "تنبيه", "تم إنشاء الطلب الجديد. افتحه من القائمة للتعديل.", 3500);
        closeModal();
      }

    } catch (e) {
      toast("err", "خطأ", e?.message || String(e), 4500);
      console.error(e);
    }
  };
}

// ✅ هنا نغلق try/catch الخاص بـ emCancelCopy
} catch (e) {
  toast("err", "خطأ", e?.message || String(e), 4500);
  console.error(e);
} finally {
  _cancelCopyBusy = false;

  const btn = $("emCancelCopy");
  if (btn) {
    btn.disabled = false;
    btn.style.opacity = "1";
  }
}
});
  
// =========================
// ✅ Save (Modal) - FULL REPLACE (data + items)
// =========================
function _norm(v){
  return String(v ?? "").trim().replace(/\s+/g, " ");
}
function _same(a,b){
  return _norm(a) === _norm(b);
}

$("emSave")?.addEventListener("click", async () => {
  try {

    if(state.mode === "draft"){
      toast("warn","تنبيه","أنت في وضع إنشاء طلب جديد. استخدم زر (إنشاء الطلب الجديد).", 3500);
      return;
    }

    if(!state.editOrderId){
      toast("err","خطأ","لا يوجد طلب محدد للحفظ.", 3000);
      return;
    }
    // ✅ الاسم (ضروري)
    const first = String($("emLastName")?.value || "").trim();   // الاسم
    const last  = String($("emFirstName")?.value || "").trim();  // اللقب (اختياري)
    if(!first){
      toast("warn","تنبيه","الاسم ضروري.", 2500);
      return;
    }

    const city     = _norm($("emCity")?.value || "");
    const address1 = _norm($("emAddress1")?.value || "");
    const note     = _norm($("emNote")?.value || "");

    const phone = toOmInternational(
      $("emPhone")?.value || "",
      originalForm?.phone || ""
    );

    // =========================
    // ✅ 1) هل بيانات العميل تغيرت؟
    // ملاحظة: originalForm عندك مخزّن معكوس (الاسم في lastName واللقب في firstName)
    // =========================
    const oldData = {
      firstName: _norm(originalForm?.lastName || ""),   // الاسم
      lastName:  _norm(originalForm?.firstName || ""),  // اللقب
      phone:     _norm(originalForm?.phone || ""),
      city:      _norm(originalForm?.city || ""),
      address1:  _norm(originalForm?.address1 || ""),
      note:      _norm(originalForm?.note || ""),
    };

    const newData = {
      firstName: _norm(first),
      lastName:  _norm(last),
      phone:     _norm(phone),
      city,
      address1,
      note,
    };

    const dataChanged =
      !_same(newData.firstName, oldData.firstName) ||
      !_same(newData.lastName,  oldData.lastName)  ||
      !_same(newData.phone,     oldData.phone)     ||
      !_same(newData.city,      oldData.city)      ||
      !_same(newData.address1,  oldData.address1)  ||
      !_same(newData.note,      oldData.note);

    // =========================
    // ✅ 2) جهّز عمليات تعديل المنتجات (ops)
    // =========================
const ops = [];

for (const it of (modalItems || [])) {
  const qty = Number(it?.qty || 0) || 0;

  // ✅ عنصر قديم داخل الطلب
  if (!it?.isNew && (it?.lineItemGid || it?.variantGid)) {
    const orig = Number(it?.origQty ?? qty) || 0;

    // ✅ لا ترسل شيء إذا ما تغيّر
    if (qty === orig) continue;

    if (qty <= 0) {
      ops.push({
        type: "remove",
        lineItemGid: it.lineItemGid || "",
        variantGid: it.variantGid || ""
      });
    } else {
      ops.push({
        type: "set_qty",
        lineItemGid: it.lineItemGid || "",
        variantGid: it.variantGid || "",
        quantity: qty
      });
    }
    continue;
  }

  // ✅ عنصر جديد من البحث
  if (it?.isNew && it?.variantGid) {
    // اعتبر origQty = 0 للجديد
    if (qty > 0) {
      ops.push({ type: "add", variantGid: it.variantGid, quantity: qty });
    }
  }
}

const itemsChanged = ops.length > 0;
// =========================
// ✅ 3) احفظ بيانات العميل فقط إذا تغيرت
// =========================
if (dataChanged) {
  toast("info","جاري","حفظ بيانات العميل...", 1200);

  await postManage("/api/manage/order/update", {
    orderId: state.editOrderId,
    firstName: newData.firstName,
    lastName: newData.lastName,
    phone,
    city: newData.city,
    address1: newData.address1,
    note: newData.note,
  });

  const ord = state.orders.find(o => String(o.id) === String(state.editOrderId));
  if (ord) {
    ord.customer = [newData.firstName, newData.lastName]
      .filter(Boolean)
      .join(" ")
      .trim();

    ord.phone = phone;
    ord.city = newData.city;
    ord.address1 = newData.address1;
    ord.shipping = newData.address1;
    ord.note = newData.note;
  }

  originalForm = {
    firstName: newData.firstName,
    lastName: newData.lastName,
    phone,
    city: newData.city,
    address1: newData.address1,
    note: newData.note,
  };
}  
const savedOrderId = state.editOrderId;

closeModal();

state.selectedId = savedOrderId;

renderOrders();
renderDetail();
    
// =========================
// ✅ 4) احفظ المنتجات فقط إذا فيه ops
// =========================
if (itemsChanged) {
  toast("info", "جاري", "حفظ المنتجات...", 1200);
  
  console.log("SAVE orderId =", state.editOrderId);
  
  await postManage("/api/manage/order/edit", {
    orderId: state.editOrderId,
    notifyCustomer: false,
    staffNote: "edit from manage-orders",
    ops
  });

  for (const it of (modalItems || [])) {
    if (!it?.isNew) it.origQty = Number(it.qty || 0) || 0;
  }

  toast("ok", "تم", "تم حفظ المنتجات ✅", 1400);
} else {
  toast("ok", "تم", "تم حفظ البيانات ✅", 1400);
}

closeModal();
await loadOrders();
    
  } catch (e) {
    const msg = String(e?.message || e || "");
    if (msg.toLowerCase().includes("at least one change")) {
      toast("warn", "تنبيه", "لا يوجد أي تغيير للحفظ.", 2600);
    } else {
      toast("err", "خطأ", msg || "فشل الحفظ", 4500);
    }
    console.error(e);
  }
});
  
// ✅ تحميل الطلبات (يدعم تحديث خفيف)
async function loadOrders(opts = {}){
  const silent = !!opts.silent;

  try{
    if(!assertDom()) return;

    // في التحديث العادي فقط: اعرض سكيلتون/نصوص التحميل
    if(!silent){
      $("statusBadge").textContent = "جاري التحميل...";
      $("ordersList").innerHTML = `<div class="empty">جاري تحميل الطلبات...</div>`;
      $("ordersCount").textContent = "0";
    }

    // ✅ في silent: استخدم _authFetch لتجاوز الـ Loader حق authFetch
    const fetcher = silent ? _authFetch : authFetch;

    const r = await fetcher(API_URL, { cache:"no-store" });
    const d = await r.json().catch(()=> ({}));
    if(!r.ok) throw new Error(d?.error || "فشل تحميل الطلبات");

    state.orders = Array.isArray(d.orders) ? d.orders : [];
    setToggleButton();

    // ✅ احسب فقط (مؤكدة + انتظار) بدون مشحون وبدون ملغي
    const base = state.orders.filter(o =>
      !o?.cancelled_at &&
      !(String(o?.fulfillment_status||"").toLowerCase() === "fulfilled" ||
        String(o?.fulfillment_status||"").toLowerCase() === "partial" ||
        (Array.isArray(o?.fulfillments) && o.fulfillments.length))
    );

    const waitingCount   = base.filter(o => !hasRequiredTag(normalizeTags(o))).length;
    const confirmedCount = base.filter(o =>  hasRequiredTag(normalizeTags(o))).length;

    // ✅ حدّث البادج (حتى في silent عادي)
$("statusBadge").innerHTML = `
  <div class="badgeStats">

    <div class="badgeStat wait" title="انتظار">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M12 6v6l4 2"></path>
        <circle cx="12" cy="12" r="9"></circle>
      </svg>
      <b>${waitingCount}</b>
    </div>

    <div class="badgeStat ok" title="مؤكدة">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M20 6 9 17l-5-5"></path>
      </svg>
      <b>${confirmedCount}</b>
    </div>

    <div class="badgeStat all" title="المجموع">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M4 6h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 18h16"></path>
      </svg>
      <b>${waitingCount + confirmedCount}</b>
    </div>

  </div>
`;

    renderOrders();
    renderDetail();

  }catch(e){
    console.error(e);
    // في silent لا نخرب الشاشة برسالة كبيرة
    if(!opts?.silent){
      $("statusBadge").textContent = "خطأ ❌";
      $("ordersList").innerHTML = `<div class="empty">فشل تحميل الطلبات</div>`;
      toast("err","خطأ", e?.message || String(e), 4000);
    }
  }
}
  
  // Init
  loadOrders();
</script>
