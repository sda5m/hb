<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>هلا بيوتي | التطبيق</title>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://app.halabt.com/">
  <meta property="og:title" content="هلا بيوتي | التطبيق">
  <meta property="og:description" content="وقتكِ للجمال يبدأ هنا. تسوّقي منتجات العناية المختارة بسهولة عبر تطبيق هلا بيوتي.">
  <meta property="og:image" content="https://cdn.shopify.com/s/files/1/0619/3915/5027/files/dapp.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }
  </style>

  <script>
    (function () {
      var ua = navigator.userAgent.toLowerCase();

      var androidApp = "https://play.google.com/store/apps/details?id=com.btime.app";
      var iosApp = "https://halabt.com";
      var website = "https://halabt.com/";

      var storeLink = website;
      var triedToOpenStore = false;

      if (ua.indexOf("android") !== -1) {
        storeLink = androidApp;
      } else if (/iphone|ipad|ipod/.test(ua)) {
        storeLink = iosApp;
      }

      window.addEventListener("pageshow", function () {
        if (triedToOpenStore) {
          window.location.replace(website);
        }
      });

      window.addEventListener("load", function () {
        triedToOpenStore = true;

        setTimeout(function () {
          window.location.href = storeLink;
        }, 200);

        setTimeout(function () {
          window.location.replace(website);
        }, 2500);
      });
    })();
  </script>
</head>
<body></body>
</html>
