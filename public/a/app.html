<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HB | Hala Beauty | حملات التطبيق</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#6B0083;--soft:#FDD8C2;--ink:#25102d;--muted:#76657b;--line:#eadff0;--bg:#fbf7fb;--ok:#18845c;--danger:#c43757;--rose:#fff4f7}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#fff0f5,transparent 34%),linear-gradient(180deg,#fff,var(--bg));font-family:Cairo,system-ui,sans-serif;color:var(--ink)}
    button,input,textarea,select{font:inherit} button{cursor:pointer}
    .page{width:min(1160px,calc(100% - 20px));margin:12px auto 28px}
    .top,.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 34px rgba(107,0,131,.075);padding:16px}
    .top{position:sticky;top:8px;z-index:3;display:flex;justify-content:space-between;gap:12px;align-items:center}
    h1,h2{margin:0;font-weight:950} h1{font-size:22px} h2{font-size:18px;margin-bottom:12px}.sub{color:var(--muted);font-size:13px;font-weight:800;margin-top:3px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.wide{grid-column:1/-1}
    .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:900}
    .field.full{grid-column:1/-1}.field input,.field textarea,.field select{border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:#fff;outline:none;color:var(--ink);font-weight:800;transition:.18s ease}
    .field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(107,0,131,.45);box-shadow:0 0 0 3px rgba(107,0,131,.08)}
    textarea{min-height:92px;resize:vertical}.check{display:flex;gap:8px;align-items:center;font-weight:900;color:var(--ink);min-height:44px}
    .btn{border:0;border-radius:12px;min-height:40px;padding:0 14px;font-weight:950;background:#f3e8f7;color:var(--brand);box-shadow:0 7px 18px rgba(107,0,131,.06)}
    .btn.primary{background:linear-gradient(135deg,var(--brand),#9d36b1);color:#fff}.btn.danger{background:#fff0f4;color:var(--danger);box-shadow:none}
    .topLinks{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}.topLinks .btn{text-decoration:none;display:inline-flex;align-items:center;gap:8px}.topLinks svg{width:19px;height:19px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.status{padding:8px 12px;border-radius:999px;background:#fff3eb;color:var(--brand);font-weight:950;font-size:12px}
    .list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;background:linear-gradient(180deg,#fff,#fffafd);display:grid;grid-template-columns:1fr auto;gap:10px}
    .badge{display:inline-flex;border-radius:999px;padding:4px 9px;background:#f5edf7;color:var(--brand);font-size:12px;font-weight:950;margin-inline-start:5px}
    .customerSearch{grid-column:1/-1;border:1px solid var(--line);border-radius:18px;padding:10px;background:#fffafc}
    .customerResults{display:grid;gap:8px;max-height:230px;overflow:auto;margin-top:8px}
    .customerPick{border:1px solid var(--line);border-radius:14px;background:#fff;padding:9px;text-align:inherit;color:inherit}
    .customerPick.selected{border-color:var(--brand);box-shadow:0 0 0 3px rgba(107,0,131,.12)}
    .title{font-weight:950}.meta{color:var(--muted);font-size:12px;font-weight:800;margin-top:4px}.preview{border:1px dashed var(--line);border-radius:16px;min-height:96px;display:grid;place-items:center;overflow:hidden;color:var(--muted);font-weight:800;background:var(--rose)}
    .preview img{width:100%;max-height:180px;object-fit:cover;display:block}.msg{display:none;margin-top:10px;border-radius:14px;padding:10px;font-weight:850}.msg.ok{display:block;background:#eafaf3;color:var(--ok)}.msg.err{display:block;background:#fff0f4;color:var(--danger)}
    @media(max-width:860px){.grid,.fields{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<main class="page">
  <section class="top">
    <div><h1>حملات التطبيق</h1><div class="sub">تنبيهات، عروض، كوبونات شخط، وتحديث التطبيق من السيرفر</div></div>
    <div class="topLinks">
      <a class="btn" href="notifications.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        الإشعارات
      </a>
      <a class="btn" href="reviews.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="fill:#f5b301;stroke:#d99a00;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round">
          <path d="m12 2.8 2.85 5.78 6.38.93-4.62 4.5 1.09 6.36L12 17.37l-5.7 3 1.09-6.36-4.62-4.5 6.38-.93L12 2.8Z"></path>
        </svg>
        التقييمات
      </a>
      <a class="btn" href="credit.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M20 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"></path>
          <path d="M16 12h6"></path>
          <path d="M6 7V5a2 2 0 0 1 2-2h9"></path>
        </svg>
        الرصيد
      </a>
      <a class="btn" href="rewards.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M12 3 14.4 8l5.4.8-3.9 3.8.9 5.4L12 15.5 7.2 18l.9-5.4-3.9-3.8 5.4-.8L12 3Z"></path>
          <path d="M8 21h8"></path>
        </svg>
        النقاط
      </a>
      <a class="btn" href="auto-notifications.html">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M4 5h16"></path>
          <path d="M4 12h10"></path>
          <path d="M4 19h7"></path>
          <path d="m17 14 3 3-3 3"></path>
        </svg>
        قوالب الاشعارات
      </a>
      <div class="status" id="status">جاهز</div>
    </div>
  </section>

  <section class="grid">
    <div class="card">
      <h2>إعداد التحديث</h2>
      <div class="fields">
        <label class="check"><input id="uEnabled" type="checkbox"> تفعيل فحص التحديث</label>
        <label class="check"><input id="uForce" type="checkbox"> تحديث إجباري</label>
        <label class="field">أقل build مسموح<input id="uMin" type="number" min="0"></label>
        <label class="field">آخر build متوفر<input id="uLatest" type="number" min="0"></label>
        <label class="field full">رابط Google Play<input id="uAndroid"></label>
        <label class="field full">رابط App Store<input id="uIos"></label>
        <label class="field">العنوان عربي<input id="uTitleAr"></label>
        <label class="field">English title<input id="uTitleEn"></label>
        <label class="field full">النص عربي<textarea id="uBodyAr"></textarea></label>
        <label class="field full">English body<textarea id="uBodyEn"></textarea></label>
      </div>
      <div class="actions"><button class="btn primary" id="saveUpdate">حفظ التحديث</button></div>
    </div>

    <div class="card">
      <h2>حملة جديدة</h2>
      <form id="campaignForm" class="fields">
        <input id="cId" type="hidden">
        <label class="check"><input id="cEnabled" type="checkbox" checked> مفعلة</label>
        <label class="field">النوع<select id="cType"><option value="bottom_notice">تنبيه سفلي</option><option value="image_popup">منبثقة صورة</option><option value="scratch_coupon">كوبون شخط</option></select></label>
        <label class="field">الجمهور<select id="cAudience"><option value="all">الجميع</option><option value="customer">عميل محدد</option><option value="country">بلد محدد</option></select></label>
        <label class="field">الأولوية<input id="cPriority" type="number" value="0"></label>
        <div class="customerSearch">
          <label class="field full">بحث العميل
            <input id="customerQ" placeholder="اكتب الاسم أو الإيميل أو الهاتف أو رقم الطلب">
          </label>
          <div class="actions" style="margin-top:0"><button class="btn" id="customerSearchBtn" type="button">بحث واختيار العميل</button></div>
          <div class="customerResults" id="customerResults"></div>
        </div>
        <label class="field">Customer ID<input id="cCustomerId" placeholder="يتم تعبئته بعد اختيار العميل"></label>
        <label class="field">Email<input id="cCustomerEmail" placeholder="يتم تعبئته بعد اختيار العميل"></label>
        <label class="field">البلد<input id="cCountry" placeholder="OM / SA / AE"></label>
        <label class="field">الكوبون<input id="cCoupon"></label>
        <label class="field">العنوان عربي<input id="cTitleAr"></label>
        <label class="field">English title<input id="cTitleEn"></label>
        <label class="field full">النص عربي<textarea id="cBodyAr"></textarea></label>
        <label class="field full">English body<textarea id="cBodyEn"></textarea></label>
        <label class="field">زر عربي<input id="cButtonAr" placeholder="تسوق الآن"></label>
        <label class="field">Button EN<input id="cButtonEn" placeholder="Shop now"></label>
        <label class="field">تلميح الشخط<input id="cScratchHintAr" placeholder="اسحبي بلطف"></label>
        <label class="field">Scratch hint EN<input id="cScratchHintEn" placeholder="Swipe softly"></label>
        <label class="field">نص النسخ<input id="cCopiedTextAr" placeholder="تم نسخ الكود"></label>
        <label class="field">Copied text EN<input id="cCopiedTextEn" placeholder="Code copied"></label>
        <label class="field full">الرابط<input id="cLink" placeholder="https://halabt.com/collections/..."></label>
        <label class="field">يبدأ<input id="cStart" type="datetime-local"></label>
        <label class="field">ينتهي<input id="cEnd" type="datetime-local"></label>
        <label class="field">قاعدة الظهور<select id="cShowRule"><option value="once_per_campaign">مرة لكل حملة</option><option value="always">كل فتح للتطبيق</option></select></label>
        <label class="field">الصورة<input id="cImage" type="file" accept="image/*"></label>
        <label class="field">ارتفاع الصورة<input id="cImageHeight" type="number" min="90" max="260" value="150"></label>
        <label class="field">ارتفاع كرت الشخط<input id="cScratchHeight" type="number" min="68" max="120" value="84"></label>
        <label class="field">مكان الملاحظة<select id="cPosition"><option value="bottom">تحت</option><option value="top">فوق</option><option value="center">وسط</option></select></label>
        <label class="field">شفافية الخلفية<input id="cOpacity" type="number" min="0.35" max="1" step="0.05" value="1"></label>
        <label class="field">لون الخلفية<input id="cBackgroundColor" type="color" value="#6B0083"></label>
        <label class="field">Popup width<input id="cModalWidth" type="number" min="260" max="430" value="360"></label>
        <label class="field">Panel color<input id="cPanelColor" type="color" value="#FFFFFF"></label>
        <label class="field">Panel opacity<input id="cPanelOpacity" type="number" min="0.05" max="1" step="0.05" value="1"></label>
        <label class="field">Panel radius<input id="cPanelRadius" type="number" min="8" max="34" value="22"></label>
        <label class="field">Panel padding<input id="cPanelPadding" type="number" min="0" max="28" value="14"></label>
        <label class="field">Image top tilt<input id="cImageTopTilt" type="number" min="-42" max="42" value="0"></label>
        <label class="field">Image bottom tilt<input id="cImageBottomTilt" type="number" min="-42" max="42" value="0"></label>
        <label class="field">لون النص<input id="cTextColor" type="color" value="#FFFFFF"></label>
        <label class="field">خلفية الأيقونة<input id="cIconBackgroundColor" type="color" value="#FDD8C2"></label>
        <label class="field">لون الأيقونة<input id="cIconColor" type="color" value="#6B0083"></label>
        <div class="preview full" id="preview">لا توجد صورة</div>
      </form>
      <div class="actions"><button class="btn primary" id="saveCampaign">حفظ الحملة</button><button class="btn" id="resetForm">تفريغ</button></div>
    </div>

    <div class="card wide">
      <h2>الحملات</h2>
      <div class="list" id="list"></div>
      <div class="msg" id="msg"></div>
    </div>
  </section>
</main>

<script type="module">
  import { requirePackLogin, authFetch } from "./auth.js";
  if (!requirePackLogin()) throw new Error("login required");
  const $ = id => document.getElementById(id);
  let campaigns = [];
  const setStatus = v => $("status").textContent = v;
  const esc = v => String(v || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
  const msg = (t, ok=true) => { $("msg").className = "msg " + (ok ? "ok" : "err"); $("msg").textContent = t; };
  function isoLocal(v){ if(!v) return ""; const d = new Date(v); if(Number.isNaN(d.getTime())) return ""; return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16); }
  function ensurePlatformUpdateFields(){
    if ($("uAndroidLatest")) return;
    const latest = $("uLatest")?.closest("label");
    if (!latest) return;
    latest.insertAdjacentHTML("afterend", `
      <label class="field">Android min build<input id="uAndroidMin" type="number" min="0"></label>
      <label class="field">Android latest build<input id="uAndroidLatest" type="number" min="0"></label>
      <label class="field">iOS min build<input id="uIosMin" type="number" min="0"></label>
      <label class="field">iOS latest build<input id="uIosLatest" type="number" min="0"></label>
    `);
  }
  ensurePlatformUpdateFields();
  function readUpdate(){
    return {
      enabled:$("uEnabled").checked, forceUpdate:$("uForce").checked, minBuild:$("uMin").value, latestBuild:$("uLatest").value,
      androidMinBuild:$("uAndroidMin").value, androidLatestBuild:$("uAndroidLatest").value,
      iosMinBuild:$("uIosMin").value, iosLatestBuild:$("uIosLatest").value,
      androidUrl:$("uAndroid").value, iosUrl:$("uIos").value, titleAr:$("uTitleAr").value, bodyAr:$("uBodyAr").value,
      titleEn:$("uTitleEn").value, bodyEn:$("uBodyEn").value
    };
  }
  function fillUpdate(u){
    const pickNum = (...values) => {
      for (const value of values) {
        if (value !== undefined && value !== null && value !== "") return value;
      }
      return 0;
    };
    $("uEnabled").checked = !!u.enabled; $("uForce").checked = !!u.forceUpdate; $("uMin").value = pickNum(u.minBuild); $("uLatest").value = pickNum(u.latestBuild);
    $("uAndroidMin").value = pickNum(u.androidMinBuild, u.minBuild); $("uAndroidLatest").value = pickNum(u.androidLatestBuild, u.latestBuild);
    $("uIosMin").value = pickNum(u.iosMinBuild, u.minBuild); $("uIosLatest").value = pickNum(u.iosLatestBuild, u.latestBuild);
    $("uAndroid").value = u.androidUrl || ""; $("uIos").value = u.iosUrl || ""; $("uTitleAr").value = u.titleAr || ""; $("uBodyAr").value = u.bodyAr || "";
    $("uTitleEn").value = u.titleEn || ""; $("uBodyEn").value = u.bodyEn || "";
  }
  function readCampaignForm(){
    const fd = new FormData();
    const toIso = v => v ? new Date(v).toISOString() : "";
    fd.append("id", $("cId").value); fd.append("enabled", $("cEnabled").checked); fd.append("type", $("cType").value); fd.append("audience", $("cAudience").value);
    fd.append("priority", $("cPriority").value); fd.append("customerId", $("cCustomerId").value); fd.append("customerEmail", $("cCustomerEmail").value); fd.append("countryCode", $("cCountry").value);
    fd.append("coupon", $("cCoupon").value); fd.append("titleAr", $("cTitleAr").value); fd.append("titleEn", $("cTitleEn").value); fd.append("bodyAr", $("cBodyAr").value); fd.append("bodyEn", $("cBodyEn").value);
    fd.append("buttonAr", $("cButtonAr").value); fd.append("buttonEn", $("cButtonEn").value); fd.append("link", $("cLink").value); fd.append("startAt", toIso($("cStart").value)); fd.append("endAt", toIso($("cEnd").value));
    fd.append("scratchHintAr", $("cScratchHintAr").value); fd.append("scratchHintEn", $("cScratchHintEn").value); fd.append("copiedTextAr", $("cCopiedTextAr").value); fd.append("copiedTextEn", $("cCopiedTextEn").value);
    fd.append("showRule", $("cShowRule").value); fd.append("imageHeight", $("cImageHeight").value); fd.append("scratchHeight", $("cScratchHeight").value);
    fd.append("position", $("cPosition").value); fd.append("opacity", $("cOpacity").value); fd.append("backgroundColor", $("cBackgroundColor").value);
    fd.append("modalWidth", $("cModalWidth").value); fd.append("panelColor", $("cPanelColor").value); fd.append("panelOpacity", $("cPanelOpacity").value);
    fd.append("panelRadius", $("cPanelRadius").value); fd.append("panelPadding", $("cPanelPadding").value); fd.append("imageTopTilt", $("cImageTopTilt").value); fd.append("imageBottomTilt", $("cImageBottomTilt").value);
    fd.append("textColor", $("cTextColor").value); fd.append("iconBackgroundColor", $("cIconBackgroundColor").value); fd.append("iconColor", $("cIconColor").value);
    if($("cImage").files[0]) fd.append("image", $("cImage").files[0]); return fd;
  }
  function fillCampaign(c={}){
    $("cId").value = c.id || ""; $("cEnabled").checked = c.enabled !== false; $("cType").value = c.type || "bottom_notice"; $("cAudience").value = c.audience || "all";
    $("cPriority").value = c.priority || 0; $("cCustomerId").value = c.customerId || ""; $("cCustomerEmail").value = c.customerEmail || ""; $("cCountry").value = c.countryCode || "";
    $("cCoupon").value = c.coupon || ""; $("cTitleAr").value = c.titleAr || ""; $("cTitleEn").value = c.titleEn || ""; $("cBodyAr").value = c.bodyAr || ""; $("cBodyEn").value = c.bodyEn || "";
    $("cButtonAr").value = c.buttonAr || ""; $("cButtonEn").value = c.buttonEn || ""; $("cLink").value = c.link || ""; $("cStart").value = isoLocal(c.startAt); $("cEnd").value = isoLocal(c.endAt);
    $("cScratchHintAr").value = c.scratchHintAr || ""; $("cScratchHintEn").value = c.scratchHintEn || ""; $("cCopiedTextAr").value = c.copiedTextAr || ""; $("cCopiedTextEn").value = c.copiedTextEn || "";
    $("cShowRule").value = c.showRule || "once_per_campaign"; $("cImageHeight").value = c.imageHeight || 150; $("cScratchHeight").value = c.scratchHeight || 84;
    $("cPosition").value = c.position || "bottom"; $("cOpacity").value = c.opacity || 1; $("cBackgroundColor").value = c.backgroundColor || "#6B0083";
    $("cModalWidth").value = c.modalWidth || 360; $("cPanelColor").value = c.panelColor || "#FFFFFF"; $("cPanelOpacity").value = c.panelOpacity || 1;
    $("cPanelRadius").value = c.panelRadius || 22; $("cPanelPadding").value = c.panelPadding || 14; $("cImageTopTilt").value = c.imageTopTilt || 0; $("cImageBottomTilt").value = c.imageBottomTilt || 0;
    $("cTextColor").value = c.textColor || "#FFFFFF"; $("cIconBackgroundColor").value = c.iconBackgroundColor || "#FDD8C2"; $("cIconColor").value = c.iconColor || "#6B0083";
    $("preview").innerHTML = c.imageUrl ? `<img src="${esc(c.imageUrl)}">` : "لا توجد صورة";
  }
  function renderCustomers(customers){
    const root = $("customerResults");
    if(!customers.length){ root.innerHTML = "<div class='meta'>لا توجد نتائج</div>"; return; }
    root.innerHTML = customers.map((c,i) => `
      <button class="customerPick" type="button" data-i="${i}">
        <div class="title">${esc(c.displayName || c.email || "عميل")}</div>
        <div class="meta">${esc(c.email || "")} ${c.phone ? " • " + esc(c.phone) : ""} ${c.matchedOrder?.name ? " • طلب " + esc(c.matchedOrder.name) : ""}</div>
      </button>
    `).join("");
    root.querySelectorAll(".customerPick").forEach(btn => {
      btn.onclick = () => {
        const c = customers[Number(btn.dataset.i)];
        $("cAudience").value = "customer";
        $("cCustomerId").value = c.id || "";
        $("cCustomerEmail").value = c.email || "";
        root.querySelectorAll(".customerPick").forEach(x => x.classList.remove("selected"));
        btn.classList.add("selected");
      };
    });
  }
  async function searchCustomer(){
    const q = $("customerQ").value.trim();
    if(!q) return;
    $("customerResults").innerHTML = "<div class='meta'>جاري البحث...</div>";
    const r = await authFetch("/pro/customer-credit/search?q=" + encodeURIComponent(q), {cache:"no-store"});
    const data = await r.json().catch(() => ({}));
    if(!r.ok){ $("customerResults").innerHTML = "<div class='meta'>تعذر البحث</div>"; return; }
    renderCustomers(data.customers || []);
  }
  function render(){
    $("list").innerHTML = campaigns.map(c => `
      <div class="item">
        <div>
          <div class="title">${esc(c.titleAr || c.titleEn || c.id)} <span class="badge">${esc(c.type)}</span> <span class="badge">${esc(c.audience)}</span> ${c.enabled ? "" : '<span class="badge">متوقفة</span>'}</div>
          <div class="meta">${esc(c.bodyAr || c.bodyEn || "")}</div>
          <div class="meta">ظهور: ${c.stats?.view || 0} | إغلاق: ${c.stats?.dismiss || 0} | ضغط: ${c.stats?.click || 0} | شخط: ${c.stats?.scratch || 0}</div>
        </div>
        <div class="actions"><button class="btn" data-edit="${esc(c.id)}">تعديل</button><button class="btn danger" data-del="${esc(c.id)}">حذف</button></div>
      </div>`).join("") || "<div class='meta'>لا توجد حملات</div>";
    document.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => fillCampaign(campaigns.find(c => c.id === b.dataset.edit)));
    document.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => { if(confirm("حذف الحملة؟")){ await authFetch(`/pro/app-campaigns/campaign/${encodeURIComponent(b.dataset.del)}/delete`, {method:"POST"}); await load(); }});
  }
  async function load(){
    setStatus("تحميل...");
    const r = await authFetch("/pro/app-campaigns/admin", {cache:"no-store"}); const data = await r.json();
    if(!r.ok) throw new Error(data.error || "فشل التحميل");
    fillUpdate(data.update || {}); campaigns = data.campaigns || []; render(); setStatus("جاهز");
  }
  $("saveUpdate").onclick = async () => { setStatus("حفظ..."); const r = await authFetch("/pro/app-campaigns/update", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(readUpdate())}); if(!r.ok) return msg("فشل حفظ التحديث", false); await load(); msg("تم حفظ إعداد التحديث"); };
  $("saveCampaign").onclick = async () => { setStatus("حفظ..."); const r = await authFetch("/pro/app-campaigns/campaign", {method:"POST", body:readCampaignForm()}); const d = await r.json().catch(()=>({})); if(!r.ok) return msg(d.error || "فشل حفظ الحملة", false); fillCampaign({}); await load(); msg("تم حفظ الحملة"); };
  $("resetForm").onclick = () => fillCampaign({});
  $("customerSearchBtn").onclick = searchCustomer;
  $("customerQ").addEventListener("keydown", e => { if(e.key === "Enter") searchCustomer(); });
  $("cImage").onchange = () => { const f=$("cImage").files[0]; $("preview").innerHTML = f ? `<img src="${URL.createObjectURL(f)}">` : "لا توجد صورة"; };
  load().catch(e => msg(e.message, false));
</script>
</body>
</html>
