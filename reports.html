<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Hala Beauty | قائمة شراء المنتجات</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --purple:#6B0FA6;
      --purpleDark:#3C0A63;
      --peach:#F1C6B1;
      --ink:#101828;
      --muted:#667085;

      --card:rgba(255,255,255,.92);
      --line:rgba(16,24,40,.10);
      --shadow:0 12px 30px rgba(16,24,40,.12);
      --shadow2:0 8px 18px rgba(16,24,40,.10);

      --r16:16px;
      --r18:18px;

      --ok:#16a34a;
      --warn:#f59e0b;
      --err:#ef4444;
      --info:#2563eb;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:"Cairo",system-ui,sans-serif;
      color:var(--ink);
      background:
        linear-gradient(180deg, rgba(60,10,99,.55), rgba(241,198,177,.35)),
        url("d.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 14px 26px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 14px;
      border-radius:var(--r18);
      background:var(--card);
      box-shadow:var(--shadow2);
      border:1px solid var(--line);
      backdrop-filter: blur(6px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .brandMark{
      width:44px;
      height:44px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: linear-gradient(135deg, rgba(107,15,166,.16), rgba(241,198,177,.22));
      border:1px solid rgba(107,15,166,.18);
      flex:0 0 auto;
    }

    .brandText{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .brandName{
      font-size:18px;
      font-weight:900;
      margin:0;
      line-height:1.2;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brandName .b1{ color:var(--purple); }
    .brandName .b2{ color:var(--peach); }

    .brandSub{
      font-size:12.5px;
      color:var(--muted);
      font-weight:800;
      line-height:1.2;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background: rgba(107,15,166,.10);
      color: var(--purpleDark);
      border:1px solid rgba(107,15,166,.18);
      white-space:nowrap;
    }

    .card{
      margin-top:14px;
      padding:14px;
      border-radius:var(--r18);
      background:var(--card);
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      backdrop-filter: blur(6px);
    }

    .label{
      font-size:13px;
      color:var(--muted);
      font-weight:900;
      margin:0 0 10px 0;
    }

    .controls{
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap:12px;
    }

    .box{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      background:#fff;
      border:1px solid rgba(16,24,40,.12);
      box-shadow:0 6px 14px rgba(16,24,40,.08);
      min-width:0;
    }
    .box input{
      border:none;
      outline:none;
      background:transparent;
      width:100%;
      font-size:15px;
      font-weight:900;
      color:var(--ink);
      min-width:0;
      font-family:"Cairo",system-ui,sans-serif;
    }
    .box input::placeholder{ color: rgba(102,112,133,.9); font-weight:800; }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 12px;
      cursor:pointer;
      font-weight:900;
      font-size:15px;
      font-family:"Cairo",system-ui,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:.15s;
      user-select:none;
      width:100%;
    }
    .btn:active{ transform:scale(.985); }
    .btnPrimary{
      background: linear-gradient(135deg, var(--purple), var(--purpleDark));
      color:#fff;
      box-shadow:0 10px 22px rgba(107,15,166,.22);
    }
    .btnGhost{
      background:#f2f4f7;
      color:var(--purpleDark);
      border:1px dashed rgba(60,10,99,.30);
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .hint{
      margin-top:10px;
      font-size:12.5px;
      font-weight:900;
      color:rgba(16,24,40,.62);
      line-height:1.55;
    }

    .stats{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    .stat{
      background:#fff;
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 6px 14px rgba(16,24,40,.06);
      border-radius:14px;
      padding:10px 12px;
    }
    .statLbl{ font-size:12px; font-weight:950; color:rgba(16,24,40,.55); }
    .statVal{ margin-top:3px; font-weight:980; color:var(--purpleDark); font-size:16px; }

    .grid{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:12px;
    }
    @media (min-width: 720px){
      .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .controls{ grid-template-columns: 1.5fr 1fr; }
    }
    @media (max-width:420px){
      .controls{ grid-template-columns:1fr; }
      .row2{ grid-template-columns:1fr; }
      .grid{ grid-template-columns:1fr; }
      .stats{ grid-template-columns:1fr; }
    }

    .item{
      background:#fff;
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 10px 22px rgba(16,24,40,.10);
      border-radius:18px;
      overflow:hidden;
      position:relative;
      transition:.15s;
    }
    .item:active{ transform:scale(.99); }

    .imgWrap{
      position:relative;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, rgba(107,15,166,.08), rgba(241,198,177,.18));
      overflow:hidden;
    }
    .imgWrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition: .18s;
    }

    .meta{
      padding:10px 12px 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .name{
      font-weight:980;
      font-size:13.5px;
      line-height:1.45;
      color:var(--ink);
      min-height: 42px;
    }

    .bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .qty{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      background: rgba(241,198,177,.35);
      color: var(--purpleDark);
      border:1px solid rgba(241,198,177,.65);
      white-space:nowrap;
    }

    .chk{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:950;
      background: rgba(107,15,166,.10);
      color: var(--purpleDark);
      border:1px solid rgba(107,15,166,.18);
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
    }
    .chk input{
      width:18px;
      height:18px;
      accent-color: var(--purple);
      cursor:pointer;
    }

    /* ✅ حالة تم الشراء */
    .item.done{
      opacity:.78;
      border-color: rgba(16,24,40,.12);
    }
    .item.done .imgWrap img{
      filter: grayscale(1) contrast(1) brightness(.95);
      opacity:.9;
    }
    .item.done .name{
      text-decoration: line-through;
      color: rgba(16,24,40,.55);
    }

    /* Toasts */
    .toasts{
      position:fixed;
      bottom:14px;
      left:14px;
      right:14px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:12px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 14px 32px rgba(16,24,40,.18);
      backdrop-filter: blur(8px);
      transform: translateY(12px);
      opacity:0;
      animation: toastIn .22s ease-out forwards;
    }
    @keyframes toastIn{ to { transform: translateY(0); opacity:1; } }
    .toast.out{ animation: toastOut .18s ease-in forwards; }
    @keyframes toastOut{ to { transform: translateY(12px); opacity:0; } }
    .toast .icon{
      width:34px;
      height:34px;
      border-radius:12px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      color:#fff;
    }
    .toast .body{ min-width:0; flex:1 1 auto; }
    .toast .title{ margin:0; font-size:13px; font-weight:950; line-height:1.2; }
    .toast .msg{ margin:3px 0 0 0; font-size:12.5px; font-weight:900; color:rgba(16,24,40,.72); line-height:1.45; }
    .toast .x{
      border:none; background:transparent; cursor:pointer; padding:4px; margin-top:-2px;
      border-radius:10px; color:rgba(16,24,40,.55);
    }
    .toast.ok   .icon{ background:linear-gradient(135deg,#22c55e,#16a34a); }
    .toast.err  .icon{ background:linear-gradient(135deg,#f87171,#ef4444); }
    .toast.warn .icon{ background:linear-gradient(135deg,#fbbf24,#f59e0b); }
    .toast.info .icon{ background:linear-gradient(135deg,#60a5fa,#2563eb); }

    .bar{ margin-top:10px; height:3px; border-radius:999px; background:rgba(16,24,40,.10); overflow:hidden; direction:rtl; }
    .bar > i{ display:block; height:100%; width:100%; background:rgba(16,24,40,.25); transform-origin:right center; animation: shrink linear forwards; }
    @keyframes shrink{ to{ transform:scaleX(0); } }
  </style>
</head>

<body>
  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="true"></div>

  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="brandMark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" style="fill:none;stroke:var(--purple);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M12 7v6l4 2"></path>
            <circle cx="12" cy="12" r="9" style="stroke:var(--peach)"></circle>
          </svg>
        </div>
        <div class="brandText">
          <p class="brandName"><span class="b1">Beauty</span><span class="b2">time</span></p>
          <div class="brandSub">قائمة شراء المنتجات • حسب تاقات الطلبات</div>
        </div>
      </div>

      <div class="badge" title="التاقات الحالية">
        <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M20 13V7a2 2 0 0 0-2-2h-6l-8 8 6 6 8-8Z"></path>
          <circle cx="15" cy="9" r="1.5"></circle>
        </svg>
        <span id="tagsBadge">مسقط, تاكيد, مكتب</span>
      </div>
    </div>

    <div class="card">
      <p class="label">التاقات + البحث + عرض المتبقي</p>

      <div class="controls">
        <div class="box">
          <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:rgba(60,10,99,.65);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M20 13V7a2 2 0 0 0-2-2h-6l-8 8 6 6 8-8Z"></path>
            <circle cx="15" cy="9" r="1.5"></circle>
          </svg>
          <input id="tagsInput" placeholder="اكتب التاقات مفصولة بفاصلة مثال: مسقط,تاكيد,مكتب" value="مسقط,تاكيد,مكتب">
        </div>

        <button class="btn btnPrimary" onclick="loadProducts()">
          <svg width="20" height="20" viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <path d="M21 21H3"></path>
            <path d="M12 3v10"></path>
            <path d="M8 11l4 4 4-4"></path>
          </svg>
          جلب القائمة
        </button>
      </div>

      <div class="row2">
        <div class="box">
          <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:rgba(60,10,99,.65);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3-3"></path>
          </svg>
          <input id="searchInput" placeholder="ابحث باسم المنتج..." oninput="render()">
        </div>

        <button class="btn btnGhost" onclick="toggleOnlyRemaining()">
          <span id="onlyRemainingTxt">عرض المتبقي فقط</span>
        </button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="statLbl">إجمالي المنتجات</div>
          <div class="statVal" id="statTotal">0</div>
        </div>
        <div class="stat">
          <div class="statLbl">تم الشراء</div>
          <div class="statVal" id="statDone">0</div>
        </div>
        <div class="stat">
          <div class="statLbl">المتبقي</div>
          <div class="statVal" id="statLeft">0</div>
        </div>
      </div>

      <div class="hint">
        ✅ ضع علامة (تم الشراء) لأي منتج — ستتحول الصورة إلى رمادي وتُحفظ تلقائيًا على نفس الجهاز.<br>
        💡 اضغط على الكرت نفسه لتبديل الحالة بسرعة.
      </div>
    </div>

    <div class="card">
      <p class="label">المنتجات</p>
      <div id="grid" class="grid"></div>
    </div>
  </div>

<script>
  // =========================
  // State
  // =========================
  let products = [];          // { name, quantity, image }
  let onlyRemaining = false;  // filter
  let doneMap = {};           // key => true

  // Storage key depends on tags (so each list has its own checkmarks)
  function storageKey(tags){
    return "bt_reports_done__" + (tags || "").trim();
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  function toast(type, title, msg, ms = 2200){
    const wrap = document.getElementById("toasts");
    if (!wrap) return;

    const el = document.createElement("div");
    el.className = `toast ${type}`;

    const iconSvg = {
      ok:   `<svg width="20" height="20" viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><path d="M20 7l-11 11-5-5"/></svg>`,
      err:  `<svg width="20" height="20" viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><path d="M6 6l12 12"/><path d="M18 6L6 18"/></svg>`,
      warn: `<svg width="20" height="20" viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 4.3h3.4L22 20H2z"/></svg>`,
      info: `<svg width="20" height="20" viewBox="0 0 24 24" style="fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><path d="M12 8h.01"/><path d="M11 12h1v6h1"/><circle cx="12" cy="12" r="10"/></svg>`
    }[type] || "";

    el.innerHTML = `
      <div class="icon">${iconSvg}</div>
      <div class="body">
        <p class="title">${escapeHtml(title || "")}</p>
        <p class="msg">${escapeHtml(msg || "")}</p>
        <div class="bar"><i style="animation-duration:${ms}ms"></i></div>
      </div>
      <button class="x" aria-label="إغلاق" title="إغلاق">
        <svg width="18" height="18" viewBox="0 0 24 24" style="fill:none;stroke:rgba(16,24,40,.55);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round">
          <path d="M6 6l12 12"/><path d="M18 6L6 18"/>
        </svg>
      </button>
    `;

    const close = () => {
      el.classList.add("out");
      setTimeout(()=> el.remove(), 170);
    };
    el.querySelector(".x").onclick = close;

    wrap.prepend(el);
    setTimeout(close, ms);
  }

  function getTags(){
    const t = document.getElementById("tagsInput").value || "";
    // normalize spaces
    return t.split(",").map(x => x.trim()).filter(Boolean).join(",");
  }

  function loadDoneState(tags){
    try{
      doneMap = JSON.parse(localStorage.getItem(storageKey(tags)) || "{}") || {};
    }catch(e){
      doneMap = {};
    }
  }

  function saveDoneState(tags){
    localStorage.setItem(storageKey(tags), JSON.stringify(doneMap || {}));
  }

  function keyOf(p){
    // stable key by name
    return (p?.name || "").toString().trim().toLowerCase();
  }

  function toggleDoneByKey(tags, k){
    if(!k) return;
    if(doneMap[k]) delete doneMap[k];
    else doneMap[k] = true;
    saveDoneState(tags);
  }

  function toggleOnlyRemaining(){
    onlyRemaining = !onlyRemaining;
    document.getElementById("onlyRemainingTxt").textContent = onlyRemaining ? "عرض الكل" : "عرض المتبقي فقط";
    render();
  }

  async function loadProducts(){
    const tags = getTags();
    document.getElementById("tagsBadge").textContent = tags || "-";
    loadDoneState(tags);

    const url = "/api/reports/unshipped-products?tags=" + encodeURIComponent(tags || "مسقط,تاكيد,مكتب") + "&limit=250";

    toast("info","جاري","جلب المنتجات...", 1200);

    const r = await fetch(url, { cache:"no-store" });
    const d = await r.json();

    if(!r.ok){
      toast("err","فشل", d?.error || "تعذر جلب البيانات", 3200);
      return;
    }

    products = Array.isArray(d.products) ? d.products : [];
    // Sort: remaining first, then qty desc
    products.sort((a,b) => (b.quantity||0) - (a.quantity||0));

    toast("ok","تم","تم جلب " + products.length + " منتج", 1200);
    render();
  }

  function render(){
    const tags = getTags();
    const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();

    const grid = document.getElementById("grid");
    if(!grid) return;

    let list = products.slice();

    // search
    if(q){
      list = list.filter(p => (p.name || "").toString().toLowerCase().includes(q));
    }

    // only remaining
    if(onlyRemaining){
      list = list.filter(p => !doneMap[keyOf(p)]);
    }

    // stats
    const total = products.length;
    const done = products.filter(p => doneMap[keyOf(p)]).length;
    const left = total - done;
    document.getElementById("statTotal").textContent = String(total);
    document.getElementById("statDone").textContent = String(done);
    document.getElementById("statLeft").textContent = String(left);

    if(!list.length){
      grid.innerHTML = `<div style="grid-column:1/-1;background:#fff;border:1px dashed rgba(16,24,40,.18);border-radius:16px;padding:14px;text-align:center;font-weight:900;color:rgba(16,24,40,.62)">لا توجد منتجات مطابقة</div>`;
      return;
    }

    grid.innerHTML = list.map(p => {
      const name = (p.name || "").toString();
      const qty = Number(p.quantity || 0) || 0;
      const img = (p.image || "").toString();

      const k = keyOf(p);
      const checked = !!doneMap[k];

      // placeholder if no image
      const imgTag = img
        ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(name)}" loading="lazy">`
        : `<div style="width:100%;height:100%;display:grid;place-items:center;color:rgba(60,10,99,.65);font-weight:950">لا توجد صورة</div>`;

      return `
        <div class="item ${checked ? "done":""}" onclick="onCardClick(event,'${escapeHtml(k)}')">
          <div class="imgWrap">${imgTag}</div>
          <div class="meta">
            <div class="name">${escapeHtml(name)}</div>
            <div class="bottom">
              <div class="qty">الكمية: <b>${qty}</b></div>
              <label class="chk" onclick="event.stopPropagation()">
                <input type="checkbox" ${checked ? "checked":""} onchange="onToggle('${escapeHtml(k)}')">
                تم الشراء
              </label>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function onToggle(k){
    const tags = getTags();
    toggleDoneByKey(tags, k);
    render();
  }

  function onCardClick(ev, k){
    // avoid double toggling when clicking checkbox
    const t = ev.target;
    if(t && (t.tagName === "INPUT" || t.closest("label.chk"))) return;
    onToggle(k);
  }

  // Auto-load once
  window.addEventListener("load", () => {
    // If there are query params tags=...
    const u = new URL(location.href);
    const qp = u.searchParams.get("tags");
    if(qp){
      document.getElementById("tagsInput").value = qp;
      document.getElementById("tagsBadge").textContent = qp;
    }
    loadProducts();
  });
</script>
</body>
</html>
