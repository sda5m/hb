<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Hala Beauty | إشعارات العملاء</title>
  <link rel="manifest" href="/a/promaxa.json">
  <meta name="theme-color" content="#123A7A">
  <link rel="apple-touch-icon" href="/a/ico1.png">
  <link rel="icon" href="/a/ico2.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#123A7A;--blue2:#1D56A8;--ink:#172033;--muted:#6E7A91;
      --bg:#F4F7FB;--card:#fff;--line:#E4EAF3;--soft:#EAF2FF;
      --ok:#15865A;--danger:#C9385A;--shadow:0 14px 34px rgba(18,58,122,.10);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink)}
    body{
      font-family:"Cairo",system-ui,sans-serif;
      background:radial-gradient(circle at 10% 0%,rgba(29,86,168,.12),transparent 26%),linear-gradient(180deg,#fff 0%,var(--bg) 100%);
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .page{width:min(1080px,calc(100% - 18px));margin:10px auto 28px}
    .top,.card{
      background:rgba(255,255,255,.94);border:1px solid var(--line);
      border-radius:24px;box-shadow:var(--shadow);padding:14px;
    }
    .top{position:sticky;top:8px;z-index:10;backdrop-filter:blur(14px)}
    .head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{width:46px;height:46px;border-radius:16px;background:#fff;border:1px solid var(--line);overflow:hidden}
    .logo img{width:100%;height:100%;object-fit:cover;display:block}
    h1{margin:0;font-size:20px;line-height:1.1;font-weight:950}
    .sub{margin-top:4px;color:var(--muted);font-size:12px;font-weight:800}
    .status{min-height:38px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;background:var(--soft);color:var(--blue);font-size:12px;font-weight:900;border:1px solid #D8E7FF;white-space:nowrap}
    .grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:12px;margin-top:14px}
    .sectionTitle{margin:0 0 10px;font-size:17px;font-weight:950}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .tab{min-height:48px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--blue);font-weight:950}
    .tab.active{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-color:transparent}
    .field{display:grid;gap:6px;margin-bottom:10px;color:var(--muted);font-size:12px;font-weight:900}
    .field input,.field textarea,.field select{
      width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);
      padding:12px;font-weight:850;outline:none;
    }
    .field input,.field select{min-height:50px}
    .field textarea{min-height:104px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 112px;gap:8px}
    .btn{min-height:50px;border:none;border-radius:16px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#EEF4FF;color:var(--blue);font-weight:950}
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .results{display:grid;gap:8px;max-height:420px;overflow:auto;padding-inline-end:2px}
    .customer{border:1px solid var(--line);border-radius:17px;padding:10px;background:#fff;text-align:inherit;color:inherit}
    .customer.selected{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(29,86,168,.12)}
    .name{font-size:15px;font-weight:950}
    .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;color:var(--muted);font-size:12px;font-weight:800}
    .pill{padding:5px 8px;border-radius:999px;background:#F3F6FA;border:1px solid var(--line)}
    .preview{border:1px dashed #BFD0EA;background:#F8FBFF;border-radius:18px;min-height:150px;display:grid;place-items:center;overflow:hidden;color:var(--muted);font-weight:850;text-align:center}
    .preview img{width:100%;height:100%;max-height:260px;object-fit:cover;display:block}
    .msg{margin-top:10px;border-radius:16px;padding:10px 12px;font-size:13px;font-weight:850;display:none}
    .msg.ok{display:block;background:#ECFBF5;color:var(--ok);border:1px solid #BEEBD9}
    .msg.err{display:block;background:#FFF1F4;color:var(--danger);border:1px solid #FFD1DA}
    .hint{color:var(--muted);font-size:12px;font-weight:850;line-height:1.7}
    .hidden{display:none!important}
    @media(max-width:820px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.status{display:none}}
  </style>
</head>
<body>
  <main class="page">
    <section class="top">
      <div class="head">
        <div class="brand">
          <div class="logo"><img src="/a/ico1.png" alt=""></div>
          <div>
            <h1>إشعارات العملاء</h1>
            <div class="sub">إرسال Push للجميع أو لعميل محدد مع صورة اختيارية</div>
          </div>
        </div>
        <div class="status" id="status">جاهز</div>
      </div>
    </section>

    <section class="grid">
      <aside class="card">
        <h2 class="sectionTitle">المستلمين</h2>
        <div class="tabs">
          <button class="tab active" id="allTab" type="button">الجميع</button>
          <button class="tab" id="customerTab" type="button">عميل محدد</button>
        </div>

        <div id="customerBox" class="hidden">
          <div class="row">
            <label class="field">
              بحث العميل
              <input id="q" type="search" placeholder="إيميل، هاتف، رقم طلب">
            </label>
            <button class="btn" id="searchBtn" type="button">بحث</button>
          </div>
          <div class="results" id="results"></div>
        </div>

        <p class="hint" id="targetHint">سيتم الإرسال لكل العملاء الذين فتحوا التطبيق وتم حفظ FCM token لهم.</p>
      </aside>

      <section class="card">
        <h2 class="sectionTitle">محتوى الإشعار</h2>
        <label class="field">
          العنوان العربي
          <input id="titleAr" maxlength="120" placeholder="مثال: عرض جديد من هلا بيوتي">
        </label>
        <label class="field">
          النص العربي
          <textarea id="bodyAr" maxlength="600" placeholder="اكتب نص الإشعار"></textarea>
        </label>
        <label class="field">
          English title اختياري
          <input id="titleEn" maxlength="120" placeholder="New Hala Beauty offer">
        </label>
        <label class="field">
          English body اختياري
          <textarea id="bodyEn" maxlength="600" placeholder="Notification body"></textarea>
        </label>
        <label class="field">
          رابط اختياري
          <input id="link" placeholder="https://app.halabt.com/">
        </label>
        <label class="field">
          صورة اختيارية
          <input id="image" type="file" accept="image/*">
        </label>
        <div class="preview" id="preview">لا توجد صورة</div>
        <button class="btn primary" id="sendBtn" type="button" style="width:100%;margin-top:12px">إرسال الإشعار</button>
        <div id="msg" class="msg"></div>
      </section>
    </section>
  </main>

  <script type="module">
    import { requirePackLogin, authFetch } from "./auth.js";
    if (!requirePackLogin()) throw new Error("login required");

    const $ = (id) => document.getElementById(id);
    const state = { audience:"all", selected:null, customers:[] };

    function setStatus(v){ $("status").textContent = v; }
    function esc(v){ return String(v || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
    function msg(text, ok){ const el=$("msg"); el.className="msg " + (ok ? "ok" : "err"); el.textContent=text; }
    function clearMsg(){ $("msg").className="msg"; $("msg").textContent=""; }
    function setAudience(a){
      state.audience = a;
      $("allTab").classList.toggle("active", a === "all");
      $("customerTab").classList.toggle("active", a === "customer");
      $("customerBox").classList.toggle("hidden", a !== "customer");
      state.selected = a === "all" ? null : state.selected;
      $("targetHint").textContent = a === "all"
        ? "سيتم الإرسال لكل العملاء الذين فتحوا التطبيق وتم حفظ FCM token لهم."
        : (state.selected ? `المستلم: ${state.selected.displayName || state.selected.email || state.selected.id}` : "اختر العميل من البحث قبل الإرسال.");
      renderCustomers();
    }
    function renderCustomers(){
      const root = $("results");
      if (state.audience !== "customer") return;
      if (!state.customers.length) {
        root.innerHTML = "";
        return;
      }
      root.innerHTML = state.customers.map((c,i) => `
        <button class="customer ${state.selected?.id === c.id ? "selected" : ""}" type="button" data-i="${i}">
          <div class="name">${esc(c.displayName || "عميل")}</div>
          <div class="meta">
            ${c.email ? `<span class="pill">${esc(c.email)}</span>` : ""}
            ${c.phone ? `<span class="pill">${esc(c.phone)}</span>` : ""}
            ${c.matchedOrder?.name ? `<span class="pill">طلب ${esc(c.matchedOrder.name)}</span>` : ""}
          </div>
        </button>
      `).join("");
      root.querySelectorAll(".customer").forEach(btn => {
        btn.onclick = () => {
          state.selected = state.customers[Number(btn.dataset.i)];
          setAudience("customer");
        };
      });
    }
    async function search(){
      const q = $("q").value.trim();
      if(!q) return;
      clearMsg();
      setStatus("جاري البحث...");
      $("searchBtn").disabled = true;
      try{
        const r = await authFetch("/pro/customer-credit/search?q=" + encodeURIComponent(q), { cache:"no-store" });
        const data = await r.json().catch(() => ({}));
        if(!r.ok) throw new Error(data.error || "فشل البحث");
        state.customers = data.customers || [];
        state.selected = null;
        renderCustomers();
        setStatus(`نتائج: ${state.customers.length}`);
        if(!state.customers.length) msg("لا توجد نتائج", false);
      }catch(e){
        setStatus("خطأ");
        msg(e.message || "فشل البحث", false);
      }finally{
        $("searchBtn").disabled = false;
      }
    }
    async function send(){
      clearMsg();
      if(state.audience === "customer" && !state.selected){
        msg("اختر العميل أولاً", false);
        return;
      }
      const titleAr = $("titleAr").value.trim();
      const bodyAr = $("bodyAr").value.trim();
      const titleEn = $("titleEn").value.trim();
      const bodyEn = $("bodyEn").value.trim();
      if(!(titleAr || titleEn) || !(bodyAr || bodyEn)){
        msg("اكتب العنوان والنص", false);
        return;
      }
      const fd = new FormData();
      fd.append("audience", state.audience);
      if(state.selected) fd.append("customerId", state.selected.id);
      fd.append("titleAr", titleAr);
      fd.append("bodyAr", bodyAr);
      fd.append("titleEn", titleEn);
      fd.append("bodyEn", bodyEn);
      fd.append("link", $("link").value.trim());
      if($("image").files[0]) fd.append("image", $("image").files[0]);

      $("sendBtn").disabled = true;
      setStatus("جاري الإرسال...");
      try{
        const r = await authFetch("/pro/customer-notifications/send", { method:"POST", body:fd });
        const data = await r.json().catch(() => ({}));
        if(!r.ok) throw new Error(data.error || "فشل الإرسال");
        setStatus("تم");
        msg(`تم الإرسال: ${data.sent || 0}، فشل: ${data.failed || 0}، الإجمالي: ${data.total || 0}`, !!data.sent);
      }catch(e){
        setStatus("خطأ");
        msg(e.message || "فشل الإرسال", false);
      }finally{
        $("sendBtn").disabled = false;
      }
    }

    $("allTab").onclick = () => setAudience("all");
    $("customerTab").onclick = () => setAudience("customer");
    $("searchBtn").onclick = search;
    $("sendBtn").onclick = send;
    $("q").addEventListener("keydown", e => { if(e.key === "Enter") search(); });
    $("image").onchange = () => {
      const file = $("image").files[0];
      if(!file){ $("preview").textContent = "لا توجد صورة"; return; }
      const url = URL.createObjectURL(file);
      $("preview").innerHTML = `<img src="${url}" alt="">`;
    };
  </script>
</body>
</html>
