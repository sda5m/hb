<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HB | Hala Beauty | تأكيد الطلبات</title>
 
  <link rel="manifest" href="/a/promaxa.json">
  <meta name="theme-color" content="#6b0083">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="تأكيد الطلبات">
  <link rel="apple-touch-icon" href="/a/ico1.png">
  <link rel="icon" href="/a/ico2.png">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --purple:#6B0FA6;
      --purpleDark:#3C0A63;
      --peach:#F1C6B1;
      --ink:#101828;
      --muted:#667085;
  --btMain:#6b0083;
  --btSoft:#fdd8c2;

      --card:rgba(255,255,255,.92);
      --line:rgba(16,24,40,.10);
      --shadow:0 12px 30px rgba(16,24,40,.12);
      --shadow2:0 8px 18px rgba(16,24,40,.10);
      --r18:18px;

      --ok:#16a34a;
      --warn:#f59e0b;
      --err:#ef4444;
      --info:#2563eb;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:"Cairo",system-ui,sans-serif;
      color:var(--ink);
      background:
        linear-gradient(180deg, rgba(60,10,99,.55), rgba(241,198,177,.35)),
        url("d.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .wrap{
      width:100%;
      max-width:100%;
      margin:0;
      padding:18px 24px 26px;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px; border-radius:var(--r18);
      background:var(--card); box-shadow:var(--shadow2);
      border:1px solid var(--line); backdrop-filter: blur(6px);
    }

    .leftActions{ display:flex; align-items:center; gap:10px; }

    .iconBtn{
      width:44px; height:44px; border-radius:14px;
      border:1px solid rgba(16,24,40,.10);
      background:rgba(255,255,255,.85);
      box-shadow:0 8px 18px rgba(16,24,40,.08);
      cursor:pointer;
      display:grid; place-items:center;
      transition:.15s;
    }
    .iconBtn:active{ transform:scale(.98); }

    .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
    .brandMark{
      width:44px;height:44px;border-radius:14px;
      background: linear-gradient(135deg, rgba(107,15,166,.16), rgba(241,198,177,.22));
      border:1px solid rgba(107,15,166,.18);
      overflow:hidden; display:grid; place-items:center;
    }
    .brandIcon{ width:100%; height:100%; object-fit:cover; display:block; }
    .brandName{
      font-size:18px;font-weight:900;margin:0;line-height:1.2;letter-spacing:.2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brandName .b1{ color:var(--purple); }
    .brandName .b2{ color:var(--peach); }
    .brandSub{ font-size:12.5px; color:var(--muted); font-weight:800; }

    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:999px;
      font-size:12px; font-weight:900;
      background: rgba(107,15,166,.10);
      color: var(--purpleDark);
      border:1px solid rgba(107,15,166,.18);
      white-space:nowrap;
    }

    .card{
      margin-top:14px; padding:14px; border-radius:var(--r18);
      background:var(--card); box-shadow:var(--shadow);
      border:1px solid var(--line); backdrop-filter: blur(6px);
    }

    .label{ font-size:13px; color:var(--muted); font-weight:900; margin:0 0 10px 0; }

    .controls{
      display:grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap:12px;
    }
    @media (max-width:800px){ .controls{ grid-template-columns:1fr; } }

    .box{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:14px; background:#fff;
      border:1px solid rgba(16,24,40,.12);
      box-shadow:0 6px 14px rgba(16,24,40,.08);
    }
    .box input{
      border:none; outline:none; background:transparent; width:100%;
      font-size:15px; font-weight:900; color:var(--ink);
      font-family:"Cairo",system-ui,sans-serif;
    }
    .box input::placeholder{ color: rgba(102,112,133,.9); font-weight:800; }

    .btn{
      border:none; border-radius:14px; padding:12px 12px;
      cursor:pointer; font-weight:900; font-size:15px;
      font-family:"Cairo",system-ui,sans-serif;
      display:flex; align-items:center; justify-content:center; gap:10px;
      transition:.15s; user-select:none; width:100%;
    }
    .btn:active{ transform:scale(.985); }
    .btnPrimary{
      background: linear-gradient(135deg, var(--purple), var(--purpleDark));
      color:#fff; box-shadow:0 10px 22px rgba(107,15,166,.22);
    }
    .btnGhost{
      background:#f2f4f7; color:var(--purpleDark);
      border:1px dashed rgba(60,10,99,.30);
    }

    .layout{
      margin-top:12px;
      display:grid;
      grid-template-columns: 1fr .95fr;
      gap:12px;
    }
    @media (max-width:900px){ .layout{ grid-template-columns:1fr; } }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r18);
      box-shadow:var(--shadow2);
      backdrop-filter: blur(6px);
      overflow:hidden;
    }
    .panelHead{
      padding:12px 14px;
      border-bottom:1px solid rgba(16,24,40,.10);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .panelTitle{ font-weight:980; font-size:14px; color:#111827; }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:7px 10px; border-radius:999px;
      font-size:12px; font-weight:950;
      background: rgba(241,198,177,.35);
      color: var(--purpleDark);
      border:1px solid rgba(241,198,177,.65);
      white-space:nowrap;
    }

    .list{ padding:12px; display:grid; gap:10px; }
    .empty{
      background:#fff; border:1px dashed rgba(16,24,40,.18);
      border-radius:16px; padding:14px;
      text-align:center; font-weight:900; color:rgba(16,24,40,.62);
    }

    .orderCard{
      background:#fff;
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 10px 22px rgba(16,24,40,.08);
      border-radius:16px;
      padding:12px;
      cursor:pointer;
      transition:.15s;
    }
    .orderCard:active{ transform:scale(.99); }

    .orderTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .orderId{ font-weight:980; color:var(--purpleDark); font-size:13.5px; }
    .orderMeta{ font-weight:900; color:rgba(16,24,40,.70); font-size:12.5px; margin-top:6px; line-height:1.65; }

    .waitBadge{
      display:inline-flex; align-items:center; gap:8px;
      padding:7px 10px; border-radius:999px;
      font-size:12px; font-weight:950;
      background: rgba(245,158,11,.12);
      border:1px solid rgba(245,158,11,.28);
      color:#92400e;
      white-space:nowrap;
    }

    .detailBody{ padding:12px; }
    .infoBox{
      background:#fff;
      border:1px solid rgba(16,24,40,.10);
      border-radius:18px;
      box-shadow:0 10px 22px rgba(16,24,40,.08);
      padding:12px;
      line-height:1.9;
    }
    .infoBox b{ color:#111827; }

    .actionRow{
      margin-top:12px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    @media (max-width:520px){ .actionRow{ grid-template-columns:1fr; } }

    .btnOk{ background:rgba(22,163,74,.10); border:1px solid rgba(22,163,74,.24); color:#166534; }
    .btnWarn{ background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.28); color:#92400e; }
    .btnErr{ background:rgba(239,68,68,.10); border:1px solid rgba(239,68,68,.22); color:#991b1b; }

    /* Toasts */
    .toasts{
      position:fixed; bottom:14px; left:14px; right:14px;
      z-index:9999; display:flex; flex-direction:column; gap:10px;
      pointer-events:none;
    }
    .toast{
      pointer-events:auto;
      display:flex; align-items:flex-start; gap:10px;
      padding:12px; border-radius:18px;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(16,24,40,.10);
      box-shadow:0 14px 32px rgba(16,24,40,.18);
      backdrop-filter: blur(8px);
      transform: translateY(12px); opacity:0;
      animation: toastIn .22s ease-out forwards;
    }
    @keyframes toastIn{ to { transform: translateY(0); opacity:1; } }
    .toast.out{ animation: toastOut .18s ease-in forwards; }
    @keyframes toastOut{ to { transform: translateY(12px); opacity:0; } }
    .toast .icon{ width:34px; height:34px; border-radius:12px; display:grid; place-items:center; flex:0 0 auto; color:#fff; }
    .toast .body{ min-width:0; flex:1 1 auto; }
    .toast .title{ margin:0; font-size:13px; font-weight:950; line-height:1.2; }
    .toast .msg{ margin:3px 0 0 0; font-size:12.5px; font-weight:900; color:rgba(16,24,40,.72); line-height:1.45; }
    .toast .x{ border:none; background:transparent; cursor:pointer; padding:4px; margin-top:-2px; border-radius:10px; color:rgba(16,24,40,.55); }
    .toast.ok   .icon{ background:linear-gradient(135deg,#22c55e,#16a34a); }
    .toast.err  .icon{ background:linear-gradient(135deg,#f87171,#ef4444); }
    .toast.warn .icon{ background:linear-gradient(135deg,#fbbf24,#f59e0b); }
    .toast.info .icon{ background:linear-gradient(135deg,#60a5fa,#2563eb); }
    .bar{ margin-top:10px; height:3px; border-radius:999px; background:rgba(16,24,40,.10); overflow:hidden; direction:rtl; }
    .bar > i{ display:block; height:100%; width:100%; background:rgba(16,24,40,.25); transform-origin:right center; animation: shrink linear forwards; }
    @keyframes shrink{ to{ transform:scaleX(0); } }
    /* =========================
   Edit Modal (Popup)
   ========================= */
#editModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.62);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:100001;
}

#editModal.open{ display:flex; }

.modalCard{
  width:min(820px, 100%);
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 26px 60px rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.18);
}

.modalHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  border-bottom:1px solid rgba(16,24,40,.10);
  font-weight:980;
}

.modalBody{
  padding:12px;
}

.grid2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
@media (max-width:700px){
  .grid2{ grid-template-columns:1fr; }
}
.gridFull{ grid-column: 1 / -1; }

.actionRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.itemRow{
  display:grid;
  grid-template-columns: 1fr auto auto;
  gap:10px;
  align-items:center;
  padding:10px 12px;
  background:#fff;
  border:1px solid rgba(16,24,40,.10);
  border-radius:14px;
  box-shadow:0 6px 14px rgba(16,24,40,.08);
}
.itemRow .nm{
  font-weight:950;
  font-size:13px;
  color:#111827;
  line-height:1.35;
}
.itemRow .sub{
  margin-top:3px;
  font-weight:900;
  font-size:12px;
  color:rgba(16,24,40,.65);
}
.itemRow input{
  width:74px;
  border:1px solid rgba(16,24,40,.18);
  border-radius:12px;
  padding:8px 10px;
  font-weight:950;
  font-family:"Cairo",system-ui,sans-serif;
}
.itemRow button{
  border:none;
  cursor:pointer;
  padding:8px 10px;
  border-radius:12px;
  font-weight:950;
  background: rgba(239,68,68,.10);
  border:1px solid rgba(239,68,68,.18);
  color:#991b1b;
}
/* Suggestions (product search inside modal) */
.suggestBox{
  position:absolute;
  top: calc(100% + 8px);
  right: 0; left: 0;
  z-index: 999999;
  background: rgba(255,255,255,.98);
  border: 1px solid rgba(16,24,40,.12);
  box-shadow: 0 16px 38px rgba(16,24,40,.16);
  border-radius: 16px;
  overflow: hidden;
  display:none;
  max-height: 320px;
  overflow-y:auto;
}
.suggestBox.show{ display:block; }
.suggestItem{
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
  border-bottom: 1px solid rgba(16,24,40,.08);
}
.suggestItem:last-child{ border-bottom:none; }
.suggestItem:hover{ background: rgba(107,15,166,.06); }
.suggestMain{ font-weight:950; font-size:13px; color:#111827; line-height:1.35; }
.suggestSub{ margin-top:3px; font-weight:900; font-size:12px; color:rgba(16,24,40,.65); line-height:1.35; }
.suggestTag{
  flex:0 0 auto;
  font-weight:950;
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background: rgba(241,198,177,.35);
  border: 1px solid rgba(241,198,177,.65);
  color: var(--purpleDark);
  white-space:nowrap;
}
.orderCard.sel{ outline:2px solid rgba(59,130,246,.6); }
/* خطوط معلومات داخل infoBox */
.infoLine{
  display:flex;
  align-items:center;
  gap:8px;
  margin:6px 0;
}

/* دائرة خلف الأيقونة */
.icoWrap{
  width:28px;
  height:28px;
  border-radius:50%;
  background: var(--btSoft);
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

/* أيقونة SVG نفسها */
.ico{
  width:16px;
  height:16px;
  fill: var(--btMain);
  margin:0;
}

/* صف العنوان */
.addrRow{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* زر الخريطة */
.btnMap{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border:1px solid rgba(107,0,131,.25);
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
  font-weight:950;
  background: var(--btMain);
  color: var(--btSoft);
}
.btnMap .ico{ fill: var(--btSoft); }
.btnMap:hover{ opacity:.9; }
/* أيقونات أزرار الـ actionRow: دائرة + لونين ثابتين */
/* ✅ الأزرار والأيقونات في الوسط */
.actionRow .btn{
  justify-content:center;   /* يرجعها بالوسط */
  gap:10px;
}

/* ✅ الأيقونة تأخذ لون النص تلقائياً */
.actionRow .btn .ico{
  width:16px;
  height:16px;
  fill: currentColor;      /* أهم سطر */
  margin:0;
}

/* ✅ زر Primary: الأيقونة أبيض */
.actionRow .btnPrimary .ico{
  fill:#fff;
}

/* (اختياري) إذا تبي الفقاعة تبقى */
.actionRow .btn .icoBubble{
  width:28px;
  height:28px;
  border-radius:999px;
  background: var(--btSoft);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

/* ===============
    ==========
   Mobile Only - Floating Scroll Button
   ========================= */
#mobileScrollTop{
  position: fixed;
  right: 14px;
  bottom: 14px;
  width: 52px;
  height: 52px;
  border-radius: 18px;

  border: 1px solid rgba(16,24,40,.10);
  background: rgba(255,255,255,.92);
  box-shadow: 0 16px 38px rgba(16,24,40,.18);
  backdrop-filter: blur(8px);

  display: none;               /* مخفي افتراضياً */
  align-items: center;
  justify-content: center;

  cursor: pointer;
  z-index: 100000;
  transition: .15s;
}
#mobileScrollTop:active{ transform: scale(.98); }

#mobileScrollTop svg{
  width: 22px;
  height: 22px;
  stroke: rgba(60,10,99,.85);
  fill: none;
  stroke-width: 2.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ✅ يظهر بالجوال فقط */
@media (max-width: 900px){
  #mobileScrollTop.show{ display:flex; }
}
/* ❌ ممنوع على الكمبيوتر */
@media (min-width: 901px){
  #mobileScrollTop{ display:none !important; }
}
body.modalOpen{
  overflow: hidden;
  height: 100%;
}
.modalCard{
  max-height: 90vh;
  overflow-y: auto;
}
/* أيقونات داخل الأزرار (تحديث + زر التبديل) */
.btn svg.ico{
  width:18px;
  height:18px;
  fill:none;
  stroke: currentColor;
  stroke-width: 2.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* زر Primary: نخلي الأيقونة أبيض */
.btnPrimary svg.ico{
  stroke:#fff;
}

/* Desktop: جنب بعض */
.badgeStats{
  display:flex;
  flex-direction:row;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

.badgeStat{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  background: rgba(255,255,255,.65);
  border:1px solid rgba(16,24,40,.10);
  white-space:nowrap;
}

.badgeStat b{
  font-size:13px;
  font-weight:950;
  color: var(--ink);
}

.badgeStat.wait{ color: var(--warn); }
.badgeStat.ok{   color: var(--ok); }
.badgeStat.all{  color: var(--info); }

.badgeStat .ico{
  width:16px;
  height:16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}


/* ✅ Mobile: فوق بعض + أصغر + بدون خلفية */
@media (max-width: 700px){

  .badge{
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
  }

  .badgeStats{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }

  .badgeStat{
    background: transparent;
    border: none;
    padding: 0;
  }

  .badgeStat b{
    font-size:12px;
  }

  .badgeStat .ico{
    width:15px;
    height:15px;
  }
}
.payBadge.confirm{
  background: rgba(245,158,11,.12);
  border:1px solid rgba(245,158,11,.28);
  color:#92400e;
}
.payBadge.pay{
  background: rgba(37,99,235,.12);
  border:1px solid rgba(37,99,235,.25);
  color:#1d4ed8;
}
.payBadge.muscat{
  background: rgba(22,163,74,.10);
  border:1px solid rgba(22,163,74,.24);
  color:#166534;
}
.payBadge.office{
  background: rgba(107,15,166,.10);
  border:1px solid rgba(107,15,166,.18);
  color: var(--purpleDark);
}
.btnSwap{
  background: rgba(37,99,235,.10);
  border:1px solid rgba(37,99,235,.22);
  color: rgba(29,78,216,.95);
}

.btnMiniOffice{
  width: 48px !important;
  padding: 12px 0 !important;
  justify-content: center !important;
  background: rgba(107,15,166,.10);
  border:1px solid rgba(107,15,166,.18);
  color: var(--purpleDark);
}
.btnMiniOffice .ico{ width:18px; height:18px; }
    
/* =========================
   Card bottom mini actions (Pro Theme)
   ========================= */

.cardBottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--line);
}

/* قاعدة عامة */
.miniAct{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  height:38px;
  padding:0 12px;

  border-radius:14px;
  border:1px solid rgba(107,15,166,.18);
  background: rgba(255,255,255,.92);

  cursor:pointer;
  font-weight:950;
  font-size:13px;
  color: var(--purpleDark);

  box-shadow: 0 8px 18px rgba(16,24,40,.08);
  transition: transform .12s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}

.miniAct .ico{
  width:18px;
  height:18px;
  fill:none;
  stroke: currentColor;
  stroke-width:2.4;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.miniAct:hover{
  box-shadow: 0 14px 30px rgba(16,24,40,.12);
  border-color: rgba(107,15,166,.28);
}

.miniAct:active{
  transform: scale(.985);
}

.miniAct:focus-visible{
  outline:none;
  box-shadow:
    0 14px 30px rgba(16,24,40,.12),
    0 0 0 4px rgba(107,15,166,.18);
}

/* =========================
   Swap button (مسقط <-> دليلي)
   ========================= */

.miniSwap{
  padding-inline:14px;
  background: linear-gradient(135deg, rgba(107,15,166,.10), rgba(241,198,177,.18));
  border-color: rgba(107,15,166,.22);
}

/* “فقاعة” خلف الأيقونة تعطي شكل احترافي */
.miniSwap .ico{

const REQUIRED_TAGS = ["مسقط","تاكيد","تأكيد","مكتب"];

  // Snapshot للأصل حتى نحفظ بدون ما نطلب إعادة إدخال
  let originalForm = null;

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  function toast(type, title, msg, ms=2200){
    const wrap = $("toasts");
    if(!wrap) return;
    const el = document.createElement("div");
    el.className = "toast " + type;
    el.innerHTML = `
      <div class="icon"></div>
      <div style="flex:1;min-width:0">
        <p class="title">${esc(title||"")}</p>
        <p class="msg">${esc(msg||"")}</p>
      </div>
      <button class="x" title="إغلاق">✕</button>
    `;
    el.querySelector(".x").onclick = ()=> el.remove();
    wrap.prepend(el);
    setTimeout(()=> el.remove(), ms);
  }

  async function postManage(url, body){
    const r = await authFetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
      cache: "no-store",
    });

    const text = await r.text();
    let d = null;
    try { d = text ? JSON.parse(text) : null; }
    catch { d = { raw: text }; }

    if(!r.ok){
      const msg =
        (typeof d?.error === "string" && d.error) ||
        (typeof d?.message === "string" && d.message) ||
        (d?.error && typeof d.error === "object" ? JSON.stringify(d.error) : "") ||
        (d && typeof d === "object" ? JSON.stringify(d) : "") ||
        (text || "Request failed");

      throw new Error(msg);
    }
    return d;
  }

  async function addTag(orderId, tag){
    return await postManage("/api/manage/order/tag/add", { orderId, tag });
  }
async function removeTag(orderId, tag){
  return await postManage("/api/manage/order/tag/remove", { orderId, tag });
}
// =========================
// Totals cache (from /totals)
// =========================
async function ensureTotals(orderId){
  const id = String(orderId);

  state.totalsById = state.totalsById || {};

  const cached = state.totalsById[id];

  // ✅ لو موجودة وجاهزة: لا تعيد طلب ولا تعيد شيء
  if(cached && cached.ready) return cached;

  // ✅ لو فيه طلب شغال بالفعل: انتظر نفس الوعد
  if(cached && cached.promise) return await cached.promise;

  // ✅ أنشئ طلب واحد فقط
  const p = (async ()=>{
    const r = await authFetch(
      "/api/manage/order/" + encodeURIComponent(id) + "/totals",
      { cache:"no-store" }
    );
    const d = await r.json().catch(()=> ({}));
    if(!r.ok) throw new Error(d?.error || "فشل جلب الإجمالي");

    // خزّن النتيجة كـ ready
    state.totalsById[id] = { ready:true, ...d };
    return state.totalsById[id];
  })().catch(err=>{
    console.warn("ensureTotals failed", err);
    state.totalsById[id] = { ready:true, error:true, current_total_price:0, currency:"" };
    return state.totalsById[id];
  });

  // خزّن promise مؤقتًا لمنع التكرار
  state.totalsById[id] = { promise:p, ready:false, current_total_price:0, currency:"" };

  return await p;
}
  // =========================
  // ✅ Phone helpers (+968)
  // =========================
  function phoneDigitsOnly(s){
    return String(s||"").replace(/\D+/g, ""); // يشيل + ومسافات وكل شيء غير رقم
  }

  // يرجع 8 أرقام فقط مثل: 772555556
  function toOmLocal8(input){
    let d = phoneDigitsOnly(input);

    if(d.startsWith("00968")) d = d.slice(5);
    if(d.startsWith("968")) d = d.slice(3);

    // احتياط لو أطول من 8 خذ آخر 8
    if(d.length > 8) d = d.slice(-8);

    return d;
  }

  // عند الحفظ يرجع +968XXXXXXXX
  function toOmInternational(input, fallbackOriginal){
    const local = toOmLocal8(input);
    if(local && local.length === 8) return "+968" + local;

    // لو المستخدم ما كتب شيء، رجّع الأصل كما هو
    return String(fallbackOriginal||"").trim();
  }
// =========================
// ✅ WhatsApp number cleaner
// =========================
function toWhatsAppE164(raw){
  // يرجّع رقم بصيغة دولية بدون +
  // مثال: 96891234567

  let d = String(raw||"").replace(/\D+/g, ""); // يشيل كل غير الأرقام

  // شيل تكرارات مفاتيح عمان
  while (d.startsWith("00968")) d = d.slice(5);
  while (d.startsWith("968968")) d = d.slice(3);

  if (d.startsWith("968")) d = d.slice(3);

  // خذ آخر 8 أرقام
  if (d.length > 8) d = d.slice(-8);

  // لو صار 8 أرقام رجّعه مع 968
  if (d.length === 8) return "968" + d;

  return "";
}

  // =========================
  // Detail (يمين)
  // =========================
  function normalizeTags(o){
    if(Array.isArray(o.tags)) return o.tags.map(t=>String(t||"").trim()).filter(Boolean);
    if(typeof o.tags === "string") return o.tags.split(",").map(t=>t.trim()).filter(Boolean);
    return [];
  }
  function hasTag(o, t){
  const tags = normalizeTags(o).map(x => x.toLowerCase());
  return tags.includes(String(t).toLowerCase());
}

function isDalili(o){ return hasTag(o,"تاكيد") || hasTag(o,"تأكيد"); }
function isMuscat(o){ return hasTag(o,"مسقط"); }
function isOffice(o){ return hasTag(o,"مكتب"); }

function isPaidOrder(o){
  const fs = String(o?.financial_status || "").toLowerCase();
  if(fs === "paid") return true;
  return hasTag(o, "تحويل");
}

function getOrderBadge(o){
  const tags = normalizeTags(o);
  const low = tags.map(t => String(t||"").toLowerCase());

  // ✅ CONFIRMED: حسب التاق
  // =========================
  if (VIEW === "confirmed") {

    // ✅ مسقط أولوية أعلى
    if (low.includes("مسقط")) {
      return { kind:"muscat", text:"مسقط", svg: `

        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"

        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"

          <path d="M9 19v-5h6v5"></path>
          <path d="M4 9h16"></path>

      `};

    // افتراضي للمؤكدة
    return { kind:"confirm", text:"مؤكدة", svg: `
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"
        style="fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round">
        <path d="M20 6 9 17l-5-5"></path>
      </svg>
    `};
  }

  // =========================
  // ✅ WAITING: حسب طريقة الدفع
  // =========================
  const gs = Array.isArray(o?.payment_gateways) ? o.payment_gateways : [];
  const gtxt = (gs.join(" ") || o?.payment_gateway || "").toLowerCase();

  const isBankDeposit = gtxt.includes("bank deposit") || gtxt.includes("bank") || gtxt.includes("deposit");

  if (isBankDeposit) {
    return { kind:"pay", text:"الدفع", svg: `
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true"

}
function hasRequiredTag(tags){
  const low = tags.map(t => String(t||"").toLowerCase());
  return REQUIRED_TAGS.some(x => low.includes(String(x).toLowerCase()));
}

  function orderMatchesQuery(o, q){
    if(!q) return true;
    const tags = normalizeTags(o).join(" ");
    const hay = [
      o.id, o.name, o.customer, o.phone, o.city, o.address1, o.shipping, tags
    ].map(x=>String(x||"")).join(" ").toLowerCase();
    return hay.includes(q);
  }

function renderOrders(){
  const listEl = $("ordersList");
  const q = (($("qInput")?.value) || "").trim().toLowerCase();

  // =========================
  // Filters
  // =========================
  const MIN_DATE_STR = "2026-02-05";
  const MIN_DATE = new Date(MIN_DATE_STR + "T00:00:00");

  function toDateSafe(v){
    if(!v) return null;
    if(v instanceof Date) return isNaN(v) ? null : v;

    const s = String(v).trim();

    // ISO
    let d = new Date(s);
    if(!isNaN(d)) return d;

    // dd.mm.yyyy OR dd/mm/yyyy OR dd-mm-yyyy
    const m = s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
    if(m){
      const day = Number(m[1]);
      const mon = Number(m[2]);
      const yr  = Number(m[3]);
      d = new Date(yr, mon - 1, day, 0, 0, 0);
      if(!isNaN(d)) return d;
    }
    return null;
  }

  // ✅ Shopify shipped/fulfilled detector (قوي)
  function isShipped(o){
    const fs = String(
      o?.fulfillment_status ||
      o?.displayFulfillmentStatus ||
      o?.fulfillmentStatus ||
      ""
    ).toLowerCase();

    // Shopify REST: fulfillment_status
    if(fs === "fulfilled" || fs === "partial") return true;

    // أي قيمة "shipped/delivered" لو جاية من مكان آخر
    if(["shipped","delivered","out_for_delivery","complete","completed"].includes(fs)) return true;

    // REST: fulfillments array (وجودها يعني صار تنفيذ/شحن)
    if(Array.isArray(o?.fulfillments) && o.fulfillments.length > 0) return true;

    // tracking fields (لو موجودة عندك)
    if(o?.trackingNumber || o?.tracking || o?.tracking_code) return true;

    return false;
  }

  // ✅ Shopify cancelled detector
  function isCancelled(o){
    if(o?.cancelled_at || o?.canceled_at) return true;

    // احتياط: لو API رجّعها بصيغة ثانية
    const s = String(o?.status || o?.state || o?.orderStatus || "").toLowerCase();
    if(s.includes("cancel")) return true;

    return false;
  }

  // =========================
  // Start list
  // =========================
  let list = (Array.isArray(state.orders) ? state.orders : []).slice();

  // ✅ فلترة التاريخ (من 2026-02-05 فما فوق)
  list = list.filter(o => {
    const dt =
      toDateSafe(o.createdAt) ||
      toDateSafe(o.created_at) ||
      toDateSafe(o.date) ||
      toDateSafe(o.created) ||
      null;

    return !!dt && dt >= MIN_DATE;
  });

  // ✅ استبعاد المكنسل
  list = list.filter(o => !isCancelled(o));

  // ✅ استبعاد المشحون/المنفّذ
  list = list.filter(o => !isShipped(o));

  // ✅ البحث
  list = list.filter(o => orderMatchesQuery(o, q));

  // ✅ confirmed / waiting
  if(VIEW === "confirmed"){
    list = list.filter(o => hasRequiredTag(normalizeTags(o)));
  } else {
    list = list.filter(o => !hasRequiredTag(normalizeTags(o)));
  }

  // ✅ اختيار أول طلب تلقائيًا بعد الفلترة
  if(list.length){
    const exists = state.selectedId && list.some(o => String(o.id) === String(state.selectedId));
    if(!exists) state.selectedId = String(list[0].id);
  }

  $("ordersCount").textContent = String(list.length);

  // ✅ لا توجد نتائج
  if(!list.length){
    state.selectedId = null;
    listEl.innerHTML = `<div class="empty">لا توجد طلبات مطابقة.</div>`;
    renderDetail();
    return;
  }

  // ✅ رسم القائمة
listEl.innerHTML = list.map(o=>{
  const isSel = String(o.id) === String(state.selectedId);
  const badge = getOrderBadge(o);

  const meta = [
    o.customer ? `الاسم: ${esc(o.customer)}` : "",
    o.phone ? `الرقم: ${esc(o.phone)}` : "",
    o.shipping ? `العنوان: ${esc(o.shipping)}` : (o.address1 ? `العنوان: ${esc(o.address1)}` : ""),
  ].filter(Boolean).join("<br>");

  // ✅ أزرار أسفل الكرت (فقط في المؤكدة)
  let bottom = "";
  if (VIEW === "confirmed") {
    const swapBtn = getSwapButtonInfo(o);
    const officeBtn = getOfficeMiniButtonInfo(o);

    const leftBtn = swapBtn?.show
      ? `<button class="miniAct miniSwap" data-act="${esc(swapBtn.act)}" data-oid="${esc(o.id)}" title="${esc(swapBtn.hint)}">
          ${swapBtn.svg}
          <span>${esc(swapBtn.label)}</span>
        </button>`

    const rightBtn = officeBtn?.show
      ? `<button class="miniAct miniOffice" data-act="${esc(officeBtn.act)}" data-oid="${esc(o.id)}" title="${esc(officeBtn.hint)}">
          ${officeBtn.svg}
        </button>`
      : ``;

    bottom = `<div class="cardBottom">${leftBtn}${rightBtn}</div>`;
  }

  return `
    <div class="orderCard ${isSel ? "sel" : ""}" data-oid="${esc(o.id)}">
      <div class="orderTop">
        <div class="orderId">${esc(o.name || ("#" + o.id))}</div>

        </div>
      </div>

      <div class="orderMeta">${meta || "—"}</div>
      ${bottom}
    </div>
  `;
}).join("");


  renderDetail();
}

function setupProductSearchHandlers(){
  if(_prodSearchBound) return;
  _prodSearchBound = true;

  let tmr = null;

  // بحث أثناء الكتابة
  document.addEventListener("input", async (ev)=>{
    const inp = ev.target.closest("#emProdSearch");
    if(!inp) return;

    const q = String(inp.value||"").trim();
    const box = document.getElementById("emSuggest");
    if(!box) return;

    if(tmr) clearTimeout(tmr);

    if(q.length < 2){
      box.classList.remove("show");
      box.innerHTML = "";
      return;
    }

    tmr = setTimeout(async ()=>{
      try{
        const r = await authFetch(`/api/manage/products/search?q=${encodeURIComponent(q)}&limit=12`, { cache:"no-store" });
        const d = await r.json().catch(()=>({}));
        const items = Array.isArray(d?.items) ? d.items : [];

        if(!items.length){
          box.innerHTML = `<div class="suggestItem"><div><div class="suggestMain">لا توجد نتائج</div></div></div>`;
          box.classList.add("show");
          return;

        box.innerHTML = items.map((it)=>`

               data-vid="${esc(it.variantGid)}"

        `).join("");

        box.classList.add("show");

        console.error(e);

    const item = ev.target.closest(".suggestItem");
    if(!item) return;

    const box = document.getElementById("emSuggest");
    const inp = document.getElementById("emProdSearch");

    const variantGid = item.getAttribute("data-vid") || "";
    const title = item.getAttribute("data-title") || "";
    const price = Number(item.getAttribute("data-price") || 0) || 0;

    if(!variantGid) return;

    // إذا مضاف مسبقًا (جديد) زيد الكمية بدل التكرار
    const existing = modalItems.find(x => x.isNew && x.variantGid === variantGid);
    if(existing){
      existing.qty = Number(existing.qty || 0) + 1;
    } else {
      modalItems.push({
        title,
        qty: 1,
        price,
        imageUrl: "",
        lineItemGid: "",
        variantGid,
        isNew: true
      });
    }

    renderModalItems();

    if(inp) inp.value = "";
    if(box){
      box.classList.remove("show");
      box.innerHTML = "";
    }
  });

  // إغلاق الاقتراحات عند الضغط خارج مربع البحث
  document.addEventListener("click", (ev)=>{
    const wrap = document.getElementById("emProdWrap");
    const box = document.getElementById("emSuggest");
    if(!wrap || !box) return;

    if(!wrap.contains(ev.target)){
      box.classList.remove("show");
    }
  });
}

async function fillEditModal(order){

  $("emLastName").value  = first; // الاسم
  $("emFirstName").value = last;  // اللقب
  $("emPhone").value     = toOmLocal8(order.phone || ""); // 8 أرقام فقط
  $("emCity").value      = order.city || "";

    lastName: $("emLastName").value,

  };

  // reset UI while loading

  modalItems = [];
  $("emItems").innerHTML = `<div class="empty">جاري تحميل المنتجات...</div>`;
  $("emTotal").textContent = "الإجمالي: ...";

  // ✅ UI البحث عن المنتجات
  ensureProductSearchUI();
  setupProductSearchHandlers();

  // =========================
  // 1) جلب المنتجات (للعرض فقط)
  // =========================
  let lines = [];
  try{
    const rr = await authFetch(
      "/api/manage/order/" + encodeURIComponent(order.id) + "/lines",
      { cache:"no-store" }
    );

    if(rr.ok) lines = Array.isArray(dd.items) ? dd.items : [];
  }catch(e){
    console.warn("Failed to load lines", e);
  }

  // ملاحظة: endpoint الحالي ما يرجع currentQuantity ولا discountedUnitPrice غالباً
  // فهنا نستخدم الموجود ونفلتر qty>0
  modalItems = (lines || []).map(x => {

      title: x.title || "",
      qty: Number(x.qty || 0) || 0,
      price: Number(x.price || 0) || 0,
      imageUrl: x.imageUrl || "",

      // ✅ أهم شي عشان التعديل
      lineItemGid: x.lineItemGid || "",
      variantGid: x.variantGid || "",

      isNew: false
    };
}).filter(it => it.title && (it.lineItemGid || it.variantGid));

  renderModalItems(); // هذا يرسم المنتجات + يعمل calcTotal (قبل الخصم) كـ fallback

  // =========================

  try{

    if(tr.ok && tj && tj.current_total_price != null){
      $("emTotal").textContent = "الإجمالي: " + money(tj.current_total_price);
    } else {
      // fallback: خليها على calcTotal اللي صار داخل renderModalItems
      // (لا شيء)
    }
  }catch(e){
    // fallback: لا شيء
    console.warn("Failed to load totals", e);
  }
}

async function fillDraftModal(draftId){
  const box = document.getElementById("emDraftItemsBox") || $("emItems");
  if(box) box.innerHTML = `<div class="empty">جاري تحميل المنتجات...</div>`;

  try{
    const r = await authFetch(`/api/manage/draft/${encodeURIComponent(draftId)}/lines`, { cache:"no-store" });
    const d = await r.json().catch(()=> ({}));
    if(!r.ok) throw new Error(d?.error || `HTTP ${r.status}`);

    const lines = Array.isArray(d?.items) ? d.items : [];

    modalItems = (lines || []).map(x => ({
      title: x.title || "",
      qty: Number(x.qty || 0) || 0,
      price: Number(x.price || 0) || 0,
      imageUrl: x.imageUrl || "",
      lineItemGid: x.lineItemGid || "",
      variantGid: x.variantGid || "",
      isNew: false
    })).filter(it => it.title);


    renderModalItems(box);
    $("emTotal").textContent = "الإجمالي: " + money(
      modalItems.reduce((s,it)=> s + (Number(it.price)*Number(it.qty)), 0)
    );

  }catch(e){
    if(box) box.innerHTML = `<div class="empty">فشل تحميل منتجات المسودة: ${esc(e?.message||String(e))}</div>`;
    modalItems = [];
  }
}

// Mobile scroll behavior (ONLY on mobile) - like pack page
// ======================
const MOBILE_MAX_W = 900;

function isMobile(){
  return window.matchMedia(`(max-width:${MOBILE_MAX_W}px)`).matches;
}

function smoothScrollTo(el){
  if(!el) return;
  el.scrollIntoView({ behavior:"smooth", block:"start" });
}

function goToDetailPanel(){
  if(!isMobile()) return;
  const detail = document.getElementById("detailPanel");
  smoothScrollTo(detail);
  document.getElementById("mobileScrollTop")?.classList.add("show");
}

function goToOrdersPanel(){
  if(!isMobile()) return;
  const orders = document.getElementById("ordersPanel");
  smoothScrollTo(orders);
  document.getElementById("mobileScrollTop")?.classList.remove("show");
}

// زر الرجوع للأعلى
document.getElementById("mobileScrollTop")?.addEventListener("click", () => {
  goToOrdersPanel();
});

// لو رجع المستخدم فوق يدويًا، أخفِ الزر عند ظهور الطلبات
window.addEventListener("scroll", () => {
  if(!isMobile()) return;

  const btn = document.getElementById("mobileScrollTop");
  const orders = document.getElementById("ordersPanel");
  if(!btn || !orders) return;

  const r = orders.getBoundingClientRect();
  if(r.top >= -20 && r.top <= 120){
    btn.classList.remove("show");
  }
}, { passive:true });

      if(!assertDom()) return;

      $("statusBadge").textContent = "جاري التحميل...";
      $("ordersList").innerHTML = `<div class="empty">جاري تحميل الطلبات...</div>`;
      $("ordersCount").textContent = "0";

      const r = await authFetch(API_URL, { cache:"no-store" });
      const d = await r.json().catch(()=> ({}));
      if(!r.ok) throw new Error(d?.error || "فشل تحميل الطلبات");

      state.orders = Array.isArray(d.orders) ? d.orders : [];
setToggleButton();



// ✅ احسب فقط (مؤكدة + انتظار) بدون مشحون وبدون ملغي
const base = state.orders.filter(o => !o?.cancelled_at && !(String(o?.fulfillment_status||"").toLowerCase() === "fulfilled" || String(o?.fulfillment_status||"").toLowerCase() === "partial" || (Array.isArray(o?.fulfillments) && o.fulfillments.length)));

const waitingCount   = base.filter(o => !hasRequiredTag(normalizeTags(o))).length;
const confirmedCount = base.filter(o =>  hasRequiredTag(normalizeTags(o))).length;

$("statusBadge").innerHTML = `
  <div class="badgeStats">

    <div class="badgeStat wait" title="انتظار">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M12 6v6l4 2"></path>
        <circle cx="12" cy="12" r="9"></circle>
      </svg>
      <b>${waitingCount}</b>
    </div>

    <div class="badgeStat ok" title="مؤكدة">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M20 6 9 17l-5-5"></path>
      </svg>
      <b>${confirmedCount}</b>
    </div>

    <div class="badgeStat all" title="المجموع">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M4 6h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 18h16"></path>
      </svg>
      <b>${waitingCount + confirmedCount}</b>
    </div>

  </div>
`;

renderOrders();
renderDetail();

    }catch(e){
      console.error(e);
      $("statusBadge").textContent = "خطأ ❌";
      $("ordersList").innerHTML = `<div class="empty">فشل تحميل الطلبات</div>`;
      toast("err","خطأ", e?.message || String(e), 4000);
    }
  }

  // Init
  loadOrders();
</script>

</body>
</html>
