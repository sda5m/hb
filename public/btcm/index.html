let __pushReg = null;

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }

  return outputArray;
}

async function registerPushSW() {
  if (!("serviceWorker" in navigator)) {
    throw new Error("Service Worker غير مدعوم");
  }

  __pushReg = await navigator.serviceWorker.register("/btcm/promax.js", {
    scope: "/btcm/"
  });

  return __pushReg;
}

async function enablePushNotifications() {
  if (!("PushManager" in window) || !("Notification" in window)) {
    throw new Error("Push غير مدعوم على هذا الجهاز");
  }

  const reg = __pushReg || await registerPushSW();

  let permission = Notification.permission;
  if (permission !== "granted") {
    permission = await Notification.requestPermission();
  }

  if (permission !== "granted") {
    throw new Error("لم يتم منح إذن الإشعارات");
  }

  const keyRes = await authFetch("/api/manage/push/public-key", {
    cache: "no-store"
  });

  const keyData = await keyRes.json().catch(() => ({}));
  if (!keyRes.ok) {
    throw new Error(keyData?.error || "فشل جلب المفتاح العام");
  }

  const publicKey = String(keyData.publicKey || "").trim();
  if (!publicKey) {
    throw new Error("المفتاح العام فارغ");
  }

  let sub = await reg.pushManager.getSubscription();

  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });
  }

  const saveRes = await authFetch("/api/manage/push/subscribe", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(sub),
    cache: "no-store"
  });

  const saveData = await saveRes.json().catch(() => ({}));
  if (!saveRes.ok) {
    throw new Error(saveData?.error || "فشل حفظ الاشتراك");
  }

  toast("ok", "تم", "تم تفعيل الإشعارات ✅", 2500);
}

async function sendPushTest() {
  const r = await authFetch("/api/manage/push/send-test", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    cache: "no-store"
  });

  const d = await r.json().catch(() => ({}));
  if (!r.ok) {
    throw new Error(d?.error || "فشل إرسال الإشعار التجريبي");
  }

  toast("ok", "تم", "تم إرسال إشعار تجريبي", 2500);
}

window.enablePushNotifications = async () => {
  try {
    await enablePushNotifications();
  } catch (e) {

};

let __netPending = 0;
let __netTimer = null;

function setLoaderText(msg){
  const t = document.getElementById("globalLoaderText");
  if(t) t.textContent = msg || "جاري العمل… اصبر شوي";
}

function showLoader(msg){
  ensureGlobalLoader();
  setLoaderText(msg);
  const el = document.getElementById("globalLoader");
  if(!el) return;

  if(__netTimer) clearTimeout(__netTimer);
  __netTimer = setTimeout(() => {
    if(__netPending > 0){
      el.classList.add("show");
      el.setAttribute("aria-hidden","false");
    }
  }, 180);
}

function hideLoader(){
  const el = document.getElementById("globalLoader");
  if(!el) return;
  if(__netTimer) clearTimeout(__netTimer);
  el.classList.remove("show");
  el.setAttribute("aria-hidden","true");
}

function netBegin(msg){
  __netPending++;
  if(msg) showLoader(msg);   // ✅ لو null ما يظهر
}
  function netEnd(){
  __netPending = Math.max(0, __netPending - 1);
  if(__netPending === 0) hideLoader();
}


function safeJsonBody(init){
  try{
    const b = init?.body;
    if(!b) return null;
    if(typeof b === "string") return JSON.parse(b);

    // دعم FormData / URLSearchParams (احتياط)
    if(b instanceof FormData){
      return {
        tag: b.get("tag"),
        orderId: b.get("orderId"),
        city: b.get("city"),
        toCity: b.get("toCity"),
        destination: b.get("destination"),
        to: b.get("to"),
      };
    }
    if(b instanceof URLSearchParams){
      return {
        tag: b.get("tag"),
        orderId: b.get("orderId"),
      };
    }

    return null;
  }catch{
    return null;
  }
}

const REQUIRED_TAGS = ["مسقط","تاكيد","تأكيد","مكتب"];
const PACKED_TRACKING_TAGS = ["مغلف"];

function hasPackedTrackingTag(o){
  const low = normalizeTags(o).map(t => String(t || "").toLowerCase());
  return PACKED_TRACKING_TAGS.some(x => low.includes(String(x).toLowerCase()));
}

function localPhone8(v){
  const d = String(v || "").replace(/\D+/g, "");
  if(d.length < 8) return "";
  return d.slice(-8);
}

function phoneConflictInfo(o){
  const phone = localPhone8(o?.phone || o?.customer_phone || "");
  const emailPhone = localPhone8(o?.email || "");
  if(phone && emailPhone && phone !== emailPhone){
    return { phone, emailPhone };
  }
  return null;
}

function hasOfficeTag(o){
  const low = normalizeTags(o).map(t => String(t || "").toLowerCase());
  return low.includes("مكتب") || low.includes("office");
}

function activeFulfillments(o){
  return (Array.isArray(o?.fulfillments) ? o.fulfillments : [])
    .filter(f => {
      const status = String(
        f?.status ||
        f?.fulfillment_status ||
        f?.displayFulfillmentStatus ||
        ""
      ).trim().toLowerCase();

      return !["cancelled", "canceled", "failure", "failed"].includes(status);
    });
}

function hasActiveFulfillment(o){
  const active = activeFulfillments(o);
  if(active.length) return true;

  const fs = String(
    o?.fulfillment_status ||
    o?.displayFulfillmentStatus ||
    o?.fulfillmentStatus ||
    ""
  ).toLowerCase();

  return fs === "fulfilled" || fs === "partial" ||
    ["shipped","delivered","out_for_delivery","out-for-delivery","complete","completed"].includes(fs);
}

function activeTrackingValues(o){
  const active = activeFulfillments(o);

  if(active.length){
    return active.flatMap(f => [
      f?.tracking_number,
      f?.trackingNumber,
      f?.tracking,
      f?.tracking_code,
      f?.trackingCode,
      ...(Array.isArray(f?.tracking_numbers) ? f.tracking_numbers : []),
      ...(Array.isArray(f?.trackingNumbers) ? f.trackingNumbers : [])
    ]).map(x => String(x || "").trim()).filter(Boolean);
  }

  return [
    o?.trackingNumber,
    o?.tracking_number,
    o?.tracking,
    o?.tracking_code,
    o?.trackingCode
  ].map(x => String(x || "").trim()).filter(Boolean);
}

function hasAnyTracking(o){
  return activeTrackingValues(o).length > 0;
}

function isDhlOrder(o){
  const hay = [
    ...(Array.isArray(o?.tags) ? o.tags : []),
    o?.shipping,
    o?.address1,
    o?.city,
    o?.payment_gateway,
    ...(Array.isArray(o?.shipping_lines) ? o.shipping_lines.flatMap(s => [s?.title, s?.code, s?.source, s?.carrier_identifier]) : []),
    ...(Array.isArray(o?.fulfillments) ? o.fulfillments.flatMap(f => [f?.tracking_company, f?.company]) : [])
  ].join(" ").toLowerCase();
  return hay.includes("dhl") || hay.includes("دي اتش") || hay.includes("دي أتش");
}

function needsTrackingOrder(o){
  return !isCancelled(o) && hasPackedTrackingTag(o) && !hasAnyTracking(o);
}

function canResendTrackingOrder(o){
  return !isCancelled(o) && hasPackedTrackingTag(o);
}

function toast(type, title, msg, ms=2200, opts={}){
  // ✅ هذا التوست صار "احترافي" باستخدام Global Loader نفسه (مع الـ GIF)
  // يدعم key لتحديث نفس التنبيه بدل ما يزيد العدّاد أو يعمل تكرار.
  ensureGlobalLoader();

  window.__proToast = window.__proToast || { byKey: {} };

  const key = (opts && typeof opts.key === "string") ? opts.key : "";
  const sticky = !!(opts && opts.sticky) || ms === 0 || ms === null;

  // نص مختصر واحترافي
  const t = String(title || "").trim();
  const m = String(msg || "").trim();
  const full = (t && m) ? `${t} • ${m}` : (t || m || "جاري العمل… اصبر شوي");

  // ✅ لو فيه نفس المفتاح شغال: فقط حدّث النص
  if(key && window.__proToast.byKey[key]){
    setLoaderText(full);
    // لو انتهى (non-sticky) اقفل بعد ms
    if(!sticky){
      const rec = window.__proToast.byKey[key];
      if(rec.tmr) clearTimeout(rec.tmr);
      rec.tmr = setTimeout(()=>{
        // اقفل نفس المهمة
        delete window.__proToast.byKey[key];
        hideLoader();
      }, ms);
    }
    return;
  }

  // ✅ مهمة جديدة (تحجز slot في netPending عشان ما ينقفل اللودر فجأة)
showLoader(full);

  // لو ما فيه key: اعتبرها مهمة مؤقتة عادية
  if(!key){
    if(!sticky){
      setTimeout(()=> netEnd(), ms);
    }
    return;
  }

  // ✅ مع key: نخزنها عشان نقدر نحدثها/نقفلها لاحقاً
  window.__proToast.byKey[key] = { startedAt: Date.now(), tmr: null };

  if(!sticky){
    window.__proToast.byKey[key].tmr = setTimeout(()=>{
      delete window.__proToast.byKey[key];
      netEnd();
    }, ms);
  }
}
  
  async function postManage(url, body){
    const r = await authFetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
      cache: "no-store",
    });

    const text = await r.text();
    let d = null;
    try { d = text ? JSON.parse(text) : null; }
    catch { d = { raw: text }; }

    if(!r.ok){
      const msg =
        (typeof d?.error === "string" && d.error) ||
        (typeof d?.message === "string" && d.message) ||
        (d?.error && typeof d.error === "object" ? JSON.stringify(d.error) : "") ||
        (d && typeof d === "object" ? JSON.stringify(d) : "") ||
        (text || "Request failed");

      throw new Error(msg);
    }
    return d;
  }

async function ensureTotals(orderId){
  const id = String(orderId);

  state.totalsById = state.totalsById || {};
  const cached = state.totalsById[id];

  // ✅ جاهز
  if(cached && cached.ready) return cached;

  // ✅ في طلب شغال
  if(cached && cached.promise) return await cached.promise;

  // ✅ طلب واحد فقط
  const p = (async ()=>{
    const r = await authFetch(
      "/api/manage/order/" + encodeURIComponent(id) + "/totals",
      { cache:"no-store" }
    );

    const d = await r.json().catch(()=> ({}));
    if(!r.ok) throw new Error(d?.error || "فشل جلب الإجمالي");

    // ✅ الصحيح: نفرد بيانات d داخل الكاش
    const out = { ready:true, ...(d || {}) };
    state.totalsById[id] = out;
    return out;
  })().catch(err=>{
    console.warn("ensureTotals failed", err);
    const out = { ready:true, error:true, current_total_price:0, currency:"" };
    state.totalsById[id] = out;
    return out;
  });

  // خزّن promise لمنع التكرار
  state.totalsById[id] = { promise:p, ready:false, current_total_price:0, currency:"" };

  return await p;
}

  function phoneDigitsOnly(s){
    return String(s||"").replace(/\D+/g, ""); // يشيل + ومسافات وكل شيء غير رقم
  }

  // يرجع 8 أرقام فقط مثل: 772555556

  function inferDialCodeFromContext(context){
    const values = [];
    const push = v => {
      if(v === null || v === undefined) return;
      if(Array.isArray(v)) return v.forEach(push);
      if(typeof v === 'object') return Object.values(v).forEach(push);
      values.push(String(v).trim().toLowerCase());
    };
    push([
      context?.country,
      context?.country_code,
      context?.countryCode,
      context?.shipping_country,
      context?.shippingCountry,
      context?.shipping_address?.country,
      context?.shipping_address?.country_code,
      context?.shippingAddress?.country,
      context?.shippingAddress?.countryCode,
      context?.city,
      context?.province,
      context?.address1,
      context?.address2,
      context?.shipping
    ]);
    const text = values.filter(Boolean).join(' ');
    const padded = ' ' + text + ' ';
    const rules = [
      ['968', [' om ', 'oman', 'muscat', 'masqat', '\u0639\u0645\u0627\u0646', '\u0645\u0633\u0642\u0637']],
      ['966', [' sa ', 'ksa', 'saudi', '\u0627\u0644\u0633\u0639\u0648\u062f\u064a\u0629', '\u0627\u0644\u0631\u064a\u0627\u0636', '\u062c\u062f\u0629']],
      ['971', [' ae ', 'uae', 'united arab emirates', 'dubai', 'abu dhabi', 'sharjah', 'ajman', '\u0627\u0644\u0625\u0645\u0627\u0631\u0627\u062a', '\u0627\u0644\u0627\u0645\u0627\u0631\u0627\u062a', '\u062f\u0628\u064a', '\u0623\u0628\u0648\u0638\u0628\u064a']],
      ['965', [' kw ', 'kuwait', '\u0627\u0644\u0643\u0648\u064a\u062a']],
      ['974', [' qa ', 'qatar', 'doha', '\u0642\u0637\u0631', '\u0627\u0644\u062f\u0648\u062d\u0629']],
      ['973', [' bh ', 'bahrain', '\u0627\u0644\u0628\u062d\u0631\u064a\u0646']],
      ['964', [' iq ', 'iraq', '\u0627\u0644\u0639\u0631\u0627\u0642']],
      ['962', [' jo ', 'jordan', '\u0627\u0644\u0623\u0631\u062f\u0646', '\u0627\u0644\u0627\u0631\u062f\u0646']],
      ['20',  [' eg ', 'egypt', '\u0645\u0635\u0631']],
      ['91',  [' in ', 'india', '\u0627\u0644\u0647\u0646\u062f']]
    ];
    for(const [code, keys] of rules){
      if(keys.some(k => padded.includes(k))) return code;
    }
    return '968';
  }

  function normalizeIntlPhone(input, fallbackOriginal = '', context = null){
    const raw = String(input || '').trim();
    const fallback = String(fallbackOriginal || '').trim();
    const dialCode = inferDialCodeFromContext(context);
    let d = phoneDigitsOnly(raw);

    if(!d && fallback) d = phoneDigitsOnly(fallback);
    if(!d) return '';

    if(d.startsWith('00')) d = d.slice(2);
    while(d.startsWith('968968')) d = d.slice(3);

    if(d.startsWith(dialCode) && d.length >= 9 && d.length <= 15) return '+' + d;
    if(d.startsWith('0') && dialCode !== '968') d = d.replace(/^0+/, '');
    if(d.length === 8 || (dialCode !== '968' && d.length >= 7 && d.length <= 10)) return '+' + dialCode + d;
    if(d.length >= 9 && d.length <= 15) return '+' + d;

    return fallback;
  }

  function phoneValueForEdit(input, context = null){
    const full = normalizeIntlPhone(input, input, context);
    if(full.startsWith('+968') && full.length === 12) return full.slice(4);
    return full || String(input || '').trim();
  }

  function phoneValueForSave(input, fallbackOriginal = '', context = null){
    return normalizeIntlPhone(input, fallbackOriginal, context) || String(fallbackOriginal || '').trim();
  }

  function toOmLocal8(input, context = null){
    return phoneValueForEdit(input, context);
  }

  function toOmInternational(input, fallbackOriginal, context = null){
    return phoneValueForSave(input, fallbackOriginal, context);
  }

  if(["shipped","delivered","out_for_delivery","out-for-delivery","complete","completed"].includes(fs)) return true;
  if(Array.isArray(o?.fulfillments) && o.fulfillments.length > 0) return true;
  if(o?.trackingNumber || o?.tracking || o?.tracking_code) return true;

  return false;

function isCancelled(o){
  if(o?.cancelled_at || o?.canceled_at) return true;

  const s = String(o?.status || o?.state || o?.orderStatus || "").toLowerCase();
  if(s.includes("cancel")) return true;

  const tags = (Array.isArray(o?.tags) ? o.tags : (typeof o?.tags==="string" ? o.tags.split(",") : []))
    .map(x => String(x||"").trim().toLowerCase());

  if(tags.includes("cancel")) return true;
  if(tags.includes("غ")) return true;

  return false;

function getShipStage(o){
  const fs = Array.isArray(o?.fulfillments) ? o.fulfillments : [];
  const last = fs.length ? fs[fs.length - 1] : null;

  const shipStatus = String(
    last?.shipment_status || last?.shipmentStatus || ""
  ).toLowerCase().trim();

  if (shipStatus === "delivered") return "delivered";
  if (shipStatus === "out_for_delivery" || shipStatus === "out-for-delivery") return "out_for_delivery";
  if (shipStatus === "in_transit") return "in_transit";
  if (shipStatus) return "shipped";

  const orderFs = String(
    o?.fulfillment_status ||
    o?.displayFulfillmentStatus ||
    o?.fulfillmentStatus ||
    ""
  ).toLowerCase().trim();

  if (["delivered","out_for_delivery","out-for-delivery"].includes(orderFs)) {
    return orderFs.replace(/-/g, "_");
  }

  return "shipped";
}

    o?.shipping_lines_text,
    ...(Array.isArray(o?.shipping_lines)
      ? o.shipping_lines.flatMap(s => [
          s?.title,
          s?.code,
          s?.carrier_identifier,
          s?.source
        ])
      : [])
  ]
    .map(x => String(x || "").trim())
    .filter(Boolean);
}

function isJinakomShipping(o){
  return collectShippingValues(o).some(v => {
    const raw = String(v || "").toLowerCase();
    const normalized = normalizeSearchText(raw);
    return raw.includes("jinakom") ||
      raw.includes("gina") ||
      normalized.includes("جيناكم");
  });
}

async function applyPartialPaidRoutingTag(orderId, order){
  if (isJinakomShipping(order)) {
    await removeTag(orderId, "تاكيد").catch(() => {});
    await removeTag(orderId, "تأكيد").catch(() => {});
    await removeTag(orderId, "مسقط").catch(() => {});
    await addTag(orderId, "مكتب");
    return "مكتب";
  }

  await removeTag(orderId, "مكتب").catch(() => {});
  await addTag(orderId, "تاكيد");
  return "تاكيد";
}

function orderMatchesQuery(o, q){
  if(!q) return true;

  const rawQuery = String(q || "").trim();
  const queryText = normalizeSearchText(rawQuery);
  const queryDigits = digitsOnly(rawQuery);

  const tags = normalizeTags(o);

  const trackingValues = collectTrackingValues(o);
  const lineValues = collectLineSearchValues(o);
  const shippingValues = collectShippingValues(o);

  const textFields = [
    o?.id,
    o?.name,
    o?.order_number,
    o?.customer,
    o?.first_name,
    o?.last_name,
    o?.phone,
    o?.email,
    o?.city,
    o?.address1,
    o?.address2,
    o?.shipping,
    o?.note,
    o?.desc,
    o?.financial_status,
    o?.fulfillment_status,
    o?.gateway,
    o?.payment_gateway,
    ...(Array.isArray(o?.payment_gateways) ? o.payment_gateways : []),
    ...tags,
    ...trackingValues,
    ...lineValues,
    ...shippingValues
  ]
    .map(x => String(x || "").trim())
    .filter(Boolean);

  const hayText = normalizeSearchText(textFields.join(" "));
  const hayDigits = digitsOnly(textFields.join(" "));

  // بحث نصي عادي: اسم، عنوان، مدينة، منتج، باركود، شحن...
  if(queryText && hayText.includes(queryText)) return true;

  // بحث رقمي: رقم طلب، جوال كامل، جزء من الجوال، رقم تتبع رقمي...
  if(queryDigits && hayDigits.includes(queryDigits)) return true;

  return false;
}

function renderOrders(){
  const listEl = $("ordersList");
  const q = (($("qInput")?.value) || "").trim().toLowerCase();

  const MIN_DATE_STR = "2026-02-05";
  const MIN_DATE = new Date(MIN_DATE_STR + "T00:00:00");

  function toDateSafe(v){
    if(!v) return null;
    if(v instanceof Date) return isNaN(v) ? null : v;

    const s = String(v).trim();

    let d = new Date(s);
    if(!isNaN(d)) return d;

    const m = s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
    if(m){
      const day = Number(m[1]);
      const mon = Number(m[2]);
      const yr  = Number(m[3]);
      d = new Date(yr, mon - 1, day, 0, 0, 0);
      if(!isNaN(d)) return d;
    }
    return null;
  }

let list = (Array.isArray(state.orders) ? state.orders : []).slice();

// ✅ مع البحث: لا تطبق فلتر التاريخ
if (!q) {
  list = list.filter(o => {
    const dt =
      toDateSafe(o.createdAt) ||
      toDateSafe(o.created_at) ||
      toDateSafe(o.date) ||
      toDateSafe(o.created) ||
      null;

    return !!dt && dt >= MIN_DATE;
  });
}

// ✅ البحث
list = list.filter(o => orderMatchesQuery(o, q));
  
  if(!q){
    if(VIEW === "needs_tracking"){
      list = list.filter(o => needsTrackingOrder(o));
    } else {
      // بدون بحث: أخفِ الملغي والمشحون
      list = list.filter(o => !isCancelled(o));
      list = list.filter(o => !isShipped(o));

      if(VIEW === "confirmed"){
        list = list.filter(o => hasRequiredTag(normalizeTags(o)));
      } else {
        list = list.filter(o => !hasRequiredTag(normalizeTags(o)));
      }

  } else {
    // ✅ مع البحث: اسمح للملغي والمشحون يظهرون
  }

  list.sort((a,b)=>{
    const sa = isShipped(a) ? 1 : 0;

if (fs === "paid") {

function calcTotal(){
  const base = modalItems.reduce((sum,it)=>{
    const p = Number(it.price) || 0;
    const q = Number(it.qty) || 0;
    return sum + (p*q);
  },0);
  $("emTotal").textContent = "الإجمالي: " + money(base);
}

function waHasTag(o, t){
  const tags = (Array.isArray(o?.tags) ? o.tags : (typeof o?.tags==="string" ? o.tags.split(",") : []))
    .map(x=>String(x||"").trim().toLowerCase()).filter(Boolean);
  return tags.includes(String(t||"").toLowerCase());
}
function waLang(o){
  // حسب شرطك: وجود ar => عربي، غير ذلك إنجليزي
  return waHasTag(o,"ar") ? "ar" : "en";
}

function waCustomerName(o){
  const full = String(o?.customer || "").trim();
  if(full) return (full.split(/\s+/)[0] || full);
  return "Customer";
}
function waFormattedAddress(o){
  // في Liquid عندك formatted_address — هنا نعوّضها من بيانات السكربت
  const a1 = (o?.address1 || o?.shipping || "").trim();
  const city = (o?.city || "").trim();
  if(!a1 && !city) return "";
  if(a1 && city && a1.includes(city)) return a1;
  return [a1, city].filter(Boolean).join(", ");
}

function waMoney(v){

async function loadWADetails(orderId){
  const key = String(orderId);
  if(state.waById[key]?.loaded) return state.waById[key];

  state.waById[key] = state.waById[key] || {};
  const out = state.waById[key];
  if(out.promise) return await out.promise;

  out.promise = (async ()=>{
    try{
      const [lr, totals] = await Promise.all([
        authFetch("/api/manage/order/" + encodeURIComponent(orderId) + "/lines", { cache:"no-store" }),
        ensureTotals(orderId)
      ]);

      const ld = await lr.json().catch(()=> ({}));

      out.lines  = Array.isArray(ld?.items) ? ld.items : [];
      out.totals = totals || {};
      out.loaded = true;
    }catch(e){
      console.warn("loadWADetails failed", e);
      out.lines = out.lines || [];
      out.totals = out.totals || {};
      out.loaded = true;
    }finally{
      delete out.promise;
    }
    return out;
  })();

  return await out.promise;
}

    overlay.addEventListener("click", (e) => { if(e.target === overlay) close(null); });
    overlay.querySelector("[data-x]")?.addEventListener("click", ()=> close(null));
    overlay.querySelector("[data-cancel]")?.addEventListener("click", ()=> close(null));

    // Focus
    setTimeout(()=>{
      const inp = overlay.querySelector("[data-amt]");
      if(inp){ inp.focus(); inp.select?.(); }
    }, 0);

    // نسب من المتبقي
    overlay.querySelectorAll("[data-q]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const q = Number(btn.getAttribute("data-q") || 0);
        const val = (q === 1) ? outstanding : (outstanding * q);
        const inp = overlay.querySelector("[data-amt]");
        if(inp) inp.value = money(val);
      });
    });

    // المنتجات فقط
    overlay.querySelector('[data-pay="items"]')?.addEventListener("click", ()=>{
      const inp = overlay.querySelector("[data-amt]");
      if(!inp) return;

      // تقدر تستبدل itemsOnly بـ subtotal لو تبيه:
      // const val = subtotal > 0 ? subtotal : itemsOnly;
      const val = (subtotal > 0 ? subtotal : itemsOnly);

      inp.value = money(val);
    });

    // Enter / Esc
    overlay.addEventListener("keydown", (e)=>{
      if(e.key === "Escape") close(null);
      if(e.key === "Enter") overlay.querySelector("[data-save]")?.click();
    });

    overlay.querySelector("[data-save]")?.addEventListener("click", ()=>{
      try{
        showErr("");

        const inp = overlay.querySelector("[data-amt]");
        const amt = Number(inp?.value || 0);

        if(!Number.isFinite(amt) || amt <= 0) return showErr("أدخل مبلغ صحيح.");

        // ✅ الحد الأعلى = المتبقي (لكن لو المتبقي غلط لأي سبب، خلي الإجمالي سقف)
        const cap = Math.max(outstanding, total);
        if(amt > cap + 0.0005) return showErr(`المبلغ أكبر من المتبقي (${money(cap)})`);

        close({ amount: Number(amt.toFixed(3)) });
      }catch(e){
        showErr(e?.message || String(e));
      }
    });
  });
}

async function openBarcodeScanner({ title = "مسح الباركود", onResult } = {}){
  if(typeof Html5Qrcode === "undefined"){
    toast("err","خطأ","مكتبة الباركود لم تتحمل.", 2500);
    return;
  }

  const overlay = document.createElement("div");
  overlay.style.cssText = `
    position:fixed; inset:0; background:rgba(0,0,0,.7);
    z-index:400000; display:flex; align-items:center; justify-content:center;
    padding:16px;
  `;

  overlay.innerHTML = `
    <div style="
      width:min(520px,100%);
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 26px 60px rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.18);
    ">

          وجه الكاميرا على باركود الطلب وسيتم البحث تلقائيًا.
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  const formatsToSupport = [
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.CODE_93,
    Html5QrcodeSupportedFormats.CODABAR,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E
  ];

  const html5QrCode = new Html5Qrcode("barcode-reader", { formatsToSupport });
  let closed = false;

  const close = async () => {
    if(closed) return;
    closed = true;
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    overlay.remove();

  });

  try{

        qrbox: { width: 280, height: 140 },
        aspectRatio: 1.7778
      },
      async (decodedText) => {
        const code = String(decodedText || "").trim();
        if(!code) return;
        await close();
        if(typeof onResult === "function") onResult(code);
      },
      () => {}
    );
  }catch(e){
    await close();
    toast("err","خطأ","تعذر فتح الكاميرا.", 2500);
  }
}
  
const pdfShareCache = new Map();
const PDF_SHARE_CACHE_TTL_MS = 5 * 60 * 1000;

function setPdfShareCache(orderId, file){
  const key = String(orderId);
  const prev = pdfShareCache.get(key);
  if(prev?.timer) clearTimeout(prev.timer);

  const timer = setTimeout(() => {
    pdfShareCache.delete(key);
  }, PDF_SHARE_CACHE_TTL_MS);

  pdfShareCache.set(key, { file, timer });
}

  async function handleSendPdfAction(actBtn, oid, tkey){
  const act = String(actBtn?.getAttribute("data-act") || "").trim();
  if (act !== "send-pdf") return false;

  const order = (state.orders || []).find(x => String(x.id) === String(oid));
  if (!order) {
    toastJobErr(tkey, "لم يتم العثور على الطلب.", 2500);
    return true;
  }

  const prevDisabled = !!actBtn.disabled;
  const prevOpacity = actBtn.style.opacity;
  const prevHtml = actBtn.innerHTML;
  const prevText = actBtn.textContent;

  try {
const orderNumber = String(
  order?.order_number || order?.name || order?.number || oid
).replace("#", "").trim();

const orderTags = normalizeTags(order).map(t => String(t || "").toLowerCase());
const isArabic = orderTags.includes("ar");
const invoiceLabel = isArabic ? "فاتورة الطلب" : "Order Invoice";
const fileName = `${invoiceLabel} - ${orderNumber}.pdf`;
    
    // إذا الفاتورة مجهزة مسبقًا: شاركها فورًا
    const cachedFile = pdfShareCache.get(String(oid))?.file;
    if (cachedFile) {
      const hasShare = !!navigator.share;
      const canShareFiles =
        hasShare &&
        (!navigator.canShare || navigator.canShare({ files: [cachedFile] }));

      if (!canShareFiles) {
        toastJobWarn(tkey, "هذا الجهاز أو المتصفح لا يدعم مشاركة PDF مباشرة.", 3000);
        return true;
      }

      await navigator.share({ files: [cachedFile] });
      toastJobOk(tkey, "تمت مشاركة الفاتورة ✅", 1800);
      return true;
    }

    // أول ضغطة: تجهيز فقط
    actBtn.disabled = true;
    actBtn.style.opacity = "0.7";
    actBtn.innerHTML = `<span class="waTxt">جاري تجهيز الفاتورة...</span>`;

    toastJobStart(tkey, "جاري تجهيز ملف الفاتورة… اصبر شوي");

    const res = await fetch(`/api/manage/order/${encodeURIComponent(oid)}/invoice-pdf`, {
      cache: "no-store"
    });

    if (!res.ok) throw new Error("فشل تحميل ملف الفاتورة");

    const blob = await res.blob();
    const file = new File([blob], fileName, { type: "application/pdf" });

    setPdfShareCache(oid, file);

    actBtn.disabled = false;
    actBtn.style.opacity = "";
    actBtn.innerHTML = `<span class="waTxt">مشاركة الفاتورة</span>`;

    toastJobOk(tkey, "تم تجهيز الفاتورة ✅ اضغط مرة ثانية للمشاركة", 2500);

  } catch (e) {
    if (e?.name === "AbortError") {
      toastJobWarn(tkey, "تم إلغاء المشاركة.", 1800);
    } else {
      toastJobErr(tkey, e?.message || "فشل إنشاء PDF", 3200);
    }

    actBtn.disabled = prevDisabled;
    actBtn.style.opacity = prevOpacity || "";
    actBtn.innerHTML = prevHtml || prevText || "PDF";
  }

  return true;
}

          toastJobErr(tkey, "لم يتم العثور على الطلب.", 2500);
          return;
        }

        const ok = await openPaidConfirmModal(order);
        if (!ok) return;

        toastJobStart(tkey, "تحويل إلى مدفوع…");
        await addTag(oid, "تحويل");
        await postManage("/api/manage/paid", { orderId: oid });
        toastJobOk(tkey, "تم تحويله مدفوع ✅", 1400);
        await loadOrders();
        return;
      }

      if (act === "cancel") {
        toastJobStart(tkey, "كنسلة الطلب…");
        await postManage("/api/manage/cancel", { orderId: oid });
        await addTag(oid, "Cancel").catch(() => {});
        toastJobOk(tkey, "تم كنسلة الطلب ✅", 1500);
        await loadOrders();
        return;
      }

      if (act === "cancel_silent") {
        toastJobStart(tkey, "كنسلة الطلب بدون رسالة…");
        await addTag(oid, "غ").catch(() => {});
        await addTag(oid, "Cancel").catch(() => {});
        await new Promise(r => setTimeout(r, 500));
        await postManage("/api/manage/cancel", { orderId: oid });
        toastJobOk(tkey, "تم كنسلة الطلب بدون رسالة ✅", 1500);
        await loadOrders();
        return;
      }

      if (act === "edit") {
        const order = state.orders.find((x) => String(x.id) === String(oid));
        if (!order) {
          toastJobErr(tkey, "لم يتم العثور على الطلب.", 2500);
          return;
        }

        toastJobStart(tkey, "فتح تفاصيل الطلب…");
        openModal();
        $("emTitle").textContent = "جاري فتح الطلب...";
        $("emItems").innerHTML = `<div class="empty">جاري تحميل المنتجات...</div>`;
        $("emTotal").textContent = "الإجمالي: ...";

        await fillEditModal(order);
        toastJobOk(tkey, "تم فتح الطلب ✅", 900);
        return;
      }

    } catch (e) {
      document.querySelector("[data-act='save_tracking']:disabled")?.removeAttribute("disabled");
      toastJobErr(tkey, e?.message || String(e), 4500);
      console.error(e);
    }

    return;
  }

  const card = ev.target.closest(".orderCard");
  if (card) {
    state.selectedId = card.getAttribute("data-oid");
    renderOrders();
    renderDetail();
    setTimeout(goToDetailPanel, 50);
    return;
  }
});

const MOBILE_MAX_W = 900;

function isMobile(){
  return window.matchMedia(`(max-width:${MOBILE_MAX_W}px)`).matches;
}

function smoothScrollTo(el){
  if(!el) return;
  el.scrollIntoView({ behavior:"smooth", block:"start" });
}

function goToDetailPanel(){
  if(!isMobile()) return;
  const detail = document.getElementById("detailPanel");
  smoothScrollTo(detail);
  document.getElementById("mobileScrollTop")?.classList.add("show");
}

function goToOrdersPanel(){
  if(!isMobile()) return;
  const orders = document.getElementById("ordersPanel");
  smoothScrollTo(orders);
  document.getElementById("mobileScrollTop")?.classList.remove("show");
}

function _norm(v){
  return String(v ?? "").trim().replace(/\s+/g, " ");
}
function _same(a,b){
  return _norm(a) === _norm(b);
}

$("emSave")?.addEventListener("click", async () => {
  try {

    if(state.mode === "draft"){
      toast("warn","تنبيه","أنت في وضع إنشاء طلب جديد. استخدم زر (إنشاء الطلب الجديد).", 3500);
      return;
    }

    if(!state.editOrderId){
      toast("err","خطأ","لا يوجد طلب محدد للحفظ.", 3000);
      return;
    }

    const orderId = String(state.editOrderId);

    // ✅ الاسم (ضروري)
    const first = String($("emLastName")?.value || "").trim();   // الاسم
    const last  = String($("emFirstName")?.value || "").trim();  // اللقب (اختياري)
    if(!first){
      toast("warn","تنبيه","الاسم ضروري.", 2500);
      return;
    }

    const city     = _norm($("emCity")?.value || "");
    const address1 = _norm($("emAddress1")?.value || "");
    const note     = _norm($("emNote")?.value || "");

    const phone = toOmInternational(
      $("emPhone")?.value || "",
      originalForm?.phone || "",
      { ...originalForm, city, address1, shipping: address1 }
    );

    // =========================
    // ✅ 1) هل بيانات العميل تغيرت؟
    // =========================
    const oldData = {
      firstName: _norm(originalForm?.lastName || ""),
      lastName:  _norm(originalForm?.firstName || ""),
      phone:     _norm(originalForm?.phone || ""),
      city:      _norm(originalForm?.city || ""),
      address1:  _norm(originalForm?.address1 || ""),
      note:      _norm(originalForm?.note || ""),
    };

    const newData = {
      firstName: _norm(first),
      lastName:  _norm(last),
      phone:     _norm(phone),
      city,
      address1,
      note,
    };

    const dataChanged =
      !_same(newData.firstName, oldData.firstName) ||
      !_same(newData.lastName,  oldData.lastName)  ||
      !_same(newData.phone,     oldData.phone)     ||
      !_same(newData.city,      oldData.city)      ||
      !_same(newData.address1,  oldData.address1)  ||
      !_same(newData.note,      oldData.note);

    // =========================
    // ✅ 2) جهّز عمليات تعديل المنتجات
    // =========================
    const ops = [];

    for (const it of (modalItems || [])) {
      const qty = Number(it?.qty || 0) || 0;

      if (!it?.isNew && (it?.lineItemGid || it?.variantGid)) {
        const orig = Number(it?.origQty ?? qty) || 0;

        if (qty === orig) continue;

        if (qty <= 0) {
          ops.push({
            type: "remove",
            lineItemGid: it.lineItemGid || "",
            variantGid: it.variantGid || ""
          });
        } else {
          ops.push({
            type: "set_qty",
            lineItemGid: it.lineItemGid || "",
            variantGid: it.variantGid || "",
            quantity: qty
          });
        }
        continue;
      }

      if (it?.isNew && it?.variantGid) {
        if (qty > 0) {
          ops.push({
            type: "add",
            variantGid: it.variantGid,
            quantity: qty
          });
        }
      }
    }

    const itemsChanged = ops.length > 0;

    if (!dataChanged && !itemsChanged) {
      toast("warn", "تنبيه", "لا يوجد أي تغيير للحفظ.", 2600);
      return;
    }

    // =========================
    // ✅ 3) احفظ بيانات العميل
    // =========================
    if (dataChanged) {
      toast("info","جاري","حفظ بيانات العميل...", 1200);

      await postManage("/api/manage/order/update", {
        orderId,
        firstName: newData.firstName,
        lastName: newData.lastName,
        phone,
        city: newData.city,
        address1: newData.address1,
        note: newData.note,
      });

      const ord = state.orders.find(o => String(o.id) === orderId);
      if (ord) {
        ord.customer = [newData.firstName, newData.lastName].filter(Boolean).join(" ").trim();
        ord.phone = phone;
        ord.city = newData.city;
        ord.address1 = newData.address1;
        ord.shipping = newData.address1;
        ord.note = newData.note;
      }

      originalForm = {
        firstName: newData.firstName,
        lastName: newData.lastName,
        phone,
        city: newData.city,
        address1: newData.address1,
        note: newData.note,
      };
    }

    // =========================
    // ✅ 4) احفظ المنتجات
    // =========================
    if (itemsChanged) {
      toast("info", "جاري", "حفظ المنتجات...", 1200);

      await postManage("/api/manage/order/edit", {
        orderId,
        notifyCustomer: false,
        staffNote: "edit from manage-orders",
        ops
      });

      for (const it of (modalItems || [])) {
        if (!it?.isNew) it.origQty = Number(it.qty || 0) || 0;
      }
    }

    toast("ok", "تم", "تم حفظ التعديلات ✅", 1400);

state.selectedId = orderId;
closeModal();
renderOrders();
renderDetail();
    
  } catch (e) {
    const msg = String(e?.message || e || "");
    toast("err", "خطأ", msg || "فشل الحفظ", 4500);
    console.error(e);
  }
});

      <b>${waitingCount}</b>
    </div>

    <div class="badgeStat ok" title="مؤكدة">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M20 6 9 17l-5-5"></path>
      </svg>
      <b>${confirmedCount}</b>
    </div>

    <div class="badgeStat all" title="المجموع">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M4 6h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 18h16"></path>
      </svg>
      <b>${waitingCount + confirmedCount}</b>
    </div>

    <div class="badgeStat wait" title="تحتاج تتبع">
      <svg class="ico" viewBox="0 0 24 24" aria-hidden="true" style="stroke:currentColor;fill:none">
        <path d="M3 7h11v10H3z"></path>
        <path d="M14 10h4l3 3v4h-7z"></path>
      </svg>
      <b>${needsTrackingCount}</b>
    </div>

  </div>
`;

    renderOrders();
openOrderFromUrlIfAny();

    
  }catch(e){
    console.error(e);
    // في silent لا نخرب الشاشة برسالة كبيرة
    if(!opts?.silent){
      $("statusBadge").textContent = "خطأ ❌";
      $("ordersList").innerHTML = `<div class="empty">فشل تحميل الطلبات</div>`;
      toast("err","خطأ", e?.message || String(e), 4000);
    }
  }
}
  
  // Init
  loadOrders();
</script>

</body>
</html>
